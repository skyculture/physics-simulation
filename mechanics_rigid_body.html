<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刚体转动 - 物理数值仿真平台</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#c9d1d9; --accent:#58a6ff; --ac2:#3fb950; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; }
  #content { flex:1; display:flex; flex-direction:column; padding:10px; gap:10px; }
  #canvas { flex:1; background:#0d1117; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.76em; }
  .ctrl-group label { color:#8b949e; }
  .ctrl-group input[type="range"] { width:120px; accent-color:var(--accent); }
  .ctrl-group input[type="number"] { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 6px; color:var(--text); font-size:0.9em; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.74em; color:#8b949e; line-height:1.5; }
</style>
</head>
<body>
<div id="container">
  <div id="content">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="ctrl-group"><label>转动惯量I:</label><input type="range" id="inertia" min="0.5" max="4" step="0.1" value="1"><input type="number" id="inertiaVal" value="1"></div>
      <div class="ctrl-group"><label>扭矩τ:</label><input type="range" id="torque" min="0" max="2" step="0.1" value="0.5"><input type="number" id="torqueVal" value="0.5"></div>
      <div class="ctrl-group"><label>阻尼系数b:</label><input type="range" id="damping" min="0" max="1" step="0.05" value="0.1"><input type="number" id="dampingVal" value="0.1"></div>
      <div class="ctrl-group"><button id="startBtn">▶ 开始</button><button id="resetBtn">↺ 重置</button></div>
    </div>
    <div id="info">刚体转动：τ = Iα，角加速度α = τ/I。转动定律与牛顿第二定律类比，扭矩产生角加速度，转动惯量是转动惯性的量度。</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId;
let theta = 0, omega = 0;
let isRunning = false;

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(w && h) { canvas.width = w; canvas.height = h; }
}

function reset() {
  theta = 0;
  omega = 0;
  isRunning = false;
  if(animationId) cancelAnimationFrame(animationId);
  draw();
}

function draw() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const I = parseFloat(document.getElementById('inertia').value);
  const tau = parseFloat(document.getElementById('torque').value);
  const b = parseFloat(document.getElementById('damping').value);

  if(isRunning) {
    const alpha = (tau - b * omega) / I;
    omega += alpha * 0.05;
    theta += omega * 0.05;
  }

  const cx = canvas.width / 2, cy = canvas.height / 2;
  const r = Math.min(canvas.width, canvas.height) * 0.25;

  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(theta);

  ctx.strokeStyle = '#f78166';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-r * 0.3, 0);
  ctx.lineTo(r * 0.6, 0);
  ctx.stroke();

  ctx.fillStyle = '#ffa657';
  ctx.beginPath();
  ctx.arc(r * 0.6, 0, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  ctx.fillStyle = '#8b949e';
  ctx.font = '12px sans-serif';
  ctx.fillText(`转动惯量 I = ${I.toFixed(2)} kg·m²`, 10, 20);
  ctx.fillText(`扭矩 τ = ${tau.toFixed(2)} N·m`, 10, 40);
  ctx.fillText(`角速度 ω = ${omega.toFixed(2)} rad/s`, 10, 60);
  ctx.fillText(`角加速度 α = ${((tau - b * omega) / I).toFixed(2)} rad/s²`, 10, 80);
  ctx.fillText(`角位移 θ = ${(theta * 180 / Math.PI).toFixed(1)}°`, 10, 100);

  ctx.fillStyle = '#3fb950';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText(`τ = Iα = ${tau.toFixed(2)} = ${I.toFixed(2)} × ${((tau - b * omega) / I).toFixed(2)}`, cx - 100, canvas.height - 20);

  if(isRunning) animationId = requestAnimationFrame(draw);
}

function start() {
  isRunning = true;
  draw();
}

document.getElementById('inertia').addEventListener('input', e => { document.getElementById('inertiaVal').value = e.target.value; });
document.getElementById('torque').addEventListener('input', e => { document.getElementById('torqueVal').value = e.target.value; });
document.getElementById('damping').addEventListener('input', e => { document.getElementById('dampingVal').value = e.target.value; });
document.getElementById('startBtn').addEventListener('click', start);
document.getElementById('resetBtn').addEventListener('click', reset);

resize();
window.addEventListener('resize', resize);
reset();
</script>
</body>
</html>
