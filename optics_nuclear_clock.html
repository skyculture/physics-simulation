<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核钟VUV激光器 - 物理数值仿真平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF2E0;color:#1A1A1A;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 16px 40px}
.container{width:100%;max-width:1100px}
.header{text-align:center;margin-bottom:24px;padding:28px 20px;background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px}
.header h1{font-size:2rem;font-weight:700;color:#0E61AC;letter-spacing:.05em;margin-bottom:8px}
.header .subtitle{font-size:.95rem;color:#5A6370;line-height:1.6}
.canvas-row{display:flex;gap:16px;margin-bottom:20px}
@media(max-width:860px){.canvas-row{flex-direction:column}}
.panel{flex:1;background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center}
.panel h2{font-size:.95rem;font-weight:600;color:#5A6370;margin-bottom:8px;text-align:center}
.panel canvas{width:100%;height:auto;border-radius:6px;background:#FAF2E0}
.controls{background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:16px}
@media(max-width:640px){.controls{grid-template-columns:1fr}}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:.85rem;font-weight:600;color:#1A1A1A;display:flex;justify-content:space-between;align-items:baseline}
.control-group label .val{font-size:.8rem;color:#0E61AC;font-weight:700;min-width:80px;text-align:right}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;background:#D4C9B8;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #FFF7EB;cursor:pointer;transition:transform .1s}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #FFF7EB;cursor:pointer}
.info-bar{background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:14px 24px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:24px;justify-content:center;font-size:.9rem}
.info-item{display:flex;align-items:baseline;gap:6px}
.info-item .info-label{color:#5A6370}
.info-item .info-value{color:#0E61AC;font-weight:700;font-size:1rem}
.btn-row{display:flex;gap:12px;justify-content:center}
.btn{padding:10px 28px;border:1px solid #D4C9B8;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit}
.btn-start{background:#238636;color:#fff;border-color:#2ea043}
.btn-start:hover{background:#2ea043}
.btn-pause{background:#9e6a03;color:#fff;border-color:#bb8009}
.btn-pause:hover{background:#bb8009}
.btn-reset{background:#FFFFFF;color:#1A1A1A;border-color:#D4C9B8}
.btn-reset:hover{background:#D4C9B8}
.legend-note{text-align:center;font-size:.78rem;color:#5A6370;margin-top:12px;line-height:1.5}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>核钟VUV激光器</h1>
    <p class="subtitle">²²⁹Th核异构跃迁是目前已知最低能量的核跃迁（8.355 eV，148.382 nm），可用于构建超高精度核钟。VUV激光器通过高精细度光学腔将核跃迁的极窄线宽特性转化为稳定的连续波VUV输出。</p>
  </div>
  <div class="canvas-row">
    <div class="panel">
      <h2>🔬 核跃迁与VUV激光</h2>
      <canvas id="canvasSchematic" width="680" height="420"></canvas>
    </div>
    <div class="panel">
      <h2>📊 激光频率稳定性</h2>
      <canvas id="canvasLorentz" width="680" height="420"></canvas>
    </div>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>泵浦功率 <span class="val" id="valPump">50%</span></label>
      <input type="range" id="sliderPump" min="0" max="100" step="1" value="50">
    </div>
    <div class="control-group">
      <label>腔精细度 F <span class="val" id="valFinesse">1000</span></label>
      <input type="range" id="sliderFinesse" min="100" max="10000" step="100" value="1000">
    </div>
    <div class="control-group">
      <label>温度 T <span class="val" id="valTemp">300 K</span></label>
      <input type="range" id="sliderTemp" min="0" max="300" step="1" value="300">
    </div>
  </div>
  <div class="info-bar">
    <div class="info-item"><span class="info-label">激光频率 ν=</span><span class="info-value" id="infoFreq">2.0216 PHz</span></div>
    <div class="info-item"><span class="info-label">线宽 Δν=</span><span class="info-value" id="infoLinewidth">0.00 Hz</span></div>
    <div class="info-item"><span class="info-label">频率稳定性=</span><span class="info-value" id="infoStability">0.00</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart">▶ 动画</button>
    <button class="btn btn-pause" id="btnPause">⏸ 暂停</button>
    <button class="btn btn-reset" id="btnReset">↺ 重置</button>
  </div>
  <p class="legend-note">💡 ²²⁹Th核钟利用核异构态跃迁（8.355 eV / 148.382 nm）实现超高精度计时，理论Q值达10¹⁹量级。<br>腔精细度F越高，激光线宽越窄；温度越低，多普勒展宽越小，频率稳定性越高。快捷键：空格=开始/暂停，R=重置</p>
</div>
<script>
var canvasSchematic=document.getElementById('canvasSchematic');
var ctxS=canvasSchematic.getContext('2d');
var canvasLorentz=document.getElementById('canvasLorentz');
var ctxL=canvasLorentz.getContext('2d');
var sliderPump=document.getElementById('sliderPump');
var sliderFinesse=document.getElementById('sliderFinesse');
var sliderTemp=document.getElementById('sliderTemp');
var valPump=document.getElementById('valPump');
var valFinesse=document.getElementById('valFinesse');
var valTemp=document.getElementById('valTemp');
var infoFreq=document.getElementById('infoFreq');
var infoLinewidth=document.getElementById('infoLinewidth');
var infoStability=document.getElementById('infoStability');
var btnStart=document.getElementById('btnStart');
var btnPause=document.getElementById('btnPause');
var btnReset=document.getElementById('btnReset');

var pump=50,finesse=1000,temperature=300;
var running=false,animTime=0,lastFrameTime=null,animFrameId=null;
var photons=[];
var cavityLength=0.05;

function computePhysics(){
  var c=2.998e8;
  var h=6.626e-34;
  var E_transition=8.355*1.602e-19;
  var nu0=E_transition/h;
  var FSR=c/(2*cavityLength);
  var cavityLinewidth=FSR/finesse;
  var kB=1.381e-23;
  var m_Th=229*1.661e-27;
  var dopplerWidth=nu0*Math.sqrt(2*kB*temperature/(m_Th*c*c));
  var effectiveLinewidth=Math.sqrt(cavityLinewidth*cavityLinewidth+dopplerWidth*dopplerWidth);
  var threshold=30;
  var laserOn=pump>threshold;
  var intensity=laserOn?Math.min(1,(pump-threshold)/50):0;
  var stability=0;
  if(effectiveLinewidth>0){
    stability=nu0/effectiveLinewidth;
  }
  return{
    nu0:nu0,
    cavityLinewidth:cavityLinewidth,
    dopplerWidth:dopplerWidth,
    effectiveLinewidth:effectiveLinewidth,
    laserOn:laserOn,
    intensity:intensity,
    stability:stability
  };
}

function formatLinewidth(lw){
  if(lw>=1e12)return(lw/1e12).toFixed(2)+' THz';
  if(lw>=1e9)return(lw/1e9).toFixed(2)+' GHz';
  if(lw>=1e6)return(lw/1e6).toFixed(2)+' MHz';
  if(lw>=1e3)return(lw/1e3).toFixed(2)+' kHz';
  return lw.toFixed(2)+' Hz';
}

function formatStability(s){
  if(s>=1e18)return(s/1e18).toFixed(2)+'×10¹⁸';
  if(s>=1e15)return(s/1e15).toFixed(2)+'×10¹⁵';
  if(s>=1e12)return(s/1e12).toFixed(2)+'×10¹²';
  if(s>=1e9)return(s/1e9).toFixed(2)+'×10⁹';
  if(s>=1e6)return(s/1e6).toFixed(2)+'×10⁶';
  return s.toFixed(2);
}

function updateUI(){
  valPump.textContent=pump+'%';
  valFinesse.textContent=finesse;
  valTemp.textContent=temperature+' K';
  var ph=computePhysics();
  infoFreq.textContent=(ph.nu0/1e15).toFixed(4)+' PHz';
  infoLinewidth.textContent=formatLinewidth(ph.effectiveLinewidth);
  infoStability.textContent=formatStability(ph.stability);
}

sliderPump.addEventListener('input',function(){pump=+sliderPump.value;updateUI();if(!running)draw()});
sliderFinesse.addEventListener('input',function(){finesse=+sliderFinesse.value;updateUI();if(!running)draw()});
sliderTemp.addEventListener('input',function(){temperature=+sliderTemp.value;updateUI();if(!running)draw()});

btnStart.addEventListener('click',function(){
  if(running){pause();return}
  running=true;btnStart.classList.add('active');btnPause.classList.remove('active');
  if(!animFrameId)animFrameId=requestAnimationFrame(animate);
});
btnPause.addEventListener('click',pause);
function pause(){running=false;btnStart.classList.remove('active');btnPause.classList.add('active')}
btnReset.addEventListener('click',function(){
  pump=50;finesse=1000;temperature=300;animTime=0;lastFrameTime=null;photons=[];
  sliderPump.value=50;sliderFinesse.value=1000;sliderTemp.value=300;
  updateUI();if(!running)draw();
});

function drawSchematic(){
  var W=canvasSchematic.width,H=canvasSchematic.height;
  ctxS.clearRect(0,0,W,H);
  ctxS.fillStyle='#FAF2E0';ctxS.fillRect(0,0,W,H);
  var ph=computePhysics();
  var cy=H*0.55;
  var leftX=W*0.1;
  var rightX=W*0.72;
  var mirrorH=70;

  ctxS.fillStyle='#0E61AC';
  ctxS.fillRect(leftX,cy-mirrorH/2,6,mirrorH);
  ctxS.strokeStyle='#0E61AC';ctxS.lineWidth=2;
  ctxS.strokeRect(leftX,cy-mirrorH/2,6,mirrorH);
  ctxS.fillStyle='#1A1A1A';ctxS.font='10px sans-serif';ctxS.textAlign='center';
  ctxS.fillText('全反镜',leftX+3,cy+mirrorH/2+14);
  ctxS.fillText('R≈100%',leftX+3,cy+mirrorH/2+26);

  ctxS.fillStyle='#f85149';
  ctxS.fillRect(rightX,cy-mirrorH/2,6,mirrorH);
  ctxS.strokeStyle='#f85149';ctxS.lineWidth=2;
  ctxS.strokeRect(rightX,cy-mirrorH/2,6,mirrorH);
  ctxS.fillStyle='#1A1A1A';ctxS.font='10px sans-serif';ctxS.textAlign='center';
  ctxS.fillText('输出耦合镜',rightX+3,cy+mirrorH/2+14);
  ctxS.fillText('F='+finesse,rightX+3,cy+mirrorH/2+26);

  var medLeft=leftX+8;
  var medRight=rightX-2;
  var pumpLevel=pump/100;
  ctxS.fillStyle='rgba(14,97,172,'+(0.08+pumpLevel*0.2)+')';
  ctxS.fillRect(medLeft,cy-25,medRight-medLeft,50);
  ctxS.strokeStyle='#0E61AC';ctxS.lineWidth=1.5;
  ctxS.strokeRect(medLeft,cy-25,medRight-medLeft,50);
  ctxS.fillStyle='#0E61AC';ctxS.font='11px sans-serif';ctxS.textAlign='center';
  ctxS.fillText('²²⁹Th 增益介质 (CaF₂ 晶体)',(medLeft+medRight)/2,cy+4);

  if(ph.laserOn){
    var intensity=ph.intensity;
    ctxS.strokeStyle='rgba(180,130,255,'+(0.3+intensity*0.7)+')';
    ctxS.lineWidth=2+intensity*3;
    ctxS.beginPath();ctxS.moveTo(leftX+6,cy);ctxS.lineTo(rightX,cy);ctxS.stroke();
    ctxS.strokeStyle='rgba(180,130,255,'+intensity*0.8+')';
    ctxS.lineWidth=3+intensity*5;
    ctxS.beginPath();ctxS.moveTo(rightX+6,cy);ctxS.lineTo(W,cy);ctxS.stroke();
    ctxS.fillStyle='#b482ff';ctxS.font='bold 11px sans-serif';ctxS.textAlign='left';
    ctxS.fillText('VUV输出 148.382 nm →',rightX+12,cy-15);
  }

  for(var i=0;i<photons.length;i++){
    var p=photons[i];
    var alpha=Math.max(0,1-Math.abs(p.x-0.5)*1.2);
    ctxS.fillStyle='rgba(180,130,255,'+alpha*0.8+')';
    ctxS.beginPath();ctxS.arc(medLeft+p.x*(medRight-medLeft),cy+p.y,3,0,Math.PI*2);ctxS.fill();
  }

  ctxS.fillStyle='#2A7CC7';ctxS.font='10px sans-serif';ctxS.textAlign='center';
  ctxS.fillText('泵浦 ↑',(medLeft+medRight)/2,cy-35);
  var pumpCount=Math.max(2,Math.round((medRight-medLeft)/35));
  for(var i=0;i<pumpCount;i++){
    var x=medLeft+10+i*(medRight-medLeft-20)/(pumpCount-1);
    ctxS.strokeStyle='rgba(255,166,87,0.5)';ctxS.lineWidth=1;
    ctxS.beginPath();ctxS.moveTo(x,cy-25);ctxS.lineTo(x,cy-35);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(x-3,cy-32);ctxS.lineTo(x,cy-35);ctxS.lineTo(x+3,cy-32);ctxS.stroke();
  }

  var elLeft=W*0.08;
  var elRight=W*0.42;
  var elTop=H*0.06;
  var elBot=H*0.42;
  var elMid=(elTop+elBot)/2;

  ctxS.fillStyle='#FFF7EB';
  ctxS.fillRect(elLeft-5,elTop-15,elRight-elLeft+10,elBot-elTop+30);
  ctxS.strokeStyle='#D4C9B8';ctxS.lineWidth=1;
  ctxS.strokeRect(elLeft-5,elTop-15,elRight-elLeft+10,elBot-elTop+30);

  ctxS.strokeStyle='#0E61AC';ctxS.lineWidth=3;
  ctxS.beginPath();ctxS.moveTo(elLeft+10,elBot-10);ctxS.lineTo(elLeft+elRight*0.5,elBot-10);ctxS.stroke();
  ctxS.fillStyle='#0E61AC';ctxS.font='11px sans-serif';ctxS.textAlign='left';
  ctxS.fillText('基态 ²²⁹Th',elLeft+elRight*0.5+8,elBot-6);

  ctxS.strokeStyle='#b482ff';ctxS.lineWidth=3;
  ctxS.beginPath();ctxS.moveTo(elLeft+10,elTop+10);ctxS.lineTo(elLeft+elRight*0.5,elTop+10);ctxS.stroke();
  ctxS.fillStyle='#b482ff';ctxS.font='11px sans-serif';ctxS.textAlign='left';
  ctxS.fillText('同核异构态',elLeft+elRight*0.5+8,elTop+14);

  var arrowX=elLeft+elRight*0.3;
  ctxS.strokeStyle='#0E61AC';ctxS.lineWidth=2;
  ctxS.beginPath();ctxS.moveTo(arrowX,elBot-14);ctxS.lineTo(arrowX,elTop+14);ctxS.stroke();
  ctxS.beginPath();ctxS.moveTo(arrowX-4,elTop+20);ctxS.lineTo(arrowX,elTop+14);ctxS.lineTo(arrowX+4,elTop+20);ctxS.stroke();
  ctxS.fillStyle='#0E61AC';ctxS.font='bold 10px sans-serif';ctxS.textAlign='center';
  ctxS.fillText('8.355 eV',arrowX+35,elMid+4);
  ctxS.fillText('148.382 nm',arrowX+35,elMid+18);

  ctxS.fillStyle=ph.laserOn?'#0E61AC':'#f85149';
  ctxS.font='bold 12px sans-serif';ctxS.textAlign='center';
  ctxS.fillText(ph.laserOn?'VUV激光运转':'未达阈值',W/2,H-12);
}

function drawLorentzian(){
  var W=canvasLorentz.width,H=canvasLorentz.height;
  ctxL.clearRect(0,0,W,H);
  ctxL.fillStyle='#FAF2E0';ctxL.fillRect(0,0,W,H);
  var ph=computePhysics();
  var ml=70,mt=30,mr=30,mb=55;
  var pw=W-ml-mr,ph2=H-mt-mb;

  ctxL.strokeStyle='#D4C9B8';ctxL.lineWidth=1;
  ctxL.beginPath();ctxL.moveTo(ml,mt);ctxL.lineTo(ml,H-mb);ctxL.lineTo(W-mr,H-mb);ctxL.stroke();

  ctxL.fillStyle='#5A6370';ctxL.font='10px sans-serif';
  ctxL.textAlign='center';
  ctxL.fillText('频率偏移 (Δν)',ml+pw/2,H-mb+35);
  ctxL.save();
  ctxL.translate(18,mt+ph2/2);ctxL.rotate(-Math.PI/2);
  ctxL.fillText('归一化强度',0,0);
  ctxL.restore();

  var nu0=ph.nu0;
  var lw=ph.effectiveLinewidth;
  if(lw<=0)lw=1;
  var halfSpan=lw*8;
  if(halfSpan<=0)halfSpan=1e6;

  var maxFreq=halfSpan;
  var numTicks=6;
  ctxL.strokeStyle='#D4C9B8';ctxL.lineWidth=1;
  ctxL.fillStyle='#5A6370';ctxL.font='9px sans-serif';ctxL.textAlign='center';
  for(var i=0;i<=numTicks;i++){
    var frac=i/numTicks;
    var x=ml+frac*pw;
    var freqVal=-maxFreq+2*maxFreq*frac;
    ctxL.beginPath();ctxL.moveTo(x,H-mb);ctxL.lineTo(x,H-mb+5);ctxL.stroke();
    var label;
    if(Math.abs(freqVal)>=1e9)label=(freqVal/1e9).toFixed(1)+' GHz';
    else if(Math.abs(freqVal)>=1e6)label=(freqVal/1e6).toFixed(1)+' MHz';
    else if(Math.abs(freqVal)>=1e3)label=(freqVal/1e3).toFixed(1)+' kHz';
    else label=freqVal.toFixed(1)+' Hz';
    ctxL.fillText(label,x,H-mb+18);
  }

  var numYTicks=5;
  for(var i=0;i<=numYTicks;i++){
    var frac=i/numYTicks;
    var y=H-mb-frac*ph2;
    ctxL.strokeStyle='#D4C9B8';ctxL.lineWidth=1;
    ctxL.beginPath();ctxL.moveTo(ml,y);ctxL.lineTo(ml-5,y);ctxL.stroke();
    ctxL.fillStyle='#5A6370';ctxL.font='9px sans-serif';ctxL.textAlign='right';
    ctxL.fillText(frac.toFixed(1),ml-8,y+3);
  }

  ctxL.strokeStyle='rgba(48,54,61,0.5)';ctxL.lineWidth=0.5;
  for(var i=1;i<=numYTicks;i++){
    var y=H-mb-i/numYTicks*ph2;
    ctxL.beginPath();ctxL.moveTo(ml,y);ctxL.lineTo(W-mr,y);ctxL.stroke();
  }

  if(ph.laserOn){
    var intensity=ph.intensity;
    var gamma=lw/2;
    var N=300;
    var prevX=null,prevY=null;

    ctxL.strokeStyle='#b482ff';ctxL.lineWidth=2;
    ctxL.beginPath();
    for(var i=0;i<=N;i++){
      var frac=i/N;
      var detune=-maxFreq+2*maxFreq*frac;
      var lorentz=gamma*gamma/(detune*detune+gamma*gamma);
      var plotY=lorentz*intensity;
      var x=ml+frac*pw;
      var y=H-mb-plotY*ph2;
      if(i===0)ctxL.moveTo(x,y);
      else ctxL.lineTo(x,y);
    }
    ctxL.stroke();

    var grad=ctxL.createLinearGradient(0,mt,0,H-mb);
    grad.addColorStop(0,'rgba(180,130,255,0.3)');
    grad.addColorStop(1,'rgba(180,130,255,0.02)');
    ctxL.fillStyle=grad;
    ctxL.beginPath();
    for(var i=0;i<=N;i++){
      var frac=i/N;
      var detune=-maxFreq+2*maxFreq*frac;
      var lorentz=gamma*gamma/(detune*detune+gamma*gamma);
      var plotY=lorentz*intensity;
      var x=ml+frac*pw;
      var y=H-mb-plotY*ph2;
      if(i===0)ctxL.moveTo(x,y);
      else ctxL.lineTo(x,y);
    }
    ctxL.lineTo(ml+pw,H-mb);
    ctxL.lineTo(ml,H-mb);
    ctxL.closePath();
    ctxL.fill();

    var fwhmY=H-mb-0.5*intensity*ph2;
    ctxL.strokeStyle='rgba(255,166,87,0.6)';ctxL.lineWidth=1;ctxL.setLineDash([4,3]);
    ctxL.beginPath();ctxL.moveTo(ml,fwhmY);ctxL.lineTo(W-mr,fwhmY);ctxL.stroke();
    ctxL.setLineDash([]);
    ctxL.fillStyle='#2A7CC7';ctxL.font='9px sans-serif';ctxL.textAlign='left';
    ctxL.fillText('FWHM = '+formatLinewidth(lw),ml+5,fwhmY-5);

    var centerPeak=H-mb-intensity*ph2;
    ctxL.strokeStyle='rgba(14,97,172,0.5)';ctxL.lineWidth=1;ctxL.setLineDash([3,3]);
    ctxL.beginPath();ctxL.moveTo(ml+pw/2,centerPeak);ctxL.lineTo(ml+pw/2,H-mb);ctxL.stroke();
    ctxL.setLineDash([]);
    ctxL.fillStyle='#0E61AC';ctxL.font='9px sans-serif';ctxL.textAlign='center';
    ctxL.fillText('ν₀ = 2.0216 PHz',ml+pw/2,H-mb+48);

    var peakLabel='峰值: '+(intensity*100).toFixed(0)+'%';
    ctxL.fillStyle='#b482ff';ctxL.font='bold 10px sans-serif';ctxL.textAlign='center';
    ctxL.fillText(peakLabel,ml+pw/2,centerPeak-8);
  }else{
    ctxL.fillStyle='#f85149';ctxL.font='bold 14px sans-serif';ctxL.textAlign='center';
    ctxL.fillText('泵浦未达阈值，无激光输出',ml+pw/2,mt+ph2/2);
  }

  ctxL.fillStyle='#5A6370';ctxL.font='9px sans-serif';ctxL.textAlign='left';
  ctxL.fillText('腔线宽: '+formatLinewidth(ph.cavityLinewidth),ml+5,mt+15);
  ctxL.fillText('多普勒展宽: '+formatLinewidth(ph.dopplerWidth),ml+5,mt+28);
  ctxL.fillText('有效线宽: '+formatLinewidth(ph.effectiveLinewidth),ml+5,mt+41);
}

function draw(){drawSchematic();drawLorentzian()}

function animate(timestamp){
  if(!running){animFrameId=null;return}
  if(lastFrameTime===null)lastFrameTime=timestamp;
  var dt=Math.min((timestamp-lastFrameTime)/1000,0.1);
  lastFrameTime=timestamp;animTime+=dt;

  var ph=computePhysics();
  if(ph.laserOn&&Math.random()<dt*4*pump/100){
    photons.push({x:0,y:(Math.random()-0.5)*30,dir:1});
  }
  for(var i=photons.length-1;i>=0;i--){
    photons[i].x+=photons[i].dir*dt*0.4;
    if(photons[i].x>1){
      if(Math.random()>0.3){photons[i].dir=-1;photons[i].x=1;}
      else{photons.splice(i,1);continue;}
    }
    if(photons[i].x<0){photons.splice(i,1);continue;}
    if(photons.length>25)photons.splice(0,1);
  }

  draw();
  if(running)animFrameId=requestAnimationFrame(animate);
}

function resizeCanvases(){
  var rowW=document.querySelector('.canvas-row').clientWidth;var cw=Math.floor((rowW-16)/2)-26;if(cw>680)cw=680;if(cw<200)cw=200;
  var sw=cw,sh=Math.round(sw*420/680);
  canvasSchematic.width=sw;canvasSchematic.height=sh;
  canvasSchematic.style.width=sw+'px';canvasSchematic.style.height=sh+'px';
  var lw=cw,lh=Math.round(lw*420/680);
  canvasLorentz.width=lw;canvasLorentz.height=lh;
  canvasLorentz.style.width=lw+'px';canvasLorentz.style.height=lh+'px';
}
window.addEventListener('resize',resizeCanvases);resizeCanvases();
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();if(running)pause();else btnStart.click()}
  else if(e.code==='KeyR'){e.preventDefault();btnReset.click()}
});
updateUI();draw();
</script>
</body>
