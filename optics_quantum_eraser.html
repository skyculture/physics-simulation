<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>量子擦除 - 物理数值仿真平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF2E0;color:#1A1A1A;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 16px 40px}
.container{width:100%;max-width:1100px}
.header{text-align:center;margin-bottom:24px;padding:28px 20px;background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px}
.header h1{font-size:2rem;font-weight:700;color:#0E61AC;letter-spacing:.05em;margin-bottom:8px}
.header .subtitle{font-size:.95rem;color:#5A6370;line-height:1.6}
.canvas-row{display:flex;gap:16px;margin-bottom:20px}
@media(max-width:860px){.canvas-row{flex-direction:column}}
.panel{flex:1;background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center}
.panel h2{font-size:.95rem;font-weight:600;color:#5A6370;margin-bottom:8px;text-align:center}
.panel canvas{width:100%;height:auto;border-radius:6px;background:#FAF2E0}
.controls{background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:16px}
@media(max-width:640px){.controls{grid-template-columns:1fr}}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:.85rem;font-weight:600;color:#1A1A1A;display:flex;justify-content:space-between;align-items:baseline}
.control-group label .val{font-size:.8rem;color:#0E61AC;font-weight:700;min-width:80px;text-align:right}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;background:#D4C9B8;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #FFF7EB;cursor:pointer;transition:transform .1s}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #FFF7EB;cursor:pointer}
.info-bar{background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:14px 24px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:24px;justify-content:center;font-size:.9rem}
.info-item{display:flex;align-items:baseline;gap:6px}
.info-item .info-label{color:#5A6370}
.info-item .info-value{color:#0E61AC;font-weight:700;font-size:1rem}
.btn-row{display:flex;gap:12px;justify-content:center}
.btn{padding:10px 28px;border:1px solid #D4C9B8;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit}
.btn-start{background:#238636;color:#fff;border-color:#2ea043}
.btn-start:hover{background:#2ea043}
.btn-pause{background:#9e6a03;color:#fff;border-color:#bb8009}
.btn-pause:hover{background:#bb8009}
.btn-reset{background:#FFFFFF;color:#1A1A1A;border-color:#D4C9B8}
.btn-reset:hover{background:#D4C9B8}
.legend-note{text-align:center;font-size:.78rem;color:#5A6370;margin-top:12px;line-height:1.5}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>量子擦除</h1>
    <p class="subtitle">量子擦除实验展示了量子力学中"路径信息"与"干涉条纹"的互补关系。当获取路径信息时干涉消失；擦除路径信息后干涉恢复。</p>
  </div>
  <div class="canvas-row">
    <div class="panel">
      <h2>🔬 双缝与擦除器</h2>
      <canvas id="canvasSetup" width="680" height="420"></canvas>
    </div>
    <div class="panel">
      <h2>📊 屏幕条纹</h2>
      <canvas id="canvasPattern" width="680" height="420"></canvas>
    </div>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>路径标记 <span class="val" id="valMark">关</span></label>
      <input type="range" id="sliderMark" min="0" max="1" step="1" value="0">
    </div>
    <div class="control-group">
      <label>擦除器 <span class="val" id="valErase">关</span></label>
      <input type="range" id="sliderErase" min="0" max="1" step="1" value="0">
    </div>
    <div class="control-group">
      <label>缝间距 d <span class="val" id="valD">10 μm</span></label>
      <input type="range" id="sliderD" min="2" max="30" step="1" value="10">
    </div>
  </div>
  <div class="info-bar">
    <div class="info-item"><span class="info-label">路径信息=</span><span class="info-value" id="infoPath">无</span></div>
    <div class="info-item"><span class="info-label">干涉可见度=</span><span class="info-value" id="infoVis">1.00</span></div>
    <div class="info-item"><span class="info-label">结果=</span><span class="info-value" id="infoResult">干涉条纹</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart">▶ 动画</button>
    <button class="btn btn-pause" id="btnPause">⏸ 暂停</button>
    <button class="btn btn-reset" id="btnReset">↺ 重置</button>
  </div>
  <p class="legend-note">💡 提示：开启路径标记→干涉消失（知道粒子走哪条缝）；再开启擦除器→干涉恢复（路径信息被擦除）。<br>这体现了量子力学的互补性原理。</p>
</div>
<script>
var canvasSetup=document.getElementById('canvasSetup');
var ctxS=canvasSetup.getContext('2d');
var canvasPattern=document.getElementById('canvasPattern');
var ctxP=canvasPattern.getContext('2d');
var sliderMark=document.getElementById('sliderMark');
var sliderErase=document.getElementById('sliderErase');
var sliderD=document.getElementById('sliderD');
var valMark=document.getElementById('valMark');
var valErase=document.getElementById('valErase');
var valD=document.getElementById('valD');
var infoPath=document.getElementById('infoPath');
var infoVis=document.getElementById('infoVis');
var infoResult=document.getElementById('infoResult');
var btnStart=document.getElementById('btnStart');
var btnPause=document.getElementById('btnPause');
var btnReset=document.getElementById('btnReset');

var markOn=0,eraseOn=0,slitD=10;
var running=false,animTime=0,lastFrameTime=null,animFrameId=null;

function updateUI(){
  valMark.textContent=markOn?'开':'关';
  valErase.textContent=eraseOn?'开':'关';
  valD.textContent=slitD+' μm';
  var hasPath=markOn&&!eraseOn;
  var visibility=hasPath?0:1;
  infoPath.textContent=hasPath?'有（干涉消失）':'无';
  infoPath.style.color=hasPath?'#f85149':'#0E61AC';
  infoVis.textContent=visibility.toFixed(2);
  infoResult.textContent=visibility>0.5?'干涉条纹':'无干涉（两个单缝叠加）';
  infoResult.style.color=visibility>0.5?'#0E61AC':'#f85149';
}

sliderMark.addEventListener('input',function(){markOn=+sliderMark.value;updateUI();if(!running)draw()});
sliderErase.addEventListener('input',function(){eraseOn=+sliderErase.value;updateUI();if(!running)draw()});
sliderD.addEventListener('input',function(){slitD=+sliderD.value;updateUI();if(!running)draw()});

btnStart.addEventListener('click',function(){
  if(running){pause();return}
  running=true;btnStart.classList.add('active');btnPause.classList.remove('active');
  if(!animFrameId)animFrameId=requestAnimationFrame(animate);
});
btnPause.addEventListener('click',pause);
function pause(){running=false;btnStart.classList.remove('active');btnPause.classList.add('active')}
btnReset.addEventListener('click',function(){
  markOn=0;eraseOn=0;slitD=10;animTime=0;lastFrameTime=null;
  sliderMark.value=0;sliderErase.value=0;sliderD.value=10;
  updateUI();if(!running)draw();
});

function drawSetup(){
  var W=canvasSetup.width,H=canvasSetup.height;
  ctxS.clearRect(0,0,W,H);
  ctxS.fillStyle='#FAF2E0';ctxS.fillRect(0,0,W,H);
  var cx=W/2,cy=H/2;

  ctxS.fillStyle='#2A7CC7';ctxS.beginPath();ctxS.arc(W*0.06,cy,8,0,Math.PI*2);ctxS.fill();
  ctxS.fillStyle='#1A1A1A';ctxS.font='10px sans-serif';ctxS.textAlign='center';
  ctxS.fillText('光源',W*0.06,cy+22);

  var slitX=W*0.22;
  ctxS.strokeStyle='#5A6370';ctxS.lineWidth=3;
  ctxS.beginPath();ctxS.moveTo(slitX,cy-40);ctxS.lineTo(slitX,cy-8);ctxS.stroke();
  ctxS.beginPath();ctxS.moveTo(slitX,cy+8);ctxS.lineTo(slitX,cy+40);ctxS.stroke();
  ctxS.fillStyle='#1A1A1A';ctxS.font='10px sans-serif';ctxS.textAlign='center';
  ctxS.fillText('双缝',slitX,cy+55);

  ctxS.strokeStyle='#2A7CC7';ctxS.lineWidth=1.5;
  ctxS.beginPath();ctxS.moveTo(W*0.06+10,cy);ctxS.lineTo(slitX,cy);ctxS.stroke();

  if(markOn){
    ctxS.strokeStyle='#f85149';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(slitX,cy-8);ctxS.lineTo(W*0.5,cy-15);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(slitX,cy+8);ctxS.lineTo(W*0.5,cy+15);ctxS.stroke();
    ctxS.fillStyle='#f85149';ctxS.font='9px sans-serif';ctxS.textAlign='center';
    ctxS.fillText('标记器',W*0.36,cy-22);
    ctxS.fillStyle='rgba(248,81,73,0.3)';
    ctxS.fillRect(W*0.34,cy-20,8,40);
  } else {
    ctxS.strokeStyle='#2A7CC7';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(slitX,cy-8);ctxS.lineTo(W*0.5,cy-10);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(slitX,cy+8);ctxS.lineTo(W*0.5,cy+10);ctxS.stroke();
  }

  if(eraseOn){
    var eraseX=W*0.5;
    ctxS.strokeStyle='#0E61AC';ctxS.lineWidth=3;
    ctxS.beginPath();ctxS.moveTo(eraseX,cy-25);ctxS.lineTo(eraseX,cy+25);ctxS.stroke();
    ctxS.fillStyle='#0E61AC';ctxS.font='9px sans-serif';ctxS.textAlign='center';
    ctxS.fillText('擦除器',eraseX,cy-30);
    ctxS.strokeStyle='#0E61AC';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(eraseX,cy-10);ctxS.lineTo(W*0.8,cy-8);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(eraseX,cy+10);ctxS.lineTo(W*0.8,cy+8);ctxS.stroke();
  } else if(markOn){
    ctxS.strokeStyle='#f85149';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(W*0.42,cy-15);ctxS.lineTo(W*0.8,cy-12);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(W*0.42,cy+15);ctxS.lineTo(W*0.8,cy+12);ctxS.stroke();
  } else {
    ctxS.strokeStyle='#2A7CC7';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(W*0.5,cy-10);ctxS.lineTo(W*0.8,cy-8);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(W*0.5,cy+10);ctxS.lineTo(W*0.8,cy+8);ctxS.stroke();
  }

  var screenX=W*0.82;
  ctxS.strokeStyle='#5A6370';ctxS.lineWidth=3;
  ctxS.beginPath();ctxS.moveTo(screenX,cy-40);ctxS.lineTo(screenX,cy+40);ctxS.stroke();
  ctxS.fillStyle='#1A1A1A';ctxS.font='10px sans-serif';ctxS.textAlign='center';
  ctxS.fillText('屏幕',screenX,cy+55);

  var hasPath=markOn&&!eraseOn;
  var vis=hasPath?0:1;
  for(var y=-30;y<=30;y+=4){
    var I;
    if(vis>0.5){
      I=0.3+0.7*Math.pow(Math.cos(y*0.15*slitD/10),2);
    } else {
      I=0.5;
    }
    var color=eraseOn?'210,168,255':'255,166,87';
    ctxS.fillStyle='rgba('+color+','+(0.15+I*0.85)+')';
    ctxS.beginPath();ctxS.arc(screenX+5,cy+y,2+I*3,0,Math.PI*2);ctxS.fill();
  }

  ctxS.fillStyle=hasPath?'#f85149':'#0E61AC';
  ctxS.font='bold 11px sans-serif';ctxS.textAlign='center';
  ctxS.fillText(hasPath?'路径已知 → 干涉消失':(eraseOn?'擦除路径 → 干涉恢复':'无标记 → 干涉条纹'),W/2,H-12);
}

function drawPattern(){
  var W=canvasPattern.width,H=canvasPattern.height;
  ctxP.clearRect(0,0,W,H);
  ctxP.fillStyle='#FAF2E0';ctxP.fillRect(0,0,W,H);
  var cy=H/2;
  var hasPath=markOn&&!eraseOn;
  var vis=hasPath?0:1;
  var color=eraseOn?[210,168,255]:[255,166,87];

  for(var y=0;y<H;y++){
    var sinT=(y-cy)/H*0.5;
    var beta=Math.PI*slitD*1e-6*sinT/550e-9;
    var single=beta===0?1:Math.sin(beta)/beta;
    var Is=single*single;
    var I;
    if(vis>0.5){
      var delta=Math.PI*slitD*1e-6*sinT/550e-9;
      I=Is*Math.pow(Math.cos(delta),2);
    } else {
      I=Is;
    }
    ctxP.fillStyle='rgba('+color[0]+','+color[1]+','+color[2]+','+I+')';
    ctxP.fillRect(0,y,W,1);
  }

  ctxP.fillStyle='#1A1A1A';ctxP.font='11px sans-serif';ctxP.textAlign='center';
  ctxP.fillText(hasPath?'无干涉（两个单缝叠加）':(eraseOn?'干涉恢复（擦除后）':'干涉条纹'),W/2,H-10);
}

function draw(){drawSetup();drawPattern()}

function animate(timestamp){
  if(!running){animFrameId=null;return}
  if(lastFrameTime===null)lastFrameTime=timestamp;
  var dt=Math.min((timestamp-lastFrameTime)/1000,0.1);
  lastFrameTime=timestamp;animTime+=dt;

  var cycle=animTime*0.3;
  var phase=cycle%3;
  if(phase<1){markOn=0;eraseOn=0;}
  else if(phase<2){markOn=1;eraseOn=0;}
  else{markOn=1;eraseOn=1;}
  sliderMark.value=markOn;sliderErase.value=eraseOn;
  updateUI();draw();
  if(running)animFrameId=requestAnimationFrame(animate);
}

function resizeCanvases(){
  var rowW=document.querySelector('.canvas-row').clientWidth;var cw=Math.floor((rowW-16)/2)-26;if(cw>680)cw=680;if(cw<200)cw=200;
  var sw=cw,sh=Math.round(sw*420/680);
  canvasSetup.width=sw;canvasSetup.height=sh;
  canvasSetup.style.width=sw+'px';canvasSetup.style.height=sh+'px';
  var pw=cw,ph=Math.round(pw*420/680);
  canvasPattern.width=pw;canvasPattern.height=ph;
  canvasPattern.style.width=pw+'px';canvasPattern.style.height=ph+'px';
}
window.addEventListener('resize',resizeCanvases);resizeCanvases();
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();if(running)pause();else btnStart.click()}
  else if(e.code==='KeyR'){e.preventDefault();btnReset.click()}
});
updateUI();draw();
</script>
</body>
</html>
