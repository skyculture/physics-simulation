<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电磁感应实验 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; --ac2:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; }
  #content { flex:1; display:flex; flex-direction:column; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.76em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:120px; accent-color:var(--accent); }
  .ctrl-group input[type="number"] { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 6px; color:var(--text); font-size:0.9em; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.74em; color:#5A6370; line-height:1.5; }
</style>
</head>
<body>

<div id="container">
  <div id="content">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="ctrl-group"><label>磁铁速度:</label><input type="range" id="speed" min="0.1" max="2" step="0.1" value="1"><input type="number" id="speedVal" value="1"></div>
      <div class="ctrl-group"><label>线圈匝数:</label><input type="range" id="turns" min="1" max="20" step="1" value="10"><input type="number" id="turnsVal" value="10"></div>
      <div class="ctrl-group"><label>磁场强度:</label><input type="range" id="bField" min="0.1" max="2" step="0.1" value="1"><input type="number" id="bFieldVal" value="1"></div>
    </div>
    <div id="info">电磁感应实验演示法拉第定律：当磁通量变化时，线圈中会产生感应电动势。磁铁在线圈中运动时，磁通量变化，产生感应电流。</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId;
let time = 0;

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(w && h) { canvas.width = w; canvas.height = h; }
}

function draw() {
  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  const speed = parseFloat(document.getElementById('speed').value);
  const turns = parseFloat(document.getElementById('turns').value);
  const B = parseFloat(document.getElementById('bField').value);
  
  const cx = canvas.width/2, cy = canvas.height/2;
  
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, canvas.height*0.2, 0, Math.PI*2);
  ctx.stroke();
  
  ctx.strokeStyle = 'rgba(14,97,172,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.arc(cx, cy, canvas.height*0.12, 0, Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);
  
  const magnetY = cy - canvas.height*0.3 + Math.sin(time*0.02*speed) * canvas.height*0.25;
  
  ctx.fillStyle = '#2A7CC7';
  ctx.fillRect(cx-15, magnetY-25, 30, 35);
  
  ctx.fillStyle = '#5A6370';
  ctx.font = 'bold 12px sans-serif';
  ctx.fillText('N', cx-4, magnetY-12);
  
  ctx.fillStyle = '#0E61AC';
  ctx.fillRect(cx-15, magnetY+10, 30, 15);
  ctx.fillStyle = '#5A6370';
  ctx.fillText('S', cx-4, magnetY+22);
  
  ctx.strokeStyle = '#2A7CC7';
  ctx.lineWidth = 1;
  for(let i=0;i<turns;i++) {
    const y = cy-canvas.height*0.15 + i*canvas.height*0.025;
    ctx.beginPath();
    ctx.moveTo(cx-canvas.height*0.15, y);
    ctx.lineTo(cx+canvas.height*0.15, y);
    ctx.stroke();
  }
  
  const flux = B * Math.cos(time*0.02*speed);
  const emf = -turns * B * speed * Math.sin(time*0.02*speed) * 0.1;
  
  ctx.fillStyle = '#5A6370';
  ctx.font = '11px sans-serif';
  ctx.fillText(`磁通量: ${flux.toFixed(2)} Wb`, canvas.width*0.05, canvas.height*0.9);
  ctx.fillText(`感应电动势: ${emf.toFixed(2)} V`, canvas.width*0.35, canvas.height*0.9);
  
  if(Math.abs(emf) > 0.1) {
    ctx.strokeStyle = emf > 0 ? '#0E61AC' : '#2A7CC7';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, canvas.height*0.75);
    ctx.lineTo(cx + emf*10, canvas.height*0.75);
    ctx.stroke();
  }
  
  time++;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('speed').addEventListener('input', e => { document.getElementById('speedVal').value = e.target.value; });
document.getElementById('turns').addEventListener('input', e => { document.getElementById('turnsVal').value = e.target.value; });
document.getElementById('bField').addEventListener('input', e => { document.getElementById('bFieldVal').value = e.target.value; });

resize();
window.addEventListener('resize', resize);
draw();
</script>
</body>
</html>
