<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📐 RLC振荡电路</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; }
  .header { width:100%; max-width:1200px; margin:0 auto 16px; background:#FFF7EB; border:1px solid #D4C9B8; border-radius:8px; padding:14px 24px 12px; text-align:center; }
  .header h1 { font-size:1.4em; color:#0E61AC; margin-bottom:4px; }
  .header p { font-size:0.8em; color:#5A6370; }
  .main { display:flex; gap:16px; max-width:1200px; margin:0 auto; }
  .canvas-wrap { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .controls { width:280px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .control-group { display:flex; flex-direction:column; gap:4px; }
  .control-group label { font-size:0.8em; color:#5A6370; }
  .control-group input[type="range"] { width:100%; }
  .control-group button { padding:7px 12px; border:1px solid #D4C9B8; border-radius:6px; background:#FFFFFF; color:#1A1A1A; cursor:pointer; font-size:0.82rem; font-family:inherit; transition:background 0.15s,border-color 0.15s; } .control-group button:hover { background:#FFF7EB; border-color:#0E61AC; } .control-group button.primary { background:#0E61AC; color:#fff; border-color:#0E61AC; }
  .info-panel { background:#FFF7EB; border:1px solid #D4C9B8; border-radius:8px; padding:14px 16px; }
  .info-panel .item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #D4C9B8; font-size:0.82rem; } .info-panel .item:last-child { border-bottom:none; } .info-panel .label { color:#5A6370; } .info-panel .value { color:#0E61AC; font-weight:600; font-variant-numeric:tabular-nums; }
  canvas { width:100%; border-radius:4px; }

@media (max-width:900px) {
  .main { flex-direction:column; }
  .controls { width:100%; }
  .canvas-wrap { min-height:300px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📐 RLC振荡电路</h1>
  <p>RLC串联电路的自由振荡和受迫振荡演示</p>
</div>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas" ></canvas>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>电阻 R (Ω): <span id="rVal">5</span></label>
      <input type="range" id="resistor" min="0" max="100" step="1" value="5">
    </div>
    <div class="control-group">
      <label>电感 L (mH): <span id="lVal">50</span></label>
      <input type="range" id="inductor" min="10" max="200" step="10" value="50">
    </div>
    <div class="control-group">
      <label>电容 C (μF): <span id="cVal">10</span></label>
      <input type="range" id="capacitor" min="1" max="100" step="1" value="10">
    </div>
    <div class="control-group">
      <label>激励电压 V (V): <span id="vVal">10</span></label>
      <input type="range" id="voltage" min="0" max="50" step="1" value="10">
    </div>
    <div class="control-group">
      <button id="startBtn">▶️ 开始振荡</button>
      <button id="resetBtn">🔄 重置</button>
    </div>
    <div class="info-panel">
      <div class="item"><span class="label">固有角频率:</span><span class="value" id="omega">0 rad/s</span></div>
      <div class="item"><span class="label">固有频率:</span><span class="value" id="freq">0 Hz</span></div>
      <div class="item"><span class="label">阻尼系数:</span><span class="value" id="damping">0 s⁻¹</span></div>
      <div class="item"><span class="label">品质因子 Q:</span><span class="value" id="qFactor">0</span></div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let running = true, animId = null;

const dpr = window.devicePixelRatio || 1;
function resizeCanvas() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w && h) { canvas.width = w * dpr; canvas.height = h * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0); }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);


let R = 5;
let L = 0.05;
let C = 10e-6;
let V0 = 10;

let Q = C * V0;
let I = 0;
let time = 0;
let history = [];
let running = false;

function draw() {
  ctx.fillStyle = '#FFF7EB';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = 120;
  const scale = 60;

  ctx.strokeStyle = '#D4C9B8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - 150, cy);
  ctx.lineTo(cx + 150, cy);
  ctx.stroke();

  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(cx, cy, 30, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = '#0E61AC';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 40);
  ctx.lineTo(cx, cy - 80);
  ctx.stroke();
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(cx - 20, cy - 45 - i * 8);
    ctx.lineTo(cx + 20, cy - 45 - i * 8);
    ctx.stroke();
  }

  ctx.strokeStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.moveTo(cx + 40, cy - 40);
  ctx.lineTo(cx + 80, cy - 40);
  ctx.lineTo(cx + 80, cy + 40);
  ctx.lineTo(cx + 40, cy + 40);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 80, cy - 20);
  ctx.lineTo(cx + 120, cy - 20);
  ctx.lineTo(cx + 120, cy + 20);
  ctx.lineTo(cx + 80, cy + 20);
  ctx.stroke();

  ctx.fillStyle = '#5A6370';
  ctx.font = '11px sans-serif';
  ctx.fillText('C', cx - 5, cy + 55);
  ctx.fillText('L', cx + 45, cy - 90);
  ctx.fillText('R', cx + 130, cy + 5);

  const graphY = 220;
  const graphHeight = 160;
  const graphWidth = canvas.width - 40;

  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(20, graphY, graphWidth, graphHeight);
  ctx.strokeStyle = '#D4C9B8';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = graphY + (graphHeight / 5) * i;
    ctx.beginPath();
    ctx.moveTo(20, y);
    ctx.lineTo(canvas.width - 20, y);
    ctx.stroke();
  }

  if (history.length > 1) {
    ctx.strokeStyle = '#0E61AC';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < history.length; i++) {
      const x = 20 + (i / (history.length - 1)) * graphWidth;
      const y = graphY + graphHeight / 2 + history[i] * scale * 0.5;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  ctx.fillStyle = '#0E61AC';
  ctx.font = '10px sans-serif';
  ctx.fillText('电容电压 Vc(t)', 25, graphY + 15);
  ctx.fillStyle = '#5A6370';
  ctx.fillText('时间 t', canvas.width - 50, graphY + graphHeight - 5);
}

function update() {
  if (!running) return;

  const dt = 0.0005;
  const steps = 5;

  for (let s = 0; s < steps; s++) {
    const dI_dt = (Q / C - I * R) / L;
    const dQ_dt = -I;

    I += dI_dt * dt;
    Q += dQ_dt * dt;
    time += dt;
  }

  history.push(Q / C);
  if (history.length > 500) history.shift();
}

function animate() {
  update();
  draw();
  requestAnimationFrame(animate);
}

function calcParams() {
  const omega0 = 1 / Math.sqrt(L * C);
  const freq = omega0 / (2 * Math.PI);
  const alpha = R / (2 * L);
  const Q = (1 / R) * Math.sqrt(L / C);

  document.getElementById('omega').textContent = omega0.toFixed(0) + ' rad/s';
  document.getElementById('freq').textContent = freq.toFixed(1) + ' Hz';
  document.getElementById('damping').textContent = alpha.toFixed(0) + ' s⁻¹';
  document.getElementById('qFactor').textContent = Q.toFixed(1);
}

document.getElementById('resistor').addEventListener('input', (e) => {
  R = parseFloat(e.target.value);
  document.getElementById('rVal').textContent = R;
  calcParams();
});

document.getElementById('inductor').addEventListener('input', (e) => {
  L = parseFloat(e.target.value) / 1000;
  document.getElementById('lVal').textContent = e.target.value;
  calcParams();
});

document.getElementById('capacitor').addEventListener('input', (e) => {
  C = parseFloat(e.target.value) * 1e-6;
  document.getElementById('cVal').textContent = e.target.value;
  calcParams();
});

document.getElementById('voltage').addEventListener('input', (e) => {
  V0 = parseFloat(e.target.value);
  document.getElementById('vVal').textContent = V0;
});

document.getElementById('startBtn').addEventListener('click', () => {
  Q = C * V0;
  I = 0;
  time = 0;
  history = [];
  running = !running;
  document.getElementById('startBtn').textContent = running ? '⏸️ 暂停' : '▶️ 开始振荡';
});

document.getElementById('resetBtn').addEventListener('click', () => {
  Q = C * V0;
  I = 0;
  time = 0;
  history = [];
  running = false;
  document.getElementById('startBtn').textContent = '▶️ 开始振荡';
});

calcParams();
draw();
animate();

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); running = !running; if (running) animate(); }
  if (e.code === 'KeyR') { e.preventDefault(); /* reset logic in reset() if available */ if (typeof reset === 'function') reset(); }
});

</script>
</body>
</html>
