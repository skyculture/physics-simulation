<div class="container">

  <div class="header">
    <h1>凸透镜成像</h1>
    <p class="subtitle">光线追踪仿真 &nbsp;|&nbsp; 薄透镜公式 <span>1/f = 1/u + 1/v</span> &nbsp;|&nbsp; 放大率 <span>M = −v/u</span></p>
  </div>

  <div class="canvas-wrapper">
    <canvas id="mainCanvas" width="900" height="500"></canvas>
  </div>

  <div class="panels">

    <div class="panel" id="controlPanel">
      <h3>⚙️ 参数调节</h3>

      <div class="control-group">
        <label>焦距 f <span class="val" id="fVal">10 cm</span></label>
        <input type="range" id="fSlider" min="1" max="20" value="10" step="0.1">
      </div>

      <div class="control-group">
        <label>物距 u <span class="val" id="uVal">30 cm</span></label>
        <input type="range" id="uSlider" min="1" max="40" value="30" step="0.1">
      </div>

      <div class="control-group">
        <label>物高 h <span class="val" id="hVal">5 cm</span></label>
        <input type="range" id="hSlider" min="1" max="10" value="5" step="0.1">
      </div>

      <div class="btn-row">
        <button class="btn primary" id="btnStart">▶ 开始动画</button>
        <button class="btn warn" id="btnPause">⏸ 暂停</button>
        <button class="btn danger" id="btnReset">↺ 重置</button>
      </div>
    </div>

    <div class="panel" id="infoPanel">
      <h3>📐 成像数据</h3>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">像距 v</span>
          <span class="info-value" id="infoV">15.00 cm</span>
        </div>
        <div class="info-item">
          <span class="info-label">放大率 M</span>
          <span class="info-value" id="infoM">-0.50</span>
        </div>
        <div class="info-item">
          <span class="info-label">像类型</span>
          <span class="info-value real" id="infoType">实像</span>
        </div>
        <div class="info-item">
          <span class="info-label">像取向</span>
          <span class="info-value real" id="infoOrient">倒立</span>
        </div>
        <div class="info-item">
          <span class="info-label">像大小</span>
          <span class="info-value" id="infoSize">2.50 cm</span>
        </div>
        <div class="info-item">
          <span class="info-label">像位置</span>
          <span class="info-value real" id="infoPos">透镜右侧</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  /*
   * ===================================================================
   * 凸透镜成像光线追踪仿真
   * ===================================================================
   * 物理原理：
   *   薄透镜公式: 1/f = 1/u + 1/v
   *     其中 f = 焦距, u = 物距(物体到透镜的距离), v = 像距(像到透镜的距离)
   *   像距公式: v = u*f / (u - f)
   *   放大率: M = -v/u = f / (f - u)
   *     M > 0 → 正立虚像, M < 0 → 倒立实像, |M| = 像高/物高
   *
   * 三条特征光线(用于确定像的位置):
   *   光线1(平行光线): 平行于主轴入射 → 折射后穿过像方焦点 F'
   *   光线2(过光心光线): 穿过透镜光心 O → 方向不变,直线传播
   *   光线3(过物方焦点光线): 穿过物方焦点 F 入射 → 折射后平行于主轴
   *
   * 成像规律:
   *   u > 2f  → 倒立缩小实像 (在透镜右侧, 异侧)
   *   u = 2f  → 倒立等大实像
   *   f < u < 2f → 倒立放大实像
   *   u = f   → 不成像 (折射光线平行, 像在无穷远处)
   *   u < f   → 正立放大虚像 (在透镜左侧, 同侧)
   * ===================================================================
   */

  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');

  const W = canvas.width;
  const H = canvas.height;

  const lensX = W / 2;
  const axisY = H / 2;

  const fSlider = document.getElementById('fSlider');
  const uSlider = document.getElementById('uSlider');
  const hSlider = document.getElementById('hSlider');

  const fValEl = document.getElementById('fVal');
  const uValEl = document.getElementById('uVal');
  const hValEl = document.getElementById('hVal');

  const infoV = document.getElementById('infoV');
  const infoM = document.getElementById('infoM');
  const infoType = document.getElementById('infoType');
  const infoOrient = document.getElementById('infoOrient');
  const infoSize = document.getElementById('infoSize');
  const infoPos = document.getElementById('infoPos');

  const btnStart = document.getElementById('btnStart');
  const btnPause = document.getElementById('btnPause');
  const btnReset = document.getElementById('btnReset');

  let focalLength = 10;
  let objectDistance = 30;
  let objectHeight = 5;

  let animId = null;
  let animDirection = -1;
  const ANIM_SPEED = 0.15;

  const EPS = 1e-6;

  /*
   * 计算像距 v：根据薄透镜公式 v = u*f / (u - f)
   * 当 u ≈ f 时, v → ±∞
   */
  function computeImageDistance(u, f) {
    const denom = u - f;
    if (Math.abs(denom) < EPS) return Infinity;
    return (u * f) / denom;
  }

  /*
   * 计算放大率 M = -v/u
   */
  function computeMagnification(v, u) {
    if (!isFinite(v)) return -Infinity;
    return -v / u;
  }

  /*
   * 计算动态像素比例尺(像素/厘米)
   * 默认 9 px/cm, 当物体或像超出画布时自动缩小, 最低 5 px/cm
   */
  function computeScale(u, v, f) {
    const margin = 55;
    const maxDist = Math.max(u, Math.abs(v), f * 1.8);
    const available = lensX - margin;
    const raw = available / Math.max(maxDist, 1);
    return Math.max(5, Math.min(9, raw));
  }

  /*
   * 在画布上绘制箭头(用于物体和像)
   * x: 箭头底部(在光轴上)的x坐标
   * tipY: 箭头尖端的y坐标(小于axisY为向上, 大于axisY为向下)
   * color: 颜色
   * label: 标签文字
   */
  function drawArrow(x, tipY, color, label) {
    const baseY = axisY;
    const headSize = 8;

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';

    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.lineTo(x, tipY);
    ctx.stroke();

    const dir = tipY < baseY ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(x, tipY);
    ctx.lineTo(x - headSize, tipY + dir * headSize);
    ctx.lineTo(x + headSize, tipY + dir * headSize);
    ctx.closePath();
    ctx.fill();

    if (label) {
      ctx.font = 'bold 13px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      const labelY = tipY < baseY ? tipY - 14 : tipY + 18;
      ctx.fillText(label, x, labelY);
    }
  }

  /*
   * 绘制凸透镜符号: 中心竖线 + 上下两端向外箭头
   */
  function drawLens() {
    const halfLen = 160;
    const topY = axisY - halfLen;
    const botY = axisY + halfLen;
    const arrowSize = 12;

    ctx.strokeStyle = '#e6edf3';
    ctx.fillStyle = '#e6edf3';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';

    ctx.beginPath();
    ctx.moveTo(lensX, topY);
    ctx.lineTo(lensX, botY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(lensX, topY);
    ctx.lineTo(lensX - arrowSize, topY + arrowSize);
    ctx.lineTo(lensX + arrowSize, topY + arrowSize);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(lensX, botY);
    ctx.lineTo(lensX - arrowSize, botY - arrowSize);
    ctx.lineTo(lensX + arrowSize, botY - arrowSize);
    ctx.closePath();
    ctx.fill();

    ctx.font = 'bold 13px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('O (光心)', lensX + 12, axisY + 18);
  }

  /*
   * 绘制光轴(水平虚线)
   */
  function drawOpticalAxis() {
    ctx.strokeStyle = '#484f58';
    ctx.lineWidth = 1;
    ctx.setLineDash([10, 6]);
    ctx.beginPath();
    ctx.moveTo(8, axisY);
    ctx.lineTo(W - 8, axisY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  /*
   * 绘制焦点标记 F 和 F'
   */
  function drawFocalPoints(f, scale) {
    const fPx = f * scale;
    const markerSize = 8;

    const positions = [
      { x: lensX - fPx, label: 'F (物方焦点)' },
      { x: lensX + fPx, label: "F' (像方焦点)" }
    ];

    positions.forEach(pt => {
      if (pt.x < 10 || pt.x > W - 10) return;

      ctx.strokeStyle = '#0E61AC';
      ctx.fillStyle = '#0E61AC';
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.moveTo(pt.x, axisY - markerSize);
      ctx.lineTo(pt.x, axisY + markerSize);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(pt.x, axisY, 3.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.font = '12px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(pt.label, pt.x, axisY + 22);
    });
  }

  /*
   * 绘制一条主光线(可附带虚像延长虚线)
   * 参数:
   *   segments: 实线段数组, 每项为 {x1, y1, x2, y2, color}
   *   virtualSegments: 虚线段(虚线)数组, 格式同上
   *   label: 光线标签
   */
  function drawRay(segments, virtualSegments, label) {
    segments.forEach(seg => {
      ctx.strokeStyle = seg.color;
      ctx.lineWidth = seg.width || 1.8;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();

      if (seg.arrow) {
        drawRayArrow(seg.x2, seg.y2, seg.x2 - seg.x1, seg.y2 - seg.y1, seg.color);
      }
    });

    if (virtualSegments && virtualSegments.length > 0) {
      virtualSegments.forEach(seg => {
        ctx.strokeStyle = seg.color;
        ctx.lineWidth = seg.width || 1.5;
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.moveTo(seg.x1, seg.y1);
        ctx.lineTo(seg.x2, seg.y2);
        ctx.stroke();
        ctx.setLineDash([]);
      });
    }

    if (label) {
      const lastSeg = segments[segments.length - 1];
      const lx = lastSeg.x2 + 8;
      const ly = lastSeg.y2 - 6;
      ctx.font = 'italic 11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'left';
      ctx.fillStyle = lastSeg.color;
      ctx.fillText(label, Math.min(lx, W - 70), ly);
    }
  }

  function drawRayArrow(x, y, dx, dy, color) {
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 1) return;
    const ux = dx / len;
    const uy = dy / len;
    const sz = 8;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x - sz * ux + sz * 0.4 * uy, y - sz * uy - sz * 0.4 * ux);
    ctx.lineTo(x - sz * ux - sz * 0.4 * uy, y - sz * uy + sz * 0.4 * ux);
    ctx.closePath();
    ctx.fill();
  }

  /*
   * 主绘制函数
   */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    /*
     * 步骤0: 计算物理量
     */
    const f = focalLength;
    const u = objectDistance;
    const h = objectHeight;
    const v = computeImageDistance(u, f);
    const M = computeMagnification(v, u);
    const isReal = (u > f + EPS);
    const isVirtual = (u < f - EPS);
    const isAtFocus = (!isFinite(v));
    const scale = computeScale(u, v, f);

    const objTipX = lensX - u * scale;
    const objTipY = axisY - h * scale;

    let imgTipX, imgTipY;
    if (isReal) {
      imgTipX = lensX + v * scale;
      imgTipY = axisY - M * h * scale;
    } else if (isVirtual) {
      imgTipX = lensX + v * scale;
      imgTipY = axisY - M * h * scale;
    } else {
      imgTipX = null;
      imgTipY = null;
    }

    /*
     * 步骤1: 绘制光轴和透镜
     */
    drawOpticalAxis();
    drawFocalPoints(f, scale);
    drawLens();

    /*
     * 步骤2: 绘制物体(箭头)
     */
    if (objTipX > 5) {
      drawArrow(objTipX, objTipY, '#f0883e', '物体');
    }

    /*
     * 步骤3: 绘制像(箭头)
     */
    if (isReal && imgTipX !== null && imgTipX < W - 10) {
      drawArrow(imgTipX, imgTipY, '#0E61AC', '实像');
    } else if (isVirtual && imgTipX !== null && imgTipX > 10) {
      drawArrow(imgTipX, imgTipY, '#d29922', '虚像');
    }

    /*
     * 步骤4: 绘制三条特征光线
     */
    if (isReal) {
      drawRealImageRays(objTipX, objTipY, imgTipX, imgTipY, f, scale);
    } else if (isVirtual) {
      drawVirtualImageRays(objTipX, objTipY, imgTipX, imgTipY, f, scale);
    } else if (isAtFocus) {
      drawAtFocusRays(objTipX, objTipY, f, scale);
    }

    /*
     * 步骤5: 绘制比例尺指示
     */
    ctx.font = '11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#484f58';
    ctx.fillText('比例尺: ' + scale.toFixed(1) + ' px/cm', W - 16, H - 14);

    /*
     * 步骤6: 更新信息面板
     */
    updateInfoPanel(v, M, isReal, isVirtual, isAtFocus, h);
  }

  /*
   * 实像情况(u > f)的三条特征光线
   * 实像: 三条折射光线汇聚于实像尖端
   */
  function drawRealImageRays(objTipX, objTipY, imgTipX, imgTipY, f, scale) {
    const fPx = f * scale;
    const fPrimeX = lensX + fPx;
    const fX = lensX - fPx;

    /*
     * 光线1(红色): 平行于主轴入射 → 折射后穿过像方焦点 F'
     * 入射段: 从物体尖端水平射向透镜
     * 折射段: 从透镜入射点穿向 F', 并延伸到实像尖端
     */
    const ray1LensY = objTipY;
    const ray1Slope = (axisY - ray1LensY) / (fPrimeX - lensX);
    const ray1ExitX = Math.min(W - 12, Math.max(lensX + 20, imgTipX + 30));
    const ray1ExitY = ray1LensY + ray1Slope * (ray1ExitX - lensX);

    drawRay([
      { x1: objTipX, y1: objTipY, x2: lensX, y2: ray1LensY, color: '#f85149', width: 1.8 },
      { x1: lensX, y1: ray1LensY, x2: ray1ExitX, y2: ray1ExitY, color: '#f85149', width: 1.8, arrow: true }
    ], null, '光线① 平行→过F\'');

    /*
     * 光线2(绿色): 过光心 O → 方向不变, 直线传播
     */
    const ray2Slope = (axisY - objTipY) / (lensX - objTipX);
    const ray2ExitX = Math.min(W - 12, Math.max(lensX + 20, imgTipX + 30));
    const ray2ExitY = axisY + ray2Slope * (ray2ExitX - lensX);

    drawRay([
      { x1: objTipX, y1: objTipY, x2: ray2ExitX, y2: ray2ExitY, color: '#0E61AC', width: 1.8, arrow: true }
    ], null, '光线② 过光心');

    /*
     * 光线3(蓝色): 穿过物方焦点 F 入射 → 折射后平行于主轴
     * 入射段: 从物体尖端射向 F (物方焦点)
     * 折射段: 从透镜入射点水平向右
     */
    const ray3Slope = (axisY - objTipY) / (fX - objTipX);
    const ray3LensY = objTipY + ray3Slope * (lensX - objTipX);
    const ray3ExitX = Math.min(W - 12, Math.max(lensX + 20, imgTipX + 30));

    drawRay([
      { x1: objTipX, y1: objTipY, x2: lensX, y2: ray3LensY, color: '#0E61AC', width: 1.8 },
      { x1: lensX, y1: ray3LensY, x2: ray3ExitX, y2: ray3LensY, color: '#0E61AC', width: 1.8, arrow: true }
    ], null, '光线③ 过F→平行');
  }

  /*
   * 虚像情况(u < f)的三条特征光线
   * 虚像: 折射光线发散, 其反向延长线汇聚于虚像尖端(在透镜左侧)
   */
  function drawVirtualImageRays(objTipX, objTipY, imgTipX, imgTipY, f, scale) {
    const fPx = f * scale;
    const fPrimeX = lensX + fPx;
    const fX = lensX - fPx;

    /*
     * 光线1(红色): 平行于主轴入射 → 折射后穿过像方焦点 F'
     * 实际折射光线向右上方穿过 F', 虚线反向延长至虚像尖端
     */
    const ray1LensY = objTipY;
    const ray1Slope = (axisY - ray1LensY) / (fPrimeX - lensX);
    const ray1ExitX = Math.min(W - 10, fPrimeX + 200);

    drawRay([
      { x1: objTipX, y1: objTipY, x2: lensX, y2: ray1LensY, color: '#f85149', width: 1.8 },
      { x1: lensX, y1: ray1LensY, x2: ray1ExitX, y2: ray1LensY + ray1Slope * (ray1ExitX - lensX), color: '#f85149', width: 1.8, arrow: true }
    ], [
      { x1: lensX, y1: ray1LensY, x2: imgTipX, y2: imgTipY, color: '#f85149', width: 1.5 }
    ], '光线① 平行→过F\'');

    /*
     * 光线2(绿色): 过光心 O → 方向不变
     * 实际折射光线方向不变向右, 虚线反向延长至虚像尖端
     */
    const ray2Slope = (axisY - objTipY) / (lensX - objTipX);
    const ray2ExitX = Math.min(W - 10, lensX + 250);

    drawRay([
      { x1: objTipX, y1: objTipY, x2: ray2ExitX, y2: axisY + ray2Slope * (ray2ExitX - lensX), color: '#0E61AC', width: 1.8, arrow: true }
    ], [
      { x1: lensX, y1: axisY, x2: imgTipX, y2: imgTipY, color: '#0E61AC', width: 1.5 }
    ], '光线② 过光心');

    /*
     * 光线3(蓝色): 射向物方焦点 F → 折射后平行于主轴
     * 入射段延长线经过 F (即光线从物体尖端射向透镜时, 其方向指向 F)
     * 折射段: 水平向右(平行于主轴)
     * 虚线反向延长至虚像尖端
     */
    const ray3Slope = (axisY - objTipY) / (fX - objTipX);
    const ray3LensY = objTipY + ray3Slope * (lensX - objTipX);
    const ray3ExitX = Math.min(W - 10, lensX + 250);

    drawRay([
      { x1: objTipX, y1: objTipY, x2: lensX, y2: ray3LensY, color: '#0E61AC', width: 1.8 },
      { x1: lensX, y1: ray3LensY, x2: ray3ExitX, y2: ray3LensY, color: '#0E61AC', width: 1.8, arrow: true }
    ], [
      { x1: lensX, y1: ray3LensY, x2: imgTipX, y2: imgTipY, color: '#0E61AC', width: 1.5 }
    ], '光线③ 过F→平行');
  }

  /*
   * u ≈ f 时, 折射光线平行射出, 不成像
   */
  function drawAtFocusRays(objTipX, objTipY, f, scale) {
    const fPx = f * scale;
    const fPrimeX = lensX + fPx;
    const fX = lensX - fPx;

    const ray1LensY = objTipY;
    const ray1Slope = (axisY - ray1LensY) / (fPrimeX - lensX);
    const ray1ExitX = Math.min(W - 10, fPrimeX + 200);

    drawRay([
      { x1: objTipX, y1: objTipY, x2: lensX, y2: ray1LensY, color: '#f85149', width: 1.8 },
      { x1: lensX, y1: ray1LensY, x2: ray1ExitX, y2: ray1LensY + ray1Slope * (ray1ExitX - lensX), color: '#f85149', width: 1.8, arrow: true }
    ], null, '光线① 平行→过F\'');

    const ray2Slope = (axisY - objTipY) / (lensX - objTipX);
    const ray2ExitX = Math.min(W - 10, lensX + 250);

    drawRay([
      { x1: objTipX, y1: objTipY, x2: ray2ExitX, y2: axisY + ray2Slope * (ray2ExitX - lensX), color: '#0E61AC', width: 1.8, arrow: true }
    ], null, '光线② 过光心');

    const ray3Slope = (axisY - objTipY) / (fX - objTipX);
    const ray3LensY = objTipY + ray3Slope * (lensX - objTipX);
    const ray3ExitX = Math.min(W - 10, lensX + 250);

    drawRay([
      { x1: objTipX, y1: objTipY, x2: lensX, y2: ray3LensY, color: '#0E61AC', width: 1.8 },
      { x1: lensX, y1: ray3LensY, x2: ray3ExitX, y2: ray3LensY, color: '#0E61AC', width: 1.8, arrow: true }
    ], null, '光线③ 过F→平行');

    ctx.font = 'italic 14px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#5A6370';
    ctx.fillText('折射光线平行射出, 不成像', lensX + 160, axisY - 50);
  }

  /*
   * 更新右侧信息面板
   */
  function updateInfoPanel(v, M, isReal, isVirtual, isAtFocus, h) {
    if (isAtFocus) {
      infoV.textContent = '∞';
      infoV.className = 'info-value infinity';
      infoM.textContent = '−∞';
      infoM.className = 'info-value infinity';
      infoType.textContent = '不成像';
      infoType.className = 'info-value none';
      infoOrient.textContent = '—';
      infoOrient.className = 'info-value none';
      infoSize.textContent = '—';
      infoSize.className = 'info-value none';
      infoPos.textContent = '—';
      infoPos.className = 'info-value none';
    } else {
      infoV.textContent = v.toFixed(2) + ' cm';
      infoV.className = isReal ? 'info-value real' : 'info-value virtual';

      infoM.textContent = M.toFixed(2);
      infoM.className = isReal ? 'info-value real' : 'info-value virtual';

      if (isReal) {
        infoType.textContent = '实像';
        infoType.className = 'info-value real';
        infoOrient.textContent = '倒立';
        infoOrient.className = 'info-value real';
        infoSize.textContent = (Math.abs(M) * h).toFixed(2) + ' cm';
        infoSize.className = 'info-value real';
        infoPos.textContent = '透镜右侧';
        infoPos.className = 'info-value real';
      } else {
        infoType.textContent = '虚像';
        infoType.className = 'info-value virtual';
        infoOrient.textContent = '正立';
        infoOrient.className = 'info-value virtual';
        infoSize.textContent = (M * h).toFixed(2) + ' cm';
        infoSize.className = 'info-value virtual';
        infoPos.textContent = '透镜左侧';
        infoPos.className = 'info-value virtual';
      }
    }
  }

  /*
   * 同步滑块值到显示标签
   */
  function syncSliders() {
    fValEl.textContent = focalLength.toFixed(1) + ' cm';
    uValEl.textContent = objectDistance.toFixed(1) + ' cm';
    hValEl.textContent = objectHeight.toFixed(1) + ' cm';
  }

  /*
   * 从滑块读取参数值
   */
  function readSliders() {
    focalLength = parseFloat(fSlider.value);
    objectDistance = parseFloat(uSlider.value);
    objectHeight = parseFloat(hSlider.value);
  }

  /*
   * 将参数值写回滑块
   */
  function writeSliders() {
    fSlider.value = focalLength;
    uSlider.value = objectDistance;
    hSlider.value = objectHeight;
  }

  /*
   * 动画循环: 物距随时间变化, 模拟物体靠近/远离透镜
   */
  function animationStep() {
    objectDistance += animDirection * ANIM_SPEED;

    if (objectDistance <= 1.0) {
      objectDistance = 1.0;
      animDirection = 1;
    } else if (objectDistance >= 40.0) {
      objectDistance = 40.0;
      animDirection = -1;
    }

    writeSliders();
    syncSliders();
    draw();

    animId = requestAnimationFrame(animationStep);
  }

  function startAnimation() {
    if (animId) return;
    readSliders();
    if (objectDistance <= 1.5) animDirection = 1;
    else if (objectDistance >= 39.5) animDirection = -1;
    syncSliders();
    animId = requestAnimationFrame(animationStep);
  }

  function pauseAnimation() {
    if (animId) {
      cancelAnimationFrame(animId);
      animId = null;
    }
  }

  function resetAll() {
    pauseAnimation();
    focalLength = 10;
    objectDistance = 30;
    objectHeight = 5;
    writeSliders();
    syncSliders();
    draw();
  }

  /*
   * 事件绑定
   */
  fSlider.addEventListener('input', () => {
    if (animId) return;
    readSliders();
    syncSliders();
    draw();
  });

  uSlider.addEventListener('input', () => {
    if (animId) return;
    readSliders();
    syncSliders();
    draw();
  });

  hSlider.addEventListener('input', () => {
    if (animId) return;
    readSliders();
    syncSliders();
    draw();
  });

  btnStart.addEventListener('click', startAnimation);
  btnPause.addEventListener('click', pauseAnimation);
  btnReset.addEventListener('click', resetAll);

  /*
   * 键盘快捷键
   */
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (animId) {
        pauseAnimation();
      } else {
        startAnimation();
      }
    } else if (e.key === 'r' || e.key === 'R') {
      resetAll();
    }
  });

  /*
   * 初始绘制
   */
  syncSliders();
  draw();

})();
</script>
</body>
</html>
