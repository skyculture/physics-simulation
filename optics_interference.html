<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光的干涉 - 物理数值仿真平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF2E0;color:#c9d1d9;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 16px 40px}
.container{width:100%;max-width:1100px}
.header{text-align:center;margin-bottom:24px;padding:28px 20px;background:#161b22;border:1px solid #D4C9B8;border-radius:12px}
.header h1{font-size:2rem;font-weight:700;color:#0E61AC;letter-spacing:.05em;margin-bottom:8px}
.header .subtitle{font-size:.95rem;color:#5A6370;line-height:1.6}
.canvas-row{display:flex;gap:16px;margin-bottom:20px}
@media(max-width:860px){.canvas-row{flex-direction:column}}
.panel{flex:1;background:#161b22;border:1px solid #D4C9B8;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center}
.panel h2{font-size:.95rem;font-weight:600;color:#5A6370;margin-bottom:8px;text-align:center}
.panel canvas{width:100%;height:auto;border-radius:6px;background:#FAF2E0}
.controls{background:#161b22;border:1px solid #D4C9B8;border-radius:12px;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:16px}
@media(max-width:640px){.controls{grid-template-columns:1fr}}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:.85rem;font-weight:600;color:#c9d1d9;display:flex;justify-content:space-between;align-items:baseline}
.control-group label .val{font-size:.8rem;color:#0E61AC;font-weight:700;min-width:80px;text-align:right}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;background:#D4C9B8;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #161b22;cursor:pointer;transition:transform .1s}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #161b22;cursor:pointer}
.info-bar{background:#161b22;border:1px solid #D4C9B8;border-radius:12px;padding:14px 24px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:24px;justify-content:center;font-size:.9rem}
.info-item{display:flex;align-items:baseline;gap:6px}
.info-item .info-label{color:#5A6370}
.info-item .info-value{color:#0E61AC;font-weight:700;font-size:1rem}
.btn-row{display:flex;gap:12px;justify-content:center}
.btn{padding:10px 28px;border:1px solid #D4C9B8;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit}
.btn-start{background:#238636;color:#fff;border-color:#2ea043}
.btn-start:hover{background:#2ea043}
.btn-pause{background:#9e6a03;color:#fff;border-color:#bb8009}
.btn-pause:hover{background:#bb8009}
.btn-reset{background:#FFFFFF;color:#c9d1d9;border-color:#D4C9B8}
.btn-reset:hover{background:#D4C9B8}
.legend-note{text-align:center;font-size:.78rem;color:#5A6370;margin-top:12px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>光的干涉</h1>
    <p class="subtitle">两束相干光叠加时会产生干涉现象。分波前干涉（如杨氏双缝）和分振幅干涉（如薄膜干涉）是两种基本的干涉类型。</p>
  </div>
  <div class="canvas-row">
    <div class="panel">
      <h2>🔬 干涉光路</h2>
      <canvas id="canvasSetup" width="680" height="420"></canvas>
    </div>
    <div class="panel">
      <h2>📊 干涉条纹与光强</h2>
      <canvas id="canvasFringe" width="680" height="420"></canvas>
    </div>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>干涉类型 <span class="val" id="valType">双缝</span></label>
      <input type="range" id="sliderType" min="0" max="2" step="1" value="0">
    </div>
    <div class="control-group">
      <label>光程差 Δ <span class="val" id="valDelta">0 nm</span></label>
      <input type="range" id="sliderDelta" min="0" max="2000" step="10" value="0">
    </div>
    <div class="control-group">
      <label>波长 λ <span class="val" id="valLambda">550 nm</span></label>
      <input type="range" id="sliderLambda" min="380" max="780" step="1" value="550">
    </div>
  </div>
  <div class="info-bar">
    <div class="info-item"><span class="info-label">相位差 φ=</span><span class="info-value" id="infoPhase">0.00π</span></div>
    <div class="info-item"><span class="info-label">光强 I/I₀=</span><span class="info-value" id="infoI">1.00</span></div>
    <div class="info-item"><span class="info-label">干涉条件=</span><span class="info-value" id="infoCond">相长</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart">▶ 动画</button>
    <button class="btn btn-pause" id="btnPause">⏸ 暂停</button>
    <button class="btn btn-reset" id="btnReset">↺ 重置</button>
  </div>
  <p class="legend-note">💡 提示：相长干涉 Δ=kλ，相消干涉 Δ=(k+½)λ。<br>类型：0=双缝干涉，1=薄膜干涉，2=劈尖干涉。</p>
</div>
<script>
var canvasSetup=document.getElementById('canvasSetup');
var ctxS=canvasSetup.getContext('2d');
var canvasFringe=document.getElementById('canvasFringe');
var ctxF=canvasFringe.getContext('2d');
var sliderType=document.getElementById('sliderType');
var sliderDelta=document.getElementById('sliderDelta');
var sliderLambda=document.getElementById('sliderLambda');
var valType=document.getElementById('valType');
var valDelta=document.getElementById('valDelta');
var valLambda=document.getElementById('valLambda');
var infoPhase=document.getElementById('infoPhase');
var infoI=document.getElementById('infoI');
var infoCond=document.getElementById('infoCond');
var btnStart=document.getElementById('btnStart');
var btnPause=document.getElementById('btnPause');
var btnReset=document.getElementById('btnReset');

var typeIdx=0,delta=0,lambda=550;
var typeNames=['双缝','薄膜','劈尖'];
var running=false,animTime=0,lastFrameTime=null,animFrameId=null;

function wavelengthToRGB(w){
  var r,g,b;
  if(w>=380&&w<440){r=-(w-440)/(440-380);g=0;b=1}
  else if(w>=440&&w<490){r=0;g=(w-440)/(490-440);b=1}
  else if(w>=490&&w<510){r=0;g=1;b=-(w-510)/(510-490)}
  else if(w>=510&&w<580){r=(w-510)/(580-510);g=1;b=0}
  else if(w>=580&&w<645){r=1;g=-(w-645)/(645-580);b=0}
  else if(w>=645&&w<=780){r=1;g=0;b=0}
  else{r=0;g=0;b=0}
  var factor=1;
  if(w>=380&&w<420)factor=0.3+0.7*(w-380)/(420-380);
  else if(w>700&&w<=780)factor=0.3+0.7*(780-w)/(780-700);
  var gamma=0.8;
  r=Math.round(255*Math.pow(r*factor,gamma));
  g=Math.round(255*Math.pow(g*factor,gamma));
  b=Math.round(255*Math.pow(b*factor,gamma));
  return[r,g,b];
}

function updateUI(){
  valType.textContent=typeNames[typeIdx];
  valDelta.textContent=delta+' nm';
  valLambda.textContent=lambda+' nm';
  var phi=2*Math.PI*delta/lambda;
  var I=Math.pow(Math.cos(phi/2),2);
  infoPhase.textContent=(phi/Math.PI).toFixed(2)+'π';
  infoI.textContent=I.toFixed(2);
  var isConstructive=Math.abs(I-1)<0.1;
  var isDestructive=Math.abs(I)<0.1;
  infoCond.textContent=isConstructive?'相长干涉':(isDestructive?'相消干涉':'部分干涉');
  infoCond.style.color=isConstructive?'#0E61AC':(isDestructive?'#f85149':'#2A7CC7');
}

sliderType.addEventListener('input',function(){typeIdx=+sliderType.value;updateUI();if(!running)draw()});
sliderDelta.addEventListener('input',function(){delta=+sliderDelta.value;updateUI();if(!running)draw()});
sliderLambda.addEventListener('input',function(){lambda=+sliderLambda.value;updateUI();if(!running)draw()});

btnStart.addEventListener('click',function(){
  if(running){pause();return}
  running=true;btnStart.classList.add('active');btnPause.classList.remove('active');
  if(!animFrameId)animFrameId=requestAnimationFrame(animate);
});
btnPause.addEventListener('click',pause);
function pause(){running=false;btnStart.classList.remove('active');btnPause.classList.add('active')}
btnReset.addEventListener('click',function(){
  typeIdx=0;delta=0;lambda=550;animTime=0;lastFrameTime=null;
  sliderType.value=0;sliderDelta.value=0;sliderLambda.value=550;
  updateUI();if(!running)draw();
});

function drawSetup(){
  var W=canvasSetup.width,H=canvasSetup.height;
  ctxS.clearRect(0,0,W,H);
  ctxS.fillStyle='#FAF2E0';ctxS.fillRect(0,0,W,H);
  var cx=W/2,cy=H/2;
  var colors=wavelengthToRGB(lambda);
  var colorStr='rgb('+colors[0]+','+colors[1]+','+colors[2]+')';

  if(typeIdx===0){
    ctxS.fillStyle=colorStr;ctxS.beginPath();ctxS.arc(W*0.08,cy,8,0,Math.PI*2);ctxS.fill();
    ctxS.fillStyle='#c9d1d9';ctxS.font='10px sans-serif';ctxS.textAlign='center';
    ctxS.fillText('光源',W*0.08,cy+22);

    var slitX=W*0.25;
    ctxS.strokeStyle='#5A6370';ctxS.lineWidth=3;
    ctxS.beginPath();ctxS.moveTo(slitX,cy-35);ctxS.lineTo(slitX,cy-8);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(slitX,cy+8);ctxS.lineTo(slitX,cy+35);ctxS.stroke();
    ctxS.fillText('S₁',slitX-12,cy-12);ctxS.fillText('S₂',slitX-12,cy+16);

    ctxS.strokeStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+',0.5)';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(W*0.08+10,cy);ctxS.lineTo(slitX,cy-8);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(W*0.08+10,cy);ctxS.lineTo(slitX,cy+8);ctxS.stroke();

    ctxS.beginPath();ctxS.moveTo(slitX,cy-8);ctxS.lineTo(W*0.75,cy-20);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(slitX,cy-8);ctxS.lineTo(W*0.75,cy+20);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(slitX,cy+8);ctxS.lineTo(W*0.75,cy-20);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(slitX,cy+8);ctxS.lineTo(W*0.75,cy+20);ctxS.stroke();

    ctxS.strokeStyle='#5A6370';ctxS.lineWidth=3;
    ctxS.beginPath();ctxS.moveTo(W*0.75,cy-40);ctxS.lineTo(W*0.75,cy+40);ctxS.stroke();
    ctxS.fillText('屏幕',W*0.75,cy+55);

    ctxS.fillStyle=colorStr;ctxS.font='bold 10px sans-serif';
    ctxS.fillText('分波前干涉',cx,H-12);
  } else if(typeIdx===1){
    ctxS.fillStyle=colorStr;ctxS.beginPath();ctxS.arc(W*0.1,cy-15,6,0,Math.PI*2);ctxS.fill();
    ctxS.strokeStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+',0.5)';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(W*0.1+8,cy-15);ctxS.lineTo(W*0.5,cy-15);ctxS.stroke();

    ctxS.fillStyle='rgba(14,97,172,0.2)';ctxS.fillRect(W*0.3,cy-5,W*0.4,10);
    ctxS.strokeStyle='#0E61AC';ctxS.lineWidth=1.5;ctxS.strokeRect(W*0.3,cy-5,W*0.4,10);
    ctxS.fillStyle='#0E61AC';ctxS.font='10px sans-serif';ctxS.textAlign='center';
    ctxS.fillText('薄膜 n',W*0.5,cy+22);

    ctxS.fillStyle='#5A6370';ctxS.fillRect(W*0.25,cy+5,W*0.5,8);
    ctxS.fillStyle='#5A6370';ctxS.font='9px sans-serif';
    ctxS.fillText('玻璃',W*0.5,cy+25);

    ctxS.strokeStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+',0.5)';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(W*0.5,cy-15);ctxS.lineTo(W*0.85,cy-30);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(W*0.5,cy-5);ctxS.lineTo(W*0.85,cy+10);ctxS.stroke();

    ctxS.fillStyle='#c9d1d9';ctxS.font='9px sans-serif';ctxS.textAlign='center';
    ctxS.fillText('反射光1',W*0.7,cy-35);ctxS.fillText('反射光2',W*0.7,cy+20);

    ctxS.fillStyle=colorStr;ctxS.font='bold 10px sans-serif';
    ctxS.fillText('分振幅干涉（薄膜）',cx,H-12);
  } else {
    ctxS.fillStyle=colorStr;ctxS.beginPath();ctxS.arc(W*0.1,cy-20,6,0,Math.PI*2);ctxS.fill();
    ctxS.strokeStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+',0.5)';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(W*0.1+8,cy-20);ctxS.lineTo(W*0.4,cy-5);ctxS.stroke();

    ctxS.fillStyle='#5A6370';
    ctxS.beginPath();ctxS.moveTo(W*0.25,cy+10);ctxS.lineTo(W*0.75,cy+10);ctxS.lineTo(W*0.75,cy-5);ctxS.closePath();ctxS.fill();
    ctxS.strokeStyle='#0E61AC';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(W*0.25,cy+10);ctxS.lineTo(W*0.75,cy+10);ctxS.lineTo(W*0.75,cy-5);ctxS.closePath();ctxS.stroke();

    ctxS.fillStyle='rgba(14,97,172,0.15)';
    ctxS.beginPath();ctxS.moveTo(W*0.25,cy+10);ctxS.lineTo(W*0.75,cy+10);ctxS.lineTo(W*0.75,cy-5);ctxS.closePath();ctxS.fill();

    ctxS.fillStyle='#c9d1d9';ctxS.font='10px sans-serif';ctxS.textAlign='center';
    ctxS.fillText('上玻璃',W*0.5,cy-10);
    ctxS.fillText('空气劈尖',W*0.5,cy+8);
    ctxS.fillStyle='#5A6370';ctxS.fillRect(W*0.25,cy+10,W*0.5,8);
    ctxS.fillStyle='#c9d1d9';ctxS.fillText('下玻璃',W*0.5,cy+28);

    ctxS.strokeStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+',0.5)';ctxS.lineWidth=1.5;
    ctxS.beginPath();ctxS.moveTo(W*0.4,cy-5);ctxS.lineTo(W*0.85,cy-15);ctxS.stroke();
    ctxS.beginPath();ctxS.moveTo(W*0.4,cy+5);ctxS.lineTo(W*0.85,cy+5);ctxS.stroke();

    ctxS.fillStyle=colorStr;ctxS.font='bold 10px sans-serif';
    ctxS.fillText('劈尖干涉',cx,H-12);
  }
}

function drawFringe(){
  var W=canvasFringe.width,H=canvasFringe.height;
  ctxF.clearRect(0,0,W,H);
  ctxF.fillStyle='#FAF2E0';ctxF.fillRect(0,0,W,H);
  var colors=wavelengthToRGB(lambda);
  var cy=H/2;

  if(typeIdx===0){
    var d=20e-6;
    var sinMax=0.03;
    for(var y=0;y<H;y++){
      var sinT=(y-cy)/H*2*sinMax;
      var deltaPath=d*sinT;
      var phi=2*Math.PI*deltaPath/lambda*1e9;
      var I=Math.pow(Math.cos(phi/2),2);
      ctxF.fillStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+','+I+')';
      ctxF.fillRect(0,y,W,1);
    }
  } else if(typeIdx===1){
    for(var y=0;y<H;y++){
      var t=y/H;
      var localDelta=delta*t;
      var phi=2*Math.PI*localDelta/lambda;
      var I=Math.pow(Math.cos(phi/2),2);
      ctxF.fillStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+','+I+')';
      ctxF.fillRect(0,y,W,1);
    }
  } else {
    for(var y=0;y<H;y++){
      var t=y/H;
      var localDelta=delta*t;
      var phi=2*Math.PI*localDelta/lambda;
      var I=Math.pow(Math.cos(phi/2),2);
      ctxF.fillStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+','+I+')';
      ctxF.fillRect(0,y,W*0.4,1);
      ctxF.fillRect(W*0.6+y*0.3,y,W*0.4-y*0.3,1);
    }
  }

  var ml=60,mt=30,mr=30,mb=50;
  var pw=W-ml-mr,ph=H-mt-mb;
  ctxF.strokeStyle='#484f58';ctxF.lineWidth=1.5;
  ctxF.beginPath();ctxF.moveTo(ml,mt+ph);ctxF.lineTo(ml,mt);ctxF.stroke();
  ctxF.beginPath();ctxF.moveTo(ml,mt+ph);ctxF.lineTo(ml+pw,mt+ph);ctxF.stroke();

  ctxF.strokeStyle='#D4C9B8';ctxF.lineWidth=0.8;ctxF.setLineDash([4,4]);
  for(var i=0;i<=4;i++){var y=mt+ph-i*(ph/4);ctxF.beginPath();ctxF.moveTo(ml,y);ctxF.lineTo(ml+pw,y);ctxF.stroke()}
  ctxF.setLineDash([]);

  ctxF.fillStyle='#5A6370';ctxF.font='11px sans-serif';ctxF.textAlign='right';
  for(var i=0;i<=4;i++){var y=mt+ph-i*(ph/4);ctxF.fillText((i/4).toFixed(1),ml-6,y+4)}
  ctxF.textAlign='center';
  ctxF.fillText('位置',ml+pw/2,mt+ph+18);

  ctxF.strokeStyle='rgb('+colors[0]+','+colors[1]+','+colors[2]+')';
  ctxF.lineWidth=2.5;ctxF.shadowColor='rgb('+colors[0]+','+colors[1]+','+colors[2]+')';ctxF.shadowBlur=6;
  ctxF.beginPath();
  for(var i=0;i<=200;i++){
    var t=i/200;
    var localDelta=typeIdx===0?delta:delta*t;
    var phi=2*Math.PI*localDelta/lambda;
    var I=Math.pow(Math.cos(phi/2),2);
    var px=ml+t*pw;
    var py=mt+ph-I*ph;
    if(i===0)ctxF.moveTo(px,py);else ctxF.lineTo(px,py);
  }
  ctxF.stroke();ctxF.shadowBlur=0;

  ctxF.strokeStyle='#2A7CC7';ctxF.lineWidth=2;ctxF.strokeRect(ml,mt,pw,ph);
}

function draw(){drawSetup();drawFringe()}

function animate(timestamp){
  if(!running){animFrameId=null;return}
  if(lastFrameTime===null)lastFrameTime=timestamp;
  var dt=Math.min((timestamp-lastFrameTime)/1000,0.1);
  lastFrameTime=timestamp;animTime+=dt;
  delta=(delta+dt*200)%2000;
  sliderDelta.value=Math.round(delta);
  updateUI();draw();
  if(running)animFrameId=requestAnimationFrame(animate);
}

function resizeCanvases(){
  var rowW=document.querySelector('.canvas-row').clientWidth;var cw=Math.floor((rowW-16)/2)-26;if(cw>680)cw=680;if(cw<200)cw=200;
  var sw=cw,sh=Math.round(sw*420/680);
  canvasSetup.width=sw;canvasSetup.height=sh;
  canvasSetup.style.width=sw+'px';canvasSetup.style.height=sh+'px';
  var fw=cw,fh=Math.round(fw*420/680);
  canvasFringe.width=fw;canvasFringe.height=fh;
  canvasFringe.style.width=fw+'px';canvasFringe.style.height=fh+'px';
}
window.addEventListener('resize',resizeCanvases);resizeCanvases();
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();if(running)pause();else btnStart.click()}
  else if(e.code==='KeyR'){e.preventDefault();btnReset.click()}
});
updateUI();draw();
</script>
</body>
</html>
