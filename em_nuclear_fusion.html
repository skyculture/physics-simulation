<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>磁约束核聚变 - 物理数值仿真平台</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#FAF2E0;color:#1A1A1A;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif}
#app{height:100%;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#FFF7EB;border-bottom:1px solid #D4C9B8}
#back{background:#FFFFFF;border:1px solid #D4C9B8;color:#1A1A1A;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px}
#back:hover{background:#D4C9B8}
header h1{margin:0;font-size:18px;font-weight:600}
#info{margin-left:auto;color:#5A6370;font-size:13px}
main{flex:1;display:flex;overflow:hidden}
#canvasWrap{flex:1;position:relative}
canvas{display:block;width:100%;height:100%}
#sidebar{width:280px;background:#FFF7EB;border-left:1px solid #D4C9B8;padding:14px;overflow:auto}
.sec{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #D4C9B8}
.sec:last-child{border-bottom:none}
h3{margin:0 0 8px 0;font-size:14px;color:#0E61AC}
.row{display:flex;align-items:center;gap:10px;margin:8px 0}
.row label{flex:0 0 120px;font-size:13px}
.row input[type=range]{flex:1}
.row input[type=number]{width:70px;background:#FAF2E0;border:1px solid #D4C9B8;color:#1A1A1A;padding:6px 8px;border-radius:6px}

@media (max-width:900px) {
  .main { flex-direction:column; }
  .controls { width:100%; }
  .canvas-wrap { min-height:300px; }
}
</style>
</head>
<body>

<div id="app">

<main>
<div id="canvasWrap"><canvas id="c"></canvas></div>
<div id="sidebar">
<div class="sec">
<h3>参数设置</h3>
<div class="row"><label>等离子体温度</label><input id="p1" type="range" min="0.5" max="3" step="0.1" value="1.5"><input id="p1n" type="number" value="1.5"></div>
<div class="row"><label>磁场强度</label><input id="p2" type="range" min="1" max="5" step="0.2" value="3"><input id="p2n" type="number" value="3"></div>
<div class="row"><label>密度</label><input id="p3" type="range" min="0.5" max="2" step="0.1" value="1"><input id="p3n" type="number" value="1"></div>
</div>
<div class="sec">
<h3>显示</h3>
<div class="row"><label>粒子数</label><input id="p4" type="range" min="50" max="500" value="200"><input id="p4n" type="number" value="200"></div>
</div>
</div>
</main>
</div>
<script>
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
function resize(){const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth,h=canvas.clientHeight;if(w&&h){canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}}
window.addEventListener('resize',resize);
let inited=false;
const p1=document.getElementById('p1'),p1n=document.getElementById('p1n');
const p2=document.getElementById('p2'),p2n=document.getElementById('p2n');
const p3=document.getElementById('p3'),p3n=document.getElementById('p3n');
const p4=document.getElementById('p4'),p4n=document.getElementById('p4n');
function link(a,b){a.oninput=()=>{b.value=a.value;reset()};b.oninput=()=>{a.value=b.value;reset()}}
link(p1,p1n);link(p2,p2n);link(p3,p3n);link(p4,p4n);
let parts=[];
function reset(){const N=+p4.value;parts=[];for(let i=0;i<N;i++){const r=(0.2+Math.random()*0.4);const th=Math.random()*Math.PI*2;const v0=0.05+0.1*Math.sqrt(+p1.value);parts.push({x:r*Math.cos(th),y:r*Math.sin(th),vx:-v0*Math.sin(th)+(Math.random()-0.5)*0.02,vy:v0*Math.cos(th)+(Math.random()-0.5)*0.02,q:i%2?1:-1})}}
reset();
let t=0;
function draw(){
if(!inited){resize();inited=true;}
const W=canvas.clientWidth,H=canvas.clientHeight;
ctx.clearRect(0,0,W,H);
const T=+p1.value,B=+p2.value,n=+p3.value;
t+=0.016;
const margin=60,top=margin,bottom=H-margin,left=margin,right=W-margin;
const cx=(left+right)/2,cy=(top+bottom)/2;
const scale=Math.min(right-left,bottom-top)/2.2;
ctx.fillStyle='#FAF2E0';ctx.fillRect(0,0,W,H);
// vacuum vessel
ctx.strokeStyle='#FFFFFF';ctx.lineWidth=4;ctx.beginPath();ctx.ellipse(cx,cy,scale*0.85,scale*0.45,0,0,Math.PI*2);ctx.stroke();
// magnetic field lines
ctx.strokeStyle='#D4C9B8';ctx.lineWidth=1;
for(let k=0;k<12;k++){
const ang=k/12*Math.PI*2;
ctx.beginPath();
for(let s=0;s<=1;s+=0.005){
const r=0.6+0.05*Math.sin(ang+t);
const th=ang+s*Math.PI*4;
const x=Math.cos(th)*(0.5+r*Math.cos(s*Math.PI*2+t)), y=Math.sin(th)*(0.5+r*Math.cos(s*Math.PI*2+t)), z=r*Math.sin(s*Math.PI*2+t);
const xx=cx+x*scale*0.8, yy=cy+y*scale*0.8-z*scale*0.3;
if(s===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);
}
ctx.stroke();
}
// particles
const dt=0.005;
for(const p of parts){
const r=Math.sqrt(p.x*p.x+p.y*p.y);
const Bz=B*(1-0.5*r*r);
const ax=p.vy*Bz*p.q*0.2;
const ay=-p.vx*Bz*p.q*0.2;
p.vx+=ax*dt; p.vy+=ay*dt;
p.x+=p.vx*dt; p.y+=p.vy*dt;
if(r>0.8){const rr=Math.sqrt(p.x*p.x+p.y*p.y);p.x*=0.75/rr;p.y*=0.75/rr;}
ctx.fillStyle=p.q>0?'#0E61AC':'#2A7CC7';
ctx.beginPath();ctx.arc(cx+p.x*scale,cy+p.y*scale,3,0,Math.PI*2);ctx.fill();
}
}
function loop(){draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
