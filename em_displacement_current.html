<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>位移电流 - 物理数值仿真平台</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#FAF2E0;color:#1A1A1A;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif}
#app{height:100%;display:flex;flex-direction:column}
main{flex:1;display:flex;overflow:hidden}#canvasWrap{flex:1;position:relative}canvas{display:block;width:100%;height:100%}
#sidebar{width:300px;background:#FFF7EB;border-left:1px solid #D4C9B8;padding:14px;overflow:auto}
.sec{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #D4C9B8}.sec:last-child{border-bottom:none}
h3{margin:0 0 8px 0;font-size:14px;color:#0E61AC}
.row{display:flex;align-items:center;gap:10px;margin:8px 0}.row label{flex:0 0 100px;font-size:13px}
.row input[type=range]{flex:1}.row input[type=number]{width:70px;background:#FAF2E0;border:1px solid #D4C9B8;color:#1A1A1A;padding:6px 8px;border-radius:6px}
</style></head>
<body>
<div id="app">
<main><div id="canvasWrap"><canvas id="c"></canvas></div>
<div id="sidebar">
<div class="sec"><h3>参数设置</h3>
<div class="row"><label>电压振幅 V</label><input id="p1" type="range" min="0.5" max="5" step="0.1" value="3"><input id="p1n" type="number" value="3"></div>
<div class="row"><label>频率 f</label><input id="p2" type="range" min="0.2" max="3" step="0.1" value="1"><input id="p2n" type="number" value="1"></div>
<div class="row"><label>介电常数 ε</label><input id="p3" type="range" min="1" max="8" step="0.5" value="3"><input id="p3n" type="number" value="3"></div>
</div></div></main></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
function resize(){const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth,h=canvas.clientHeight;if(w&&h){canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}}
window.addEventListener('resize',resize);let inited=false;
const p1=document.getElementById('p1'),p1n=document.getElementById('p1n'),p2=document.getElementById('p2'),p2n=document.getElementById('p2n'),p3=document.getElementById('p3'),p3n=document.getElementById('p3n');
function link(a,b){a.oninput=()=>{b.value=a.value};b.oninput=()=>{a.value=b.value}}
link(p1,p1n);link(p2,p2n);link(p3,p3n);
let t=0;
function draw(){
if(!inited){resize();inited=true;}
const W=canvas.clientWidth,H=canvas.clientHeight;if(!W||!H){requestAnimationFrame(draw);return}
const V=+p1.value,f=+p2.value,eps=+p3.value;t+=0.016;
ctx.clearRect(0,0,W,H);ctx.fillStyle='#FAF2E0';ctx.fillRect(0,0,W,H);
const margin=60,cx=(margin+W-margin)/2,cy=(margin+H-margin)/2;
const scale=Math.min(W,H)/5;
// capacitor plates
const pw=scale*0.06,ph=scale*1.5;
ctx.fillStyle='#FFFFFF';ctx.strokeStyle='#D4C9B8';ctx.lineWidth=2;
ctx.fillRect(cx-pw-scale*0.8,cy-ph/2,ph/6,ph);ctx.strokeRect(cx-pw-scale*0.8,cy-ph/2,ph/6,ph);
ctx.fillRect(cx+scale*0.8,cy-ph/2,ph/6,ph);ctx.strokeRect(cx+scale*0.8,cy-ph/2,ph/6,ph);
// E field oscillating
const Et=V*Math.sin(2*Math.PI*f*t);
ctx.strokeStyle='rgba(14,97,172,0.6)';ctx.lineWidth=2;
for(let i=0;i<8;i++){
const y=cy-ph*0.4+i*ph*0.12;
ctx.beginPath();ctx.moveTo(cx-scale*0.7,y);
const ex=Et*0.3*scale;
ctx.lineTo(cx+ex,y);ctx.stroke();
}
// displacement current Id = ε dE/dt
const Id=eps*V*2*Math.PI*f*Math.cos(2*Math.PI*f*t)*0.01;
ctx.strokeStyle='#2A7CC7';ctx.lineWidth=3;
const IdScale=Math.abs(Id)*20;
ctx.beginPath();ctx.ellipse(cx,cy-Math.sign(Id)*IdScale,scale*0.2,scale*0.1,0,0,Math.PI*2);ctx.stroke();
// B field rings (circular around displacement current)
ctx.strokeStyle='rgba(14,97,172,0.5)';ctx.lineWidth=2;
for(let r=0.3;r<=1.5;r+=0.4){
ctx.beginPath();ctx.ellipse(cx,cy,scale*r,scale*r*0.3,0,0,Math.PI*2);ctx.stroke();
}
ctx.fillStyle='#5A6370';ctx.font='14px system-ui';
ctx.fillText(`位移电流 I_d = ε₀·dΦ_E/dt ≈ ${Math.abs(Id).toFixed(3)} (arb.)`,margin,H-margin-20);
ctx.fillText(`∇×B = μ₀(J + ε₀∂E/∂t) — Maxwell修正项`,margin,H-margin-40);
requestAnimationFrame(draw);
}requestAnimationFrame(draw);
</script></body></html>
