<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📏 四点法测电阻</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; }
  .header { width:100%; max-width:1200px; margin:0 auto 16px; background:#FFF7EB; border:1px solid #D4C9B8; border-radius:8px; padding:14px 24px 12px; text-align:center; }
  .header h1 { font-size:1.4em; color:#0E61AC; margin-bottom:4px; }
  .header p { font-size:0.8em; color:#5A6370; }
  .main { display:flex; gap:16px; max-width:1200px; margin:0 auto; }
  .canvas-wrap { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .controls { width:280px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .control-group { display:flex; flex-direction:column; gap:4px; }
  .control-group label { font-size:0.8em; color:#5A6370; }
  .control-group input[type="range"] { width:100%; }
  .control-group button { padding:7px 12px; border:1px solid #D4C9B8; border-radius:6px; background:#FFFFFF; color:#1A1A1A; cursor:pointer; font-size:0.82rem; font-family:inherit; transition:background 0.15s,border-color 0.15s; } .control-group button:hover { background:#FFF7EB; border-color:#0E61AC; } .control-group button.primary { background:#0E61AC; color:#fff; border-color:#0E61AC; }
  .info-panel { background:#FFF7EB; border:1px solid #D4C9B8; border-radius:8px; padding:14px 16px; }
  .info-panel .item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #D4C9B8; font-size:0.82rem; } .info-panel .item:last-child { border-bottom:none; } .info-panel .label { color:#5A6370; } .info-panel .value { color:#0E61AC; font-weight:600; font-variant-numeric:tabular-nums; }
  canvas { width:100%; border-radius:4px; }

@media (max-width:900px) {
  .main { flex-direction:column; }
  .controls { width:100%; }
  .canvas-wrap { min-height:300px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📏 四点法测量电阻（开尔文电桥）</h1>
  <p>消除接触电阻影响，精确测量低电阻</p>
</div>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas" ></canvas>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>待测电阻 Rₓ (Ω): <span id="rxVal">0.01</span></label>
      <input type="range" id="rx" min="0.001" max="1" step="0.001" value="0.01">
    </div>
    <div class="control-group">
      <label>接触电阻 Rc (Ω): <span id="rcVal">0.1</span></label>
      <input type="range" id="rc" min="0" max="1" step="0.01" value="0.1">
    </div>
    <div class="control-group">
      <label>电流源 I (mA): <span id="currentVal">100</span></label>
      <input type="range" id="current" min="10" max="500" step="10" value="100">
    </div>
    <div class="control-group">
      <button id="measureBtn">📐 开始测量</button>
    </div>
    <div class="info-panel">
      <div class="item"><span class="label">电流端电压:</span><span class="value" id="vCurrent">0 mV</span></div>
      <div class="item"><span class="label">电压端电压:</span><span class="value" id="vVoltage">0 mV</span></div>
      <div class="item"><span class="label">传统法测量值:</span><span class="value" id="rTraditional">0 Ω</span></div>
      <div class="item"><span class="label">四点法测量值:</span><span class="value" id="rFourPoint">0 Ω</span></div>
      <div class="item"><span class="label">误差:</span><span class="value" id="error">0%</span></div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let running = true, animId = null;

const dpr = window.devicePixelRatio || 1;
function resizeCanvas() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w && h) { canvas.width = w * dpr; canvas.height = h * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0); }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);


let R_x = 0.01;
let R_c = 0.1;
let I = 0.1;

function draw() {
  ctx.fillStyle = '#FFF7EB';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 待测样品
  const sampleX = 200;
  const sampleY = 150;
  const sampleW = 200;
  const sampleH = 80;
  
  ctx.fillStyle = '#4a5568';
  ctx.fillRect(sampleX, sampleY, sampleW, sampleH);
  ctx.strokeStyle = '#718096';
  ctx.lineWidth = 2;
  ctx.strokeRect(sampleX, sampleY, sampleW, sampleH);
  
  // 四个探针
  const probeSpacing = 50;
  const probes = [];
  for (let i = 0; i < 4; i++) {
    probes.push({
      x: sampleX + 25 + i * probeSpacing,
      y: sampleY - 20
    });
  }
  
  // 探针连线
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 3;
  
  // 电流端 (外侧两个探针)
  ctx.beginPath();
  ctx.moveTo(probes[0].x, probes[0].y);
  ctx.lineTo(probes[0].x, sampleY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(probes[3].x, probes[3].y);
  ctx.lineTo(probes[3].x, sampleY);
  ctx.stroke();
  
  // 电压端 (内侧两个探针)
  ctx.strokeStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.moveTo(probes[1].x, probes[1].y);
  ctx.lineTo(probes[1].x, sampleY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(probes[2].x, probes[2].y);
  ctx.lineTo(probes[2].x, sampleY);
  ctx.stroke();
  
  // 探针点
  probes.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
    ctx.fillStyle = i % 2 === 0 ? '#0E61AC' : '#2A7CC7';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
  
  // 恒流源
  const sourceX = 80;
  const sourceY = 80;
  ctx.fillStyle = '#0E61AC';
  ctx.beginPath();
  ctx.moveTo(sourceX, sourceY);
  ctx.lineTo(sourceX + 30, sourceY - 15);
  ctx.lineTo(sourceX + 30, sourceY + 15);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.font = '10px sans-serif';
  ctx.fillText('I', sourceX + 15, sourceY + 4);
  
  // 电流表
  const ammeterX = 130;
  const ammeterY = 80;
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(ammeterX, ammeterY, 15, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#0E61AC';
  ctx.font = 'bold 10px sans-serif';
  ctx.fillText('A', ammeterX, ammeterY + 4);
  
  // 电压表
  const voltmeterX = 500;
  const voltmeterY = 80;
  ctx.strokeStyle = '#2A7CC7';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(voltmeterX, voltmeterY, 15, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#2A7CC7';
  ctx.fillText('V', voltmeterX, voltmeterY + 4);
  
  // 电路连线
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  
  // 电流回路
  ctx.beginPath();
  ctx.moveTo(sourceX, sourceY);
  ctx.lineTo(ammeterX, sourceY);
  ctx.lineTo(ammeterX, probes[0].y);
  ctx.lineTo(probes[0].x, probes[0].y);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(sourceX + 30, sourceY);
  ctx.lineTo(sourceX + 60, sourceY);
  ctx.lineTo(sourceX + 60, 280);
  ctx.lineTo(probes[3].x, 280);
  ctx.lineTo(probes[3].x, probes[3].y);
  ctx.stroke();
  
  // 电压测量回路
  ctx.strokeStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.moveTo(probes[1].x, probes[1].y);
  ctx.lineTo(probes[1].x, 80);
  ctx.lineTo(voltmeterX - 15, 80);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(probes[2].x, probes[2].y);
  ctx.lineTo(probes[2].x, 80);
  ctx.lineTo(voltmeterX + 15, 80);
  ctx.stroke();
  
  // 标注
  ctx.fillStyle = '#5A6370';
  ctx.font = '10px sans-serif';
  ctx.fillText('电流端 (CC)', 80, 330);
  ctx.fillText('电压端 (VV)', 350, 330);
  
  ctx.fillStyle = '#0E61AC';
  ctx.fillText('Rₓ = ' + R_x.toFixed(4) + ' Ω', 250, 110);
}

function measure() {
  const V_current = I * (R_x + 2 * R_c);
  const V_voltage = I * R_x;
  
  const R_traditional = V_current / I;
  const R_four_point = V_voltage / I;
  const error = ((R_traditional - R_x) / R_x * 100);
  
  document.getElementById('vCurrent').textContent = (V_current * 1000).toFixed(2) + ' mV';
  document.getElementById('vVoltage').textContent = (V_voltage * 1000).toFixed(4) + ' mV';
  document.getElementById('rTraditional').textContent = R_traditional.toFixed(4) + ' Ω';
  document.getElementById('rFourPoint').textContent = R_four_point.toFixed(4) + ' Ω';
  document.getElementById('error').textContent = error.toFixed(2) + '%';
}

document.getElementById('rx').addEventListener('input', (e) => {
  R_x = parseFloat(e.target.value);
  document.getElementById('rxVal').textContent = R_x;
  draw();
});

document.getElementById('rc').addEventListener('input', (e) => {
  R_c = parseFloat(e.target.value);
  document.getElementById('rcVal').textContent = R_c;
});

document.getElementById('current').addEventListener('input', (e) => {
  I = parseFloat(e.target.value) / 1000;
  document.getElementById('currentVal').textContent = e.target.value;
});

document.getElementById('measureBtn').addEventListener('click', measure);

draw();
measure();
</script>
</body>
</html>
