<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光的衍射 - 物理数值仿真平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF2E0;color:#1A1A1A;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 16px 40px}
.container{width:100%;max-width:1100px}
.header{text-align:center;margin-bottom:24px;padding:28px 20px;background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px}
.header h1{font-size:2rem;font-weight:700;color:#0E61AC;letter-spacing:.05em;margin-bottom:8px}
.header .subtitle{font-size:.95rem;color:#5A6370;line-height:1.6}
.canvas-row{display:flex;gap:16px;margin-bottom:20px}
@media(max-width:860px){.canvas-row{flex-direction:column}}
.panel{flex:1;background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center}
.panel h2{font-size:.95rem;font-weight:600;color:#5A6370;margin-bottom:8px;text-align:center}
.panel canvas{width:100%;height:auto;border-radius:6px;background:#FAF2E0}
.controls{background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:16px}
@media(max-width:640px){.controls{grid-template-columns:1fr}}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:.85rem;font-weight:600;color:#1A1A1A;display:flex;justify-content:space-between;align-items:baseline}
.control-group label .val{font-size:.8rem;color:#0E61AC;font-weight:700;min-width:80px;text-align:right}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;background:#D4C9B8;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #FFF7EB;cursor:pointer;transition:transform .1s}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #FFF7EB;cursor:pointer}
.info-bar{background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:14px 24px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:24px;justify-content:center;font-size:.9rem}
.info-item{display:flex;align-items:baseline;gap:6px}
.info-item .info-label{color:#5A6370}
.info-item .info-value{color:#0E61AC;font-weight:700;font-size:1rem}
.btn-row{display:flex;gap:12px;justify-content:center}
.btn{padding:10px 28px;border:1px solid #D4C9B8;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit}
.btn-start{background:#238636;color:#fff;border-color:#2ea043}
.btn-start:hover{background:#2ea043}
.btn-pause{background:#9e6a03;color:#fff;border-color:#bb8009}
.btn-pause:hover{background:#bb8009}
.btn-reset{background:#FFFFFF;color:#1A1A1A;border-color:#D4C9B8}
.btn-reset:hover{background:#D4C9B8}
.legend-note{text-align:center;font-size:.78rem;color:#5A6370;margin-top:12px;line-height:1.5}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>光的衍射</h1>
    <p class="subtitle">光通过狭缝时会发生衍射，在屏幕上形成明暗交替的条纹。单缝衍射和光栅衍射是两种典型的衍射现象。</p>
  </div>
  <div class="canvas-row">
    <div class="panel">
      <h2>🔬 衍射条纹</h2>
      <canvas id="canvasPattern" width="680" height="420"></canvas>
    </div>
    <div class="panel">
      <h2>📊 光强分布</h2>
      <canvas id="canvasIntensity" width="680" height="420"></canvas>
    </div>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>缝宽 a <span class="val" id="valA">5.0 μm</span></label>
      <input type="range" id="sliderA" min="1" max="20" step="0.5" value="5">
    </div>
    <div class="control-group">
      <label>缝数 N <span class="val" id="valN">1</span></label>
      <input type="range" id="sliderN" min="1" max="10" step="1" value="1">
    </div>
    <div class="control-group">
      <label>波长 λ <span class="val" id="valLambda">550 nm</span></label>
      <input type="range" id="sliderLambda" min="380" max="780" step="1" value="550">
    </div>
  </div>
  <div class="info-bar">
    <div class="info-item"><span class="info-label">中央亮纹半角宽=</span><span class="info-value" id="infoAngle">6.3°</span></div>
    <div class="info-item"><span class="info-label">第一暗纹 sinθ=</span><span class="info-value" id="infoFirst">0.110</span></div>
    <div class="info-item"><span class="info-label">光栅分辨本领=</span><span class="info-value" id="infoRes">1</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart">▶ 动画</button>
    <button class="btn btn-pause" id="btnPause">⏸ 暂停</button>
    <button class="btn btn-reset" id="btnReset">↺ 重置</button>
  </div>
  <p class="legend-note">💡 提示：单缝衍射 I=I₀[sin(β)/β]²，β=πa·sinθ/λ；多缝衍射受缝间干涉调制。<br>缝宽越小衍射越明显，缝数越多主峰越尖锐。</p>
</div>
<script>
var canvasPattern=document.getElementById('canvasPattern');
var ctxP=canvasPattern.getContext('2d');
var canvasIntensity=document.getElementById('canvasIntensity');
var ctxI=canvasIntensity.getContext('2d');
var sliderA=document.getElementById('sliderA');
var sliderN=document.getElementById('sliderN');
var sliderLambda=document.getElementById('sliderLambda');
var valA=document.getElementById('valA');
var valN=document.getElementById('valN');
var valLambda=document.getElementById('valLambda');
var infoAngle=document.getElementById('infoAngle');
var infoFirst=document.getElementById('infoFirst');
var infoRes=document.getElementById('infoRes');
var btnStart=document.getElementById('btnStart');
var btnPause=document.getElementById('btnPause');
var btnReset=document.getElementById('btnReset');

var a=5e-6,N=1,lambda=550e-9;
var running=false,animTime=0,lastFrameTime=null,animFrameId=null;

function wavelengthToRGB(w){
  var r,g,b;
  if(w>=380&&w<440){r=-(w-440)/(440-380);g=0;b=1}
  else if(w>=440&&w<490){r=0;g=(w-440)/(490-440);b=1}
  else if(w>=490&&w<510){r=0;g=1;b=-(w-510)/(510-490)}
  else if(w>=510&&w<580){r=(w-510)/(580-510);g=1;b=0}
  else if(w>=580&&w<645){r=1;g=-(w-645)/(645-580);b=0}
  else if(w>=645&&w<=780){r=1;g=0;b=0}
  else{r=0;g=0;b=0}
  var factor=1;
  if(w>=380&&w<420)factor=0.3+0.7*(w-380)/(420-380);
  else if(w>700&&w<=780)factor=0.3+0.7*(780-w)/(780-700);
  var gamma=0.8;
  r=Math.round(255*Math.pow(r*factor,gamma));
  g=Math.round(255*Math.pow(g*factor,gamma));
  b=Math.round(255*Math.pow(b*factor,gamma));
  return[r,g,b];
}

function updateUI(){
  valA.textContent=(a*1e6).toFixed(1)+' μm';
  valN.textContent=N;
  valLambda.textContent=(lambda*1e9).toFixed(0)+' nm';
  var sinFirst=lambda/a;
  var angle=Math.asin(Math.min(sinFirst,1))*180/Math.PI;
  infoAngle.textContent=angle.toFixed(1)+'°';
  infoFirst.textContent=sinFirst.toFixed(3);
  infoRes.textContent=N;
}

sliderA.addEventListener('input',function(){a=+sliderA.value*1e-6;updateUI();if(!running)draw()});
sliderN.addEventListener('input',function(){N=+sliderN.value;updateUI();if(!running)draw()});
sliderLambda.addEventListener('input',function(){lambda=+sliderLambda.value*1e-9;updateUI();if(!running)draw()});

btnStart.addEventListener('click',function(){
  if(running){pause();return}
  running=true;btnStart.classList.add('active');btnPause.classList.remove('active');
  if(!animFrameId)animFrameId=requestAnimationFrame(animate);
});
btnPause.addEventListener('click',pause);
function pause(){running=false;btnStart.classList.remove('active');btnPause.classList.add('active')}
btnReset.addEventListener('click',function(){
  a=5e-6;N=1;lambda=550e-9;animTime=0;lastFrameTime=null;
  sliderA.value=5;sliderN.value=1;sliderLambda.value=550;
  updateUI();if(!running)draw();
});

function sinc(x){if(Math.abs(x)<1e-8)return 1;return Math.sin(x)/x}

function intensity(sinTheta){
  var beta=Math.PI*a*sinTheta/lambda;
  var single=sinc(beta);
  var Is=single*single;
  if(N<=1)return Is;
  var d=a*3;
  var delta=Math.PI*d*sinTheta/lambda;
  var multi=sinc(N*delta)/sinc(delta);
  return Is*multi*multi;
}

function drawPattern(){
  var W=canvasPattern.width,H=canvasPattern.height;
  ctxP.clearRect(0,0,W,H);
  ctxP.fillStyle='#FAF2E0';ctxP.fillRect(0,0,W,H);
  var colors=wavelengthToRGB(lambda*1e9);
  var sinMax=0.3;
  var cy=H/2;

  for(var y=0;y<H;y++){
    var sinT=(y-cy)/H*2*sinMax;
    var I=intensity(sinT);
    ctxP.fillStyle='rgba('+colors[0]+','+colors[1]+','+colors[2]+','+I+')';
    ctxP.fillRect(0,y,W,1);
  }

  ctxP.strokeStyle='#2A7CC7';ctxP.lineWidth=1;ctxP.setLineDash([4,3]);
  var yFirst=lambda/a/sinMax*H/2;
  if(yFirst<H/2){
    ctxP.beginPath();ctxP.moveTo(W*0.2,cy-yFirst);ctxP.lineTo(W*0.8,cy-yFirst);ctxP.stroke();
    ctxP.beginPath();ctxP.moveTo(W*0.2,cy+yFirst);ctxP.lineTo(W*0.8,cy+yFirst);ctxP.stroke();
  }
  ctxP.setLineDash([]);
}

function drawIntensityGraph(){
  var W=canvasIntensity.width,H=canvasIntensity.height;
  ctxI.clearRect(0,0,W,H);
  ctxI.fillStyle='#FAF2E0';ctxI.fillRect(0,0,W,H);
  var ml=60,mt=30,mr=30,mb=50;
  var pw=W-ml-mr,ph=H-mt-mb;
  var sinMax=0.3;

  ctxI.strokeStyle='#484f58';ctxI.lineWidth=1.5;
  ctxI.beginPath();ctxI.moveTo(ml,mt+ph);ctxI.lineTo(ml,mt);ctxI.stroke();
  ctxI.beginPath();ctxI.moveTo(ml,mt+ph);ctxI.lineTo(ml+pw,mt+ph);ctxI.stroke();

  ctxI.strokeStyle='#D4C9B8';ctxI.lineWidth=0.8;ctxI.setLineDash([4,4]);
  for(var i=0;i<=4;i++){var y=mt+ph-i*(ph/4);ctxI.beginPath();ctxI.moveTo(ml,y);ctxI.lineTo(ml+pw,y);ctxI.stroke()}
  ctxI.setLineDash([]);

  ctxI.fillStyle='#5A6370';ctxI.font='11px sans-serif';ctxI.textAlign='right';
  for(var i=0;i<=4;i++){var y=mt+ph-i*(ph/4);ctxI.fillText((i/4).toFixed(1),ml-6,y+4)}
  ctxI.textAlign='center';
  ctxI.fillText('sinθ',ml+pw/2,mt+ph+38);
  for(var i=0;i<=6;i++){
    var x=ml+i*pw/6;
    var v=-sinMax+i*sinMax/3;
    ctxI.fillText(v.toFixed(2),x,mt+ph+18);
  }

  var colors=wavelengthToRGB(lambda*1e9);
  var colorStr='rgb('+colors[0]+','+colors[1]+','+colors[2]+')';
  ctxI.strokeStyle=colorStr;ctxI.lineWidth=2.5;ctxI.shadowColor=colorStr;ctxI.shadowBlur=6;
  ctxI.beginPath();
  for(var i=0;i<=400;i++){
    var sinT=-sinMax+i*2*sinMax/400;
    var I=intensity(sinT);
    var px=ml+i/400*pw;
    var py=mt+ph-I*ph;
    if(i===0)ctxI.moveTo(px,py);else ctxI.lineTo(px,py);
  }
  ctxI.stroke();ctxI.shadowBlur=0;

  if(N>1){
    ctxI.strokeStyle='rgba(255,166,87,0.5)';ctxI.lineWidth=1.5;ctxI.setLineDash([3,3]);
    ctxI.beginPath();
    for(var i=0;i<=400;i++){
      var sinT=-sinMax+i*2*sinMax/400;
      var beta=Math.PI*a*sinT/lambda;
      var single=sinc(beta);
      var Is=single*single;
      var px=ml+i/400*pw;
      var py=mt+ph-Is*ph;
      if(i===0)ctxI.moveTo(px,py);else ctxI.lineTo(px,py);
    }
    ctxI.stroke();ctxI.setLineDash([]);
  }

  ctxI.strokeStyle='#2A7CC7';ctxI.lineWidth=2;ctxI.strokeRect(ml,mt,pw,ph);
  ctxI.fillStyle='#5A6370';ctxI.font='10px sans-serif';ctxI.textAlign='left';
  ctxI.fillText('I/I₀',ml+5,mt+12);
  if(N>1){ctxI.fillStyle='rgba(255,166,87,0.7)';ctxI.fillText('单缝包络',ml+pw-80,mt+12)}
}

function draw(){drawPattern();drawIntensityGraph()}

function animate(timestamp){
  if(!running){animFrameId=null;return}
  if(lastFrameTime===null)lastFrameTime=timestamp;
  var dt=Math.min((timestamp-lastFrameTime)/1000,0.1);
  lastFrameTime=timestamp;animTime+=dt;
  a=(5+3*Math.sin(animTime*0.5))*1e-6;
  if(a<1e-6)a=1e-6;
  sliderA.value=a*1e6;
  updateUI();draw();
  if(running)animFrameId=requestAnimationFrame(animate);
}

function resizeCanvases(){
  var rowW=document.querySelector('.canvas-row').clientWidth;var cw=Math.floor((rowW-16)/2)-26;if(cw>680)cw=680;if(cw<200)cw=200;
  var pw=cw,ph=Math.round(pw*420/680);
  canvasPattern.width=pw;canvasPattern.height=ph;
  canvasPattern.style.width=pw+'px';canvasPattern.style.height=ph+'px';
  var iw=cw,ih=Math.round(iw*420/680);
  canvasIntensity.width=iw;canvasIntensity.height=ih;
  canvasIntensity.style.width=iw+'px';canvasIntensity.style.height=ih+'px';
}
window.addEventListener('resize',resizeCanvases);resizeCanvases();
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();if(running)pause();else btnStart.click()}
  else if(e.code==='KeyR'){e.preventDefault();btnReset.click()}
});
updateUI();draw();
</script>
</body>
</html>
