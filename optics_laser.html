<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激光原理 - 物理数值仿真平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 16px 40px}
.container{width:100%;max-width:1100px}
.header{text-align:center;margin-bottom:24px;padding:28px 20px;background:#161b22;border:1px solid #30363d;border-radius:12px}
.header h1{font-size:2rem;font-weight:700;color:#3fb950;letter-spacing:.05em;margin-bottom:8px}
.header .subtitle{font-size:.95rem;color:#8b949e;line-height:1.6}
.canvas-row{display:flex;gap:16px;margin-bottom:20px}
@media(max-width:860px){.canvas-row{flex-direction:column}}
.panel{flex:1;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center}
.panel h2{font-size:.95rem;font-weight:600;color:#8b949e;margin-bottom:8px;text-align:center}
.panel canvas{width:100%;height:auto;border-radius:6px;background:#0d1117}
.controls{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:16px}
@media(max-width:640px){.controls{grid-template-columns:1fr}}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:.85rem;font-weight:600;color:#c9d1d9;display:flex;justify-content:space-between;align-items:baseline}
.control-group label .val{font-size:.8rem;color:#3fb950;font-weight:700;min-width:80px;text-align:right}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;background:#30363d;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#3fb950;border:2px solid #161b22;cursor:pointer;transition:transform .1s}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#3fb950;border:2px solid #161b22;cursor:pointer}
.info-bar{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:14px 24px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:24px;justify-content:center;font-size:.9rem}
.info-item{display:flex;align-items:baseline;gap:6px}
.info-item .info-label{color:#8b949e}
.info-item .info-value{color:#3fb950;font-weight:700;font-size:1rem}
.btn-row{display:flex;gap:12px;justify-content:center}
.btn{padding:10px 28px;border:1px solid #30363d;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit}
.btn-start{background:#238636;color:#fff;border-color:#2ea043}
.btn-start:hover{background:#2ea043}
.btn-pause{background:#9e6a03;color:#fff;border-color:#bb8009}
.btn-pause:hover{background:#bb8009}
.btn-reset{background:#21262d;color:#c9d1d9;border-color:#30363d}
.btn-reset:hover{background:#30363d}
.legend-note{text-align:center;font-size:.78rem;color:#8b949e;margin-top:12px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>激光原理</h1>
    <p class="subtitle">激光（LASER）基于受激辐射放大原理。谐振腔中的增益介质在泵浦作用下实现粒子数反转，产生相干光放大。</p>
  </div>
  <div class="canvas-row">
    <div class="panel">
      <h2>🔬 谐振腔模型</h2>
      <canvas id="canvasCavity" width="680" height="420"></canvas>
    </div>
    <div class="panel">
      <h2>📊 能级与粒子数</h2>
      <canvas id="canvasEnergy" width="680" height="420"></canvas>
    </div>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>泵浦功率 <span class="val" id="valPump">50%</span></label>
      <input type="range" id="sliderPump" min="0" max="100" step="1" value="50">
    </div>
    <div class="control-group">
      <label>腔长 L <span class="val" id="valLength">30 cm</span></label>
      <input type="range" id="sliderLength" min="5" max="50" step="1" value="30">
    </div>
    <div class="control-group">
      <label>镜面反射率 <span class="val" id="valReflect">95%</span></label>
      <input type="range" id="sliderReflect" min="50" max="99" step="1" value="95">
    </div>
  </div>
  <div class="info-bar">
    <div class="info-item"><span class="info-label">粒子数反转 ΔN=</span><span class="info-value" id="infoN">0.00</span></div>
    <div class="info-item"><span class="info-label">增益 G=</span><span class="info-value" id="infoG">0.00</span></div>
    <div class="info-item"><span class="info-label">输出功率=</span><span class="info-value" id="infoPower">0.00 mW</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart">▶ 动画</button>
    <button class="btn btn-pause" id="btnPause">⏸ 暂停</button>
    <button class="btn btn-reset" id="btnReset">↺ 重置</button>
  </div>
  <p class="legend-note">💡 提示：泵浦功率超过阈值后才能实现粒子数反转，产生激光输出。<br>谐振腔的纵模频率间隔 Δν = c/(2L)。</p>
</div>
<script>
var canvasCavity=document.getElementById('canvasCavity');
var ctxC=canvasCavity.getContext('2d');
var canvasEnergy=document.getElementById('canvasEnergy');
var ctxE=canvasEnergy.getContext('2d');
var sliderPump=document.getElementById('sliderPump');
var sliderLength=document.getElementById('sliderLength');
var sliderReflect=document.getElementById('sliderReflect');
var valPump=document.getElementById('valPump');
var valLength=document.getElementById('valLength');
var valReflect=document.getElementById('valReflect');
var infoN=document.getElementById('infoN');
var infoG=document.getElementById('infoG');
var infoPower=document.getElementById('infoPower');
var btnStart=document.getElementById('btnStart');
var btnPause=document.getElementById('btnPause');
var btnReset=document.getElementById('btnReset');

var pump=50,cavityLength=30,reflectivity=95;
var running=false,animTime=0,lastFrameTime=null,animFrameId=null;
var photons=[];

function updateUI(){
  valPump.textContent=pump+'%';
  valLength.textContent=cavityLength+' cm';
  valReflect.textContent=reflectivity+'%';
  var threshold=40;
  var inversion=Math.max(0,(pump-threshold)/60);
  var gain=inversion*Math.log(reflectivity/100)*(-2);
  var power=Math.max(0,(pump-threshold)*0.5*reflectivity/100);
  infoN.textContent=inversion.toFixed(2);
  infoG.textContent=gain.toFixed(2);
  infoPower.textContent=power.toFixed(2)+' mW';
}

sliderPump.addEventListener('input',function(){pump=+sliderPump.value;updateUI();if(!running)draw()});
sliderLength.addEventListener('input',function(){cavityLength=+sliderLength.value;updateUI();if(!running)draw()});
sliderReflect.addEventListener('input',function(){reflectivity=+sliderReflect.value;updateUI();if(!running)draw()});

btnStart.addEventListener('click',function(){
  if(running){pause();return}
  running=true;btnStart.classList.add('active');btnPause.classList.remove('active');
  if(!animFrameId)animFrameId=requestAnimationFrame(animate);
});
btnPause.addEventListener('click',pause);
function pause(){running=false;btnStart.classList.remove('active');btnPause.classList.add('active')}
btnReset.addEventListener('click',function(){
  pump=50;cavityLength=30;reflectivity=95;animTime=0;lastFrameTime=null;photons=[];
  sliderPump.value=50;sliderLength.value=30;sliderReflect.value=95;
  updateUI();if(!running)draw();
});

function drawCavity(){
  var W=canvasCavity.width,H=canvasCavity.height;
  ctxC.clearRect(0,0,W,H);
  ctxC.fillStyle='#0d1117';ctxC.fillRect(0,0,W,H);
  var cy=H/2;
  var lenFrac=cavityLength/50;
  var leftX=W*0.08,rightX=leftX+(W*0.84)*lenFrac;
  var mediumLeft=leftX+12,mediumRight=rightX-4;

  ctxC.fillStyle='#58a6ff';ctxC.fillRect(leftX,cy-30,8,60);
  ctxC.strokeStyle='#58a6ff';ctxC.lineWidth=2;ctxC.strokeRect(leftX,cy-30,8,60);
  ctxC.fillStyle='#c9d1d9';ctxC.font='10px sans-serif';ctxC.textAlign='center';
  ctxC.fillText('全反镜',leftX+4,cy+48);
  ctxC.fillText('R=100%',leftX+4,cy+60);

  ctxC.fillStyle='#f85149';ctxC.fillRect(rightX,cy-30,8,60);
  ctxC.strokeStyle='#f85149';ctxC.lineWidth=2;ctxC.strokeRect(rightX,cy-30,8,60);
  ctxC.fillStyle='#c9d1d9';ctxC.font='10px sans-serif';ctxC.textAlign='center';
  ctxC.fillText('半透镜',rightX+4,cy+48);
  ctxC.fillText('R='+reflectivity+'%',rightX+4,cy+60);

  var pumpLevel=pump/100;
  ctxC.fillStyle='rgba(63,185,80,'+(0.1+pumpLevel*0.3)+')';
  ctxC.fillRect(mediumLeft,cy-25,mediumRight-mediumLeft,50);
  ctxC.strokeStyle='#3fb950';ctxC.lineWidth=1.5;ctxC.strokeRect(mediumLeft,cy-25,mediumRight-mediumLeft,50);
  ctxC.fillStyle='#3fb950';ctxC.font='11px sans-serif';ctxC.textAlign='center';
  ctxC.fillText('增益介质',(mediumLeft+mediumRight)/2,cy+4);

  var threshold=40;
  var laserOn=pump>threshold;
  if(laserOn){
    var intensity=Math.min(1,(pump-threshold)/40);
    ctxC.strokeStyle='rgba(255,166,87,'+(0.3+intensity*0.7)+')';
    ctxC.lineWidth=2+intensity*3;
    ctxC.beginPath();ctxC.moveTo(leftX+8,cy);ctxC.lineTo(rightX,cy);ctxC.stroke();
    ctxC.strokeStyle='rgba(255,166,87,'+intensity*0.8+')';
    ctxC.lineWidth=3+intensity*5;
    ctxC.beginPath();ctxC.moveTo(rightX+8,cy);ctxC.lineTo(W,cy);ctxC.stroke();
    ctxC.fillStyle='#ffa657';ctxC.font='bold 11px sans-serif';ctxC.textAlign='left';
    ctxC.fillText('激光输出 →',rightX+12,cy-15);
  }

  for(var i=0;i<photons.length;i++){
    var p=photons[i];
    var alpha=Math.max(0,1-Math.abs(p.x-0.5)*1.5);
    ctxC.fillStyle='rgba(255,166,87,'+alpha*0.8+')';
    ctxC.beginPath();ctxC.arc(mediumLeft+p.x*(mediumRight-mediumLeft),cy+p.y,3,0,Math.PI*2);ctxC.fill();
  }

  ctxC.fillStyle='#ffa657';ctxC.font='10px sans-serif';ctxC.textAlign='center';
  ctxC.fillText('泵浦 ↑',(mediumLeft+mediumRight)/2,cy-35);
  var pumpCount=Math.max(2,Math.round((mediumRight-mediumLeft)/30));
  for(var i=0;i<pumpCount;i++){
    var x=mediumLeft+10+i*(mediumRight-mediumLeft-20)/(pumpCount-1);
    ctxC.strokeStyle='rgba(255,166,87,0.5)';ctxC.lineWidth=1;
    ctxC.beginPath();ctxC.moveTo(x,cy-25);ctxC.lineTo(x,cy-35);ctxC.stroke();
    ctxC.beginPath();ctxC.moveTo(x-3,cy-32);ctxC.lineTo(x,cy-35);ctxC.lineTo(x+3,cy-32);ctxC.stroke();
  }

  ctxC.fillStyle='#8b949e';ctxC.font='10px sans-serif';ctxC.textAlign='center';
  ctxC.fillText('L = '+cavityLength+' cm',(mediumLeft+mediumRight)/2,cy+65);

  ctxC.fillStyle=laserOn?'#3fb950':'#f85149';
  ctxC.font='bold 12px sans-serif';ctxC.textAlign='center';
  ctxC.fillText(laserOn?'激光运转':'未达阈值',W/2,H-15);
}

function drawEnergy(){
  var W=canvasEnergy.width,H=canvasEnergy.height;
  ctxE.clearRect(0,0,W,H);
  ctxE.fillStyle='#0d1117';ctxE.fillRect(0,0,W,H);
  var ml=80,mt=30,mr=40,mb=50;
  var pw=W-ml-mr,ph=H-mt-mb;

  var E3=mt+ph*0.1;
  var E2=mt+ph*0.5;
  var E1=mt+ph*0.9;

  ctxE.strokeStyle='#f85149';ctxE.lineWidth=3;
  ctxE.beginPath();ctxE.moveTo(ml,E3);ctxE.lineTo(ml+pw*0.3,E3);ctxE.stroke();
  ctxE.fillStyle='#f85149';ctxE.font='11px sans-serif';ctxE.textAlign='right';
  ctxE.fillText('E₃',ml-8,E3+4);

  ctxE.strokeStyle='#3fb950';ctxE.lineWidth=3;
  ctxE.beginPath();ctxE.moveTo(ml,E2);ctxE.lineTo(ml+pw*0.3,E2);ctxE.stroke();
  ctxE.fillStyle='#3fb950';ctxE.font='11px sans-serif';ctxE.textAlign='right';
  ctxE.fillText('E₂',ml-8,E2+4);

  ctxE.strokeStyle='#58a6ff';ctxE.lineWidth=3;
  ctxE.beginPath();ctxE.moveTo(ml,E1);ctxE.lineTo(ml+pw*0.3,E1);ctxE.stroke();
  ctxE.fillStyle='#58a6ff';ctxE.font='11px sans-serif';ctxE.textAlign='right';
  ctxE.fillText('E₁',ml-8,E1+4);

  ctxE.strokeStyle='#ffa657';ctxE.lineWidth=2;
  ctxE.beginPath();ctxE.moveTo(ml+pw*0.15,E1-5);ctxE.lineTo(ml+pw*0.15,E3+5);ctxE.stroke();
  ctxE.beginPath();ctxE.moveTo(ml+pw*0.12,E1-10);ctxE.lineTo(ml+pw*0.15,E1-5);ctxE.lineTo(ml+pw*0.18,E1-10);ctxE.stroke();
  ctxE.fillStyle='#ffa657';ctxE.font='10px sans-serif';ctxE.textAlign='center';
  ctxE.fillText('泵浦',ml+pw*0.15,E1+15);

  ctxE.strokeStyle='#8b949e';ctxE.lineWidth=2;ctxE.setLineDash([4,3]);
  ctxE.beginPath();ctxE.moveTo(ml+pw*0.15,E3+5);ctxE.lineTo(ml+pw*0.15,E2-5);ctxE.stroke();
  ctxE.setLineDash([]);
  ctxE.fillStyle='#8b949e';ctxE.font='9px sans-serif';ctxE.textAlign='center';
  ctxE.fillText('非辐射跃迁',ml+pw*0.15,E2-10);

  ctxE.strokeStyle='#3fb950';ctxE.lineWidth=3;
  ctxE.beginPath();ctxE.moveTo(ml+pw*0.15,E2-5);ctxE.lineTo(ml+pw*0.15,E1+5);ctxE.stroke();
  ctxE.beginPath();ctxE.moveTo(ml+pw*0.12,E2-10);ctxE.lineTo(ml+pw*0.15,E2-5);ctxE.lineTo(ml+pw*0.18,E2-10);ctxE.stroke();
  ctxE.fillStyle='#3fb950';ctxE.font='bold 10px sans-serif';ctxE.textAlign='center';
  ctxE.fillText('受激辐射 hν',ml+pw*0.15,E2+18);

  var pumpLevel=pump/100;
  var n1=Math.max(0.1,1-pumpLevel*0.8);
  var n2=Math.min(0.9,pumpLevel*0.8);
  var barX=ml+pw*0.55;
  var barW=pw*0.15;

  ctxE.fillStyle='rgba(88,166,255,0.6)';ctxE.fillRect(barX,E1-n1*60,barW,n1*60);
  ctxE.strokeStyle='#58a6ff';ctxE.lineWidth=1.5;ctxE.strokeRect(barX,E1-n1*60,barW,n1*60);
  ctxE.fillStyle='#58a6ff';ctxE.font='9px sans-serif';ctxE.textAlign='center';
  ctxE.fillText('N₁='+n1.toFixed(2),barX+barW/2,E1+15);

  ctxE.fillStyle='rgba(63,185,80,0.6)';ctxE.fillRect(barX,E2-n2*60,barW,n2*60);
  ctxE.strokeStyle='#3fb950';ctxE.lineWidth=1.5;ctxE.strokeRect(barX,E2-n2*60,barW,n2*60);
  ctxE.fillStyle='#3fb950';ctxE.font='9px sans-serif';ctxE.textAlign='center';
  ctxE.fillText('N₂='+n2.toFixed(2),barX+barW/2,E2+15);

  var inversion=n2-n1;
  ctxE.fillStyle=inversion>0?'#3fb950':'#f85149';
  ctxE.font='bold 12px sans-serif';ctxE.textAlign='center';
  ctxE.fillText(inversion>0?'粒子数反转 ✓':'未反转 ✗',barX+barW/2,E3+5);

  var modeX=ml+pw*0.78;
  var modeW=pw*0.2;
  ctxE.strokeStyle='#8b949e';ctxE.lineWidth=1;
  ctxE.beginPath();ctxE.moveTo(modeX,E1);ctxE.lineTo(modeX,E3);ctxE.stroke();
  ctxE.beginPath();ctxE.moveTo(modeX,E1);ctxE.lineTo(modeX+modeW,E1);ctxE.stroke();

  var c=3e8;
  var L=cavityLength*0.01;
  var deltaNu=c/(2*L)/1e9;
  ctxE.fillStyle='#d2a8ff';ctxE.font='9px sans-serif';ctxE.textAlign='center';
  ctxE.fillText('纵模',modeX+modeW/2,E3-5);
  ctxE.fillText('Δν='+deltaNu.toFixed(0)+'MHz',modeX+modeW/2,E3+15);

  for(var i=0;i<5;i++){
    var y=E1-i*(E1-E3)/6;
    ctxE.strokeStyle='#d2a8ff';ctxE.lineWidth=1.5;
    ctxE.beginPath();ctxE.moveTo(modeX+3,y);ctxE.lineTo(modeX+modeW-3,y);ctxE.stroke();
  }
}

function draw(){drawCavity();drawEnergy()}

function animate(timestamp){
  if(!running){animFrameId=null;return}
  if(lastFrameTime===null)lastFrameTime=timestamp;
  var dt=Math.min((timestamp-lastFrameTime)/1000,0.1);
  lastFrameTime=timestamp;animTime+=dt;

  if(Math.random()<dt*5*pump/100){
    photons.push({x:0,y:(Math.random()-0.5)*30,dir:1});
  }
  for(var i=photons.length-1;i>=0;i--){
    photons[i].x+=photons[i].dir*dt*0.5*(30/cavityLength);
    if(photons[i].x>1){photons[i].dir=-1;photons[i].x=1;}
    if(photons[i].x<0){photons.splice(i,1);continue;}
    if(photons.length>30)photons.splice(0,1);
  }

  draw();
  if(running)animFrameId=requestAnimationFrame(animate);
}

function resizeCanvases(){
  var rowW=document.querySelector('.canvas-row').clientWidth;var cw=Math.floor((rowW-16)/2)-26;if(cw>680)cw=680;if(cw<200)cw=200;
  var sw=cw,sh=Math.round(sw*420/680);
  canvasCavity.width=sw;canvasCavity.height=sh;
  canvasCavity.style.width=sw+'px';canvasCavity.style.height=sh+'px';
  var ew=cw,eh=Math.round(ew*420/680);
  canvasEnergy.width=ew;canvasEnergy.height=eh;
  canvasEnergy.style.width=ew+'px';canvasEnergy.style.height=eh+'px';
}
window.addEventListener('resize',resizeCanvases);resizeCanvases();
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();if(running)pause();else btnStart.click()}
  else if(e.code==='KeyR'){e.preventDefault();btnReset.click()}
});
updateUI();draw();
</script>
</body>
</html>
