<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>狭义相对论 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; --ac2:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; }
  #content { flex:1; display:flex; flex-direction:column; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.76em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:120px; accent-color:var(--accent); }
  .ctrl-group input[type="number"] { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 6px; color:var(--text); font-size:0.9em; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.74em; color:#5A6370; line-height:1.5; }
@media (max-width:900px) {
  #container,#content{flex-direction:column;}
  #controls{flex-wrap:wrap;}
  canvas{min-height:300px;}
}
</style>
</head>
<body>

<div id="container">
  <div id="content">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="ctrl-group"><label>速度v/c:</label><input type="range" id="vRatio" min="0" max="0.99" step="0.01" value="0.5"><input type="number" id="vRatioVal" value="0.5"></div>
      <div class="ctrl-group"><label>静止时间t₀(s):</label><input type="range" id="t0" min="1" max="10" step="1" value="5"><input type="number" id="t0Val" value="5"></div>
      <div class="ctrl-group"><label>静止长度L₀(m):</label><input type="range" id="L0" min="1" max="100" step="1" value="10"><input type="number" id="L0Val" value="10"></div>
    </div>
    <div id="info">狭义相对论：时间膨胀 Δt = γΔt₀，长度收缩 L = L₀/γ，其中 γ = 1/√(1-v²/c²)。当速度接近光速时，时间变慢，长度收缩。</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dpr=window.devicePixelRatio||1;
let _cw=600,_ch=400;
function getW(){return canvas.clientWidth||_cw;}
function getH(){return canvas.clientHeight||_ch;}
function resizeCanvas(){
  const cw=canvas.clientWidth||_cw,ch=canvas.clientHeight||_ch;
  _cw=cw;_ch=ch;
  canvas.width=cw*dpr;canvas.height=ch*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
let animationId;
let time = 0;

function draw() {
  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0,0,getW(),getH());
  
  const vRatio = parseFloat(document.getElementById('vRatio').value);
  const t0 = parseFloat(document.getElementById('t0').value);
  const L0 = parseFloat(document.getElementById('L0').value);
  
  const gamma = 1 / Math.sqrt(1 - vRatio * vRatio);
  const t = gamma * t0;
  const L = L0 / gamma;
  
  const cx = getW()/2, cy = getH()/2;
  
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(getW()*0.1, getH()*0.1);
  ctx.lineTo(getW()*0.9, getH()*0.9);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(getW()*0.1, getH()*0.9);
  ctx.lineTo(getW()*0.9, getH()*0.1);
  ctx.stroke();
  
  ctx.fillStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.arc(cx, cy, 8, 0, Math.PI*2);
  ctx.fill();
  
  const ellipseWidth = getW() * 0.3 * (vRatio > 0.1 ? 1/gamma : 1);
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy, ellipseWidth, getH()*0.15, 0.5, 0, Math.PI*2);
  ctx.stroke();
  
  ctx.fillStyle = '#5A6370';
  ctx.font = '12px sans-serif';
  ctx.fillText(`速度 v = ${(vRatio*3e8/1e6).toFixed(0)} × 10⁶ m/s`, getW()*0.05, getH()*0.1);
  ctx.fillText(`γ = ${gamma.toFixed(3)}`, getW()*0.05, getH()*0.1+20);
  
  ctx.fillStyle = '#0E61AC';
  ctx.fillText(`时间膨胀: Δt = ${t.toFixed(2)} s (静止参考系: ${t0} s)`, getW()*0.05, getH()*0.8);
  ctx.fillStyle = '#2A7CC7';
  ctx.fillText(`长度收缩: L = ${L.toFixed(2)} m (静止长度: ${L0} m)`, getW()*0.05, getH()*0.8+20);
  
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = '#0E61AC';
  ctx.fillText(`E = mc²`, cx-40, getH()*0.5);
  
  time++;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('vRatio').addEventListener('input', e => { document.getElementById('vRatioVal').value = e.target.value; });
document.getElementById('t0').addEventListener('input', e => { document.getElementById('t0Val').value = e.target.value; });
document.getElementById('L0').addEventListener('input', e => { document.getElementById('L0Val').value = e.target.value; });

resizeCanvas();
window.addEventListener('resize', resize);
draw();

let _paused=false;
document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){e.preventDefault();
    _paused=!_paused;
    if(typeof isRunning!=='undefined'){isRunning=!_paused;if(isRunning&&typeof animate==='function')animate();else if(typeof cancelAnimationFrame==='function'&&typeof animationId!=='undefined')cancelAnimationFrame(animationId);}
    else if(typeof running!=='undefined'){running=!_paused;if(running&&typeof animate==='function')animate();}
    else if(typeof paused!=='undefined'){paused=_paused;if(!paused&&typeof animate==='function')animate();}
  }
  if(e.code==='KeyR'){e.preventDefault();if(typeof reset==='function')reset();}
});
</script>
</body>
</html>
