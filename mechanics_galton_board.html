<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高尔顿板、机械波和动量守恒实验 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; --ac2:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; }
  #content { flex:1; display:flex; flex-direction:column; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.76em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:120px; accent-color:var(--accent); }
  .ctrl-group input[type="number"] { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 6px; color:var(--text); font-size:0.9em; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.74em; color:#5A6370; line-height:1.5; }
</style>
</head>
<body>

<div id="container">
  <div id="content">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="ctrl-group"><label>钉板行数</label><input type="range" id="rows" min="4" max="12" step="1" value="8"><input type="number" id="rowsVal" value="8"></div>
      <div class="ctrl-group"><label>球数/批次</label><input type="range" id="count" min="1" max="20" step="1" value="5"><input type="number" id="countVal" value="5"></div>
      <div class="ctrl-group"><label>偏转概率</label><input type="range" id="prob" min="0.3" max="0.7" step="0.05" value="0.5"><input type="number" id="probVal" value="0.5"></div>
      <div class="ctrl-group"><button id="dropBtn">🎾 投放</button><button id="clearBtn">🧹 清空</button></div>
    </div>
    <div id="info">高尔顿板：小球从顶部落下，每次遇到钉子时以设定概率左/右偏转，最终落入底部槽中，形成正态分布（钟形曲线）。投球越多，分布越接近正态。</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let slots = [];
let balls = [];
let pegs = [];
let running = false;
let animId = null;

const GRAVITY = 800;
const RESTITUTION = 0.3;
const FRICTION = 0.8;

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(w && h) { canvas.width = w; canvas.height = h; }
  buildPegs();
  render();
}

function initSlots() {
  const rows = parseInt(document.getElementById('rows').value);
  slots = new Array(rows + 1).fill(0);
  balls = [];
}

function buildPegs() {
  const w = canvas.width, h = canvas.height;
  const rows = parseInt(document.getElementById('rows').value);
  const S = Math.min(w, h);
  const pegTop = h * 0.08;
  const pegBottom = h * 0.55;
  const rowH = (pegBottom - pegTop) / rows;
  const spacing = Math.min(w * 0.07, (w * 0.6) / (rows + 2));
  const pegR = S * 0.008;
  pegs = [];
  for(let r = 0; r < rows; r++) {
    const n = r + 1;
    const startX = w / 2 - (n - 1) * spacing / 2;
    for(let c = 0; c < n; c++) {
      pegs.push({ x: startX + c * spacing, y: pegTop + (r + 1) * rowH, r: pegR, row: r, col: c });
    }
  }
}

function dropBalls() {
  const count = parseInt(document.getElementById('count').value);
  const rows = parseInt(document.getElementById('rows').value);
  const prob = parseFloat(document.getElementById('prob').value);
  const w = canvas.width;
  const S = Math.min(w, canvas.height);
  const ballR = S * 0.008;

  for(let i = 0; i < count; i++) {
    let slot = 0;
    for(let r = 0; r < rows; r++) {
      if(Math.random() < prob) slot++;
    }
    balls.push({
      x: w / 2 + (Math.random() - 0.5) * 4,
      y: canvas.height * 0.03,
      vx: 0,
      vy: 0,
      r: ballR,
      slot: slot,
      settled: false,
      delay: i * 12,
      bounceCount: 0
    });
  }
  if(!running) {
    running = true;
    animId = requestAnimationFrame(loop);
  }
}

function updatePhysics() {
  const w = canvas.width, h = canvas.height;
  const rows = parseInt(document.getElementById('rows').value);
  const S = Math.min(w, h);
  const slotTop = h * 0.62;
  const spacing = Math.min(w * 0.07, (w * 0.6) / (rows + 2));
  const numSlots = rows + 1;
  const slotLeft = w / 2 - (numSlots - 1) * spacing / 2;
  const slotW = spacing;
  const slotH = h - slotTop - h * 0.04;
  const dt = 1 / 60;
  const subSteps = 4;
  const subDt = dt / subSteps;

  for(let ball of balls) {
    if(ball.settled) continue;
    if(ball.delay > 0) { ball.delay--; continue; }

    for(let s = 0; s < subSteps; s++) {
      ball.vy += GRAVITY * subDt;
      ball.x += ball.vx * subDt;
      ball.y += ball.vy * subDt;

      for(let peg of pegs) {
        const dx = ball.x - peg.x;
        const dy = ball.y - peg.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = ball.r + peg.r;
        if(dist < minDist && dist > 0.01) {
          const nx = dx / dist;
          const ny = dy / dist;
          ball.x = peg.x + nx * minDist;
          ball.y = peg.y + ny * minDist;
          const dot = ball.vx * nx + ball.vy * ny;
          if(dot < 0) {
            ball.vx -= (1 + RESTITUTION) * dot * nx;
            ball.vy -= (1 + RESTITUTION) * dot * ny;
            const prob = parseFloat(document.getElementById('prob').value);
            const deflect = (Math.random() < prob) ? 1 : -1;
            ball.vx += deflect * 40;
            ball.vx *= FRICTION;
            ball.vy *= FRICTION;
            ball.bounceCount++;
          }
        }
      }

      if(ball.y + ball.r > slotTop + slotH) {
        ball.y = slotTop + slotH - ball.r;
        ball.vy = 0;
        ball.vx = 0;
        ball.settled = true;
        const slotIdx = Math.round((ball.x - slotLeft) / slotW);
        const clampedIdx = Math.max(0, Math.min(numSlots - 1, slotIdx));
        ball.slot = clampedIdx;
        if(clampedIdx >= 0 && clampedIdx < slots.length) {
          slots[clampedIdx]++;
        }
        break;
      }

      if(ball.x < ball.r) { ball.x = ball.r; ball.vx = Math.abs(ball.vx) * 0.5; }
      if(ball.x > w - ball.r) { ball.x = w - ball.r; ball.vx = -Math.abs(ball.vx) * 0.5; }
    }
  }
}

function render() {
  const w = canvas.width, h = canvas.height;
  if(!w || !h) return;
  const S = Math.min(w, h);
  const rows = parseInt(document.getElementById('rows').value);
  const prob = parseFloat(document.getElementById('prob').value);

  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0, 0, w, h);

  for(let peg of pegs) {
    ctx.fillStyle = '#0E61AC';
    ctx.beginPath();
    ctx.arc(peg.x, peg.y, peg.r, 0, Math.PI * 2);
    ctx.fill();
  }

  const slotTop = h * 0.62;
  const spacing = Math.min(w * 0.07, (w * 0.6) / (rows + 2));
  const numSlots = rows + 1;
  const slotW = spacing;
  const slotLeft = w / 2 - (numSlots - 1) * slotW / 2;
  const slotH = h - slotTop - h * 0.04;
  const maxCount = Math.max(...slots, 1);

  for(let i = 0; i < numSlots; i++) {
    const sx = slotLeft + i * slotW - slotW / 2;
    ctx.strokeStyle = 'rgba(48,54,61,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, slotTop, slotW, slotH);
    const count = slots[i];
    if(count > 0) {
      const barH = (count / maxCount) * slotH * 0.85;
      const alpha = 0.4 + (count / maxCount) * 0.6;
      ctx.fillStyle = `rgba(42,124,199,${alpha})`;
      ctx.fillRect(sx + 2, slotTop + slotH - barH, slotW - 4, barH);
    }
  }

  for(let ball of balls) {
    if(ball.settled || ball.delay > 0) continue;
    ctx.fillStyle = '#2A7CC7';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,166,87,0.3)';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  const totalBalls = slots.reduce((a, b) => a + b, 0);
  ctx.fillStyle = '#5A6370';
  ctx.font = `${S * 0.025}px sans-serif`;
  ctx.fillText(`总球数: ${totalBalls}`, 10, S * 0.04);
  if(totalBalls > 0) {
    const mean = slots.reduce((a, c, i) => a + c * i, 0) / totalBalls;
    const variance = slots.reduce((a, c, i) => a + c * (i - mean) ** 2, 0) / totalBalls;
    const sigma = Math.sqrt(Math.max(0, variance));
    ctx.fillStyle = '#0E61AC';
    ctx.fillText(`实测: μ=${mean.toFixed(2)} σ=${sigma.toFixed(2)}`, 10, S * 0.075);
    ctx.fillStyle = '#0E61AC';
    ctx.fillText(`理论: μ=${(rows * prob).toFixed(2)} σ=${Math.sqrt(rows * prob * (1 - prob)).toFixed(2)}`, 10, S * 0.11);
  }
}

function loop() {
  updatePhysics();
  render();
  const hasActive = balls.some(b => !b.settled);
  if(hasActive) {
    animId = requestAnimationFrame(loop);
  } else {
    running = false;
    animId = null;
  }
}

document.getElementById('rows').addEventListener('input', e => {
  document.getElementById('rowsVal').value = e.target.value;
  initSlots();
  buildPegs();
  render();
});
document.getElementById('count').addEventListener('input', e => document.getElementById('countVal').value = e.target.value);
document.getElementById('prob').addEventListener('input', e => document.getElementById('probVal').value = e.target.value);
document.getElementById('dropBtn').addEventListener('click', dropBalls);
document.getElementById('clearBtn').addEventListener('click', () => {
  initSlots();
  render();
});

resize();
window.addEventListener('resize', resize);
initSlots();
</script>
</body>
</html>
