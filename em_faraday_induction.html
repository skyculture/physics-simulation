<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>法拉第感应 - 物理数值仿真平台</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#FAF2E0;color:#1A1A1A;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif}
#app{height:100%;display:flex;flex-direction:column}
main{flex:1;display:flex;overflow:hidden}#canvasWrap{flex:1;position:relative}canvas{display:block;width:100%;height:100%}
#sidebar{width:300px;background:#FFF7EB;border-left:1px solid #D4C9B8;padding:14px;overflow:auto}
.sec{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #D4C9B8}.sec:last-child{border-bottom:none}
h3{margin:0 0 8px 0;font-size:14px;color:#0E61AC}
.row{display:flex;align-items:center;gap:10px;margin:8px 0}.row label{flex:0 0 100px;font-size:13px}
.row input[type=range]{flex:1}.row input[type=number]{width:70px;background:#FAF2E0;border:1px solid #D4C9B8;color:#1A1A1A;padding:6px 8px;border-radius:6px}
</style></head>
<body>
<div class="back-bar" style="display:flex;align-items:center;padding:8px 16px;gap:8px;position:sticky;top:0;z-index:100;background:var(--panel,#FFF7EB);border-bottom:1px solid var(--border,#D4C9B8);">
  <a href="index.html" style="color:var(--accent,#0E61AC);text-decoration:none;font-size:0.85rem;font-weight:600;padding:4px 10px;border:1px solid var(--border,#D4C9B8);border-radius:5px;transition:background 0.15s;" onmouseover="this.style.background='#FFF7EB'" onmouseout="this.style.background='transparent'">← 返回实验列表</a>
</div>

<div id="app">

<main><div id="canvasWrap"><canvas id="c"></canvas></div>
<div id="sidebar">
<div class="sec"><h3>参数设置</h3>
<div class="row"><label>磁场强度 B</label><input id="p1" type="range" min="0.1" max="3" step="0.1" value="1.5"><input id="p1n" type="number" value="1.5"></div>
<div class="row"><label>线圈匝数 N</label><input id="p2" type="range" min="1" max="20" value="5"><input id="p2n" type="number" value="5"></div>
<div class="row"><label>线圈半径 r</label><input id="p3" type="range" min="0.5" max="2" step="0.1" value="1"><input id="p3n" type="number" value="1"></div>
</div></div></main></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
function resize(){const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth,h=canvas.clientHeight;if(w&&h){canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}}
window.addEventListener('resize',resize);let inited=false;
const p1=document.getElementById('p1'),p1n=document.getElementById('p1n'),p2=document.getElementById('p2'),p2n=document.getElementById('p2n'),p3=document.getElementById('p3'),p3n=document.getElementById('p3n');
function link(a,b){a.oninput=()=>{b.value=a.value};b.oninput=()=>{a.value=b.value}}
link(p1,p1n);link(p2,p2n);link(p3,p3n);
let t=0;
function draw(){
if(!inited){resize();inited=true;}
const W=canvas.clientWidth,H=canvas.clientHeight;if(!W||!H){requestAnimationFrame(draw);return}
const B=+p1.value,N=+p2.value,r=+p3.value;t+=0.016;
ctx.clearRect(0,0,W,H);ctx.fillStyle='#FAF2E0';ctx.fillRect(0,0,W,H);
const margin=60,cx=(margin+W-margin)/2,cy=(margin+H-margin)/2;
const scale=Math.min(W,H)/5;
// magnet moving up and down
const magnetY=cy+Math.sin(t*1.5)*scale*0.8;
ctx.fillStyle='#D4C9B8';ctx.fillRect(cx-scale*0.3,magnetY-scale*0.4,scale*0.6,scale*0.8);
ctx.fillStyle='#2A7CC7';ctx.fillRect(cx-scale*0.2,magnetY-scale*0.3,scale*0.4,scale*0.2);
ctx.fillStyle='#0E61AC';ctx.fillRect(cx-scale*0.2,magnetY+scale*0.1,scale*0.4,scale*0.2);
ctx.strokeStyle='#FFFFFF';ctx.lineWidth=2;ctx.strokeRect(cx-scale*0.3,magnetY-scale*0.4,scale*0.6,scale*0.8);
// coil
ctx.strokeStyle='#0E61AC';ctx.lineWidth=3;
for(let k=0;k<N;k++){
const coilY=cy+scale*0.1+k*scale*0.15;
ctx.beginPath();ctx.ellipse(cx,coilY,scale*r,scale*r*0.3,0,0,Math.PI*2);ctx.stroke();
}
// B field around magnet
for(let i=-5;i<=5;i++){for(let j=-3;j<=3;j++){
const bx=cx+i*scale*0.3,by=magnetY+j*scale*0.3;
const dx=bx-cx,dy=by-magnetY,dist=Math.sqrt(dx*dx+dy*dy);
if(dist<scale*0.6){
ctx.strokeStyle='rgba(14,97,172,0.3)';ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx-dx/dist*15,by-dy/dist*15);ctx.stroke();
}
}}
// flux & EMF
const flux=B*N*Math.PI*r*r*0.01;
const emf=flux*Math.cos(t*1.5)*1.5;
ctx.fillStyle='#5A6370';ctx.font='14px system-ui';
ctx.fillText(`磁通量 Φ ≈ ${(flux*Math.abs(Math.sin(t*1.5))).toFixed(2)} Wb | 感应电动势 ε ≈ ${Math.abs(emf).toFixed(2)} V`,margin,H-margin-20);
requestAnimationFrame(draw);
}requestAnimationFrame(draw);
</script></body></html>
