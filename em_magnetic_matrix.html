<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>磁控矩阵 - 物理数值仿真平台</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#FAF2E0;color:#c9d1d9;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif}
#app{height:100%;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#161b22;border-bottom:1px solid #D4C9B8}
#back{background:#FFFFFF;border:1px solid #D4C9B8;color:#c9d1d9;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px}
#back:hover{background:#D4C9B8}
header h1{margin:0;font-size:18px;font-weight:600}
#info{margin-left:auto;color:#5A6370;font-size:13px}
main{flex:1;display:flex;overflow:hidden}
#canvasWrap{flex:1;position:relative}
canvas{display:block;width:100%;height:100%}
#sidebar{width:280px;background:#161b22;border-left:1px solid #D4C9B8;padding:14px;overflow:auto}
.sec{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #D4C9B8}
.sec:last-child{border-bottom:none}
h3{margin:0 0 8px 0;font-size:14px;color:#0E61AC}
.row{display:flex;align-items:center;gap:10px;margin:8px 0}
.row label{flex:0 0 120px;font-size:13px}
.row input[type=range]{flex:1}
.row input[type=number]{width:70px;background:#FAF2E0;border:1px solid #D4C9B8;color:#c9d1d9;padding:6px 8px;border-radius:6px}
</style>
</head>
<body>
<div id="app">

<main>
<div id="canvasWrap"><canvas id="c"></canvas></div>
<div id="sidebar">
<div class="sec">
<h3>参数设置</h3>
<div class="row"><label>磁场强度</label><input id="p1" type="range" min="0.5" max="3" step="0.1" value="1.5"><input id="p1n" type="number" value="1.5"></div>
<div class="row"><label>电压</label><input id="p2" type="range" min="-1.5" max="1.5" step="0.1" value="0"><input id="p2n" type="number" value="0"></div>
<div class="row"><label>频率</label><input id="p3" type="range" min="0.5" max="3" step="0.1" value="1.5"><input id="p3n" type="number" value="1.5"></div>
</div>
<div class="sec">
<h3>显示</h3>
<div class="row"><label>电子数</label><input id="p4" type="range" min="20" max="200" value="80"><input id="p4n" type="number" value="80"></div>
</div>
</div>
</main>
</div>
<script>
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
function resize(){const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth,h=canvas.clientHeight;if(w&&h){canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}}
window.addEventListener('resize',resize);
let inited=false;
const p1=document.getElementById('p1'),p1n=document.getElementById('p1n');
const p2=document.getElementById('p2'),p2n=document.getElementById('p2n');
const p3=document.getElementById('p3'),p3n=document.getElementById('p3n');
const p4=document.getElementById('p4'),p4n=document.getElementById('p4n');
function link(a,b){a.oninput=()=>{b.value=a.value;reset()};b.oninput=()=>{a.value=b.value;reset()}}
link(p1,p1n);link(p2,p2n);link(p3,p3n);link(p4,p4n);
let parts=[];
function reset(){const N=+p4.value;parts=[];for(let i=0;i<N;i++){const r=Math.random()*0.7;const th=Math.random()*Math.PI*2;parts.push({x:r*Math.cos(th),y:r*Math.sin(th),vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2})}}
reset();
let t=0;
function draw(){
if(!inited){resize();inited=true;}
const W=canvas.clientWidth,H=canvas.clientHeight;
ctx.clearRect(0,0,W,H);
const B0=+p1.value,V=+p2.value,f=+p3.value;
t+=0.016;
const margin=60,top=margin,bottom=H-margin,left=margin,right=W-margin;
const cx=(left+right)/2,cy=(top+bottom)/2;
const scale=Math.min(right-left,bottom-top)/2.2;
ctx.fillStyle='#FAF2E0';ctx.fillRect(0,0,W,H);
// cavity
ctx.strokeStyle='#D4C9B8';ctx.lineWidth=4;ctx.beginPath();ctx.arc(cx,cy,scale*0.85,0,Math.PI*2);ctx.stroke();
// magnetron vanes
ctx.fillStyle='#FFFFFF';
for(let i=0;i<8;i++){
const a=i/8*Math.PI*2;
const r1=scale*0.55;
const r2=scale*0.8;
ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*r1,cy+Math.sin(a)*r1);ctx.lineTo(cx+Math.cos(a-0.25)*r2,cy+Math.sin(a-0.25)*r2);ctx.lineTo(cx+Math.cos(a+0.25)*r2,cy+Math.sin(a+0.25)*r2);ctx.closePath();ctx.fill();
}
// field animation
const B=B0;
const dt=0.008;
for(const p of parts){
const r=Math.sqrt(p.x*p.x+p.y*p.y);
const Ex=-V*Math.sign(p.x);
const Ey=-V*Math.sign(p.y);
const ax=Ex + p.vy*B;
const ay=Ey - p.vx*B;
p.vx+=ax*dt; p.vy+=ay*dt;
p.x+=p.vx*dt; p.y+=p.y*dt;
if(r>0.8){const rr=Math.sqrt(p.x*p.x+p.y*p.y);p.x*=0.75/rr;p.y*=0.75/rr;}
if(Math.random()<0.005)parts.push({x:0,y:0,vx:0.02*(Math.random()-0.5),vy:0.02*(Math.random()-0.5)});
ctx.fillStyle='#0E61AC';
ctx.beginPath();ctx.arc(cx+p.x*scale,cy+p.y*scale,2,0,Math.PI*2);ctx.fill();
}
if(parts.length>300)parts.splice(0,parts.length-300);
}
function loop(){draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
