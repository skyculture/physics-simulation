<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>锁相放大器 - 物理数值仿真平台</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#0d1117;color:#c9d1d9;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif}
#app{height:100%;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#161b22;border-bottom:1px solid #30363d}
#back{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px}
#back:hover{background:#30363d}
header h1{margin:0;font-size:18px;font-weight:600}
#info{margin-left:auto;color:#8b949e;font-size:13px}
main{flex:1;display:flex;overflow:hidden}
#canvasWrap{flex:1;position:relative}
canvas{display:block;width:100%;height:100%}
#sidebar{width:280px;background:#161b22;border-left:1px solid #30363d;padding:14px;overflow:auto}
.sec{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #30363d}
.sec:last-child{border-bottom:none}
h3{margin:0 0 8px 0;font-size:14px;color:#58a6ff}
.row{display:flex;align-items:center;gap:10px;margin:8px 0}
.row label{flex:0 0 120px;font-size:13px}
.row input[type=range]{flex:1}
.row input[type=number]{width:70px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:6px 8px;border-radius:6px}
</style>
</head>
<body>
<div id="app">

<main>
<div id="canvasWrap"><canvas id="c"></canvas></div>
<div id="sidebar">
<div class="sec">
<h3>参数设置</h3>
<div class="row"><label>信号频率 f</label><input id="p1" type="range" min="1" max="20" value="5"><input id="p1n" type="number" value="5"></div>
<div class="row"><label>参考频率 f_ref</label><input id="p2" type="range" min="1" max="20" value="5"><input id="p2n" type="number" value="5"></div>
<div class="row"><label>相位 φ</label><input id="p3" type="range" min="0" max="6.28" step="0.1" value="0"><input id="p3n" type="number" value="0"></div>
<div class="row"><label>噪声强度</label><input id="p4" type="range" min="0" max="1" step="0.05" value="0.3"><input id="p4n" type="number" value="0.3"></div>
</div>
<div class="sec">
<h3>显示</h3>
<div class="row"><label>时间窗口 t</label><input id="p5" type="range" min="0.5" max="3" step="0.1" value="2"><input id="p5n" type="number" value="2"></div>
</div>
</div>
</main>
</div>
<script>
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
function resize(){const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth,h=canvas.clientHeight;if(w&&h){canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}}
window.addEventListener('resize',resize);
let inited=false;
const p1=document.getElementById('p1'),p1n=document.getElementById('p1n');
const p2=document.getElementById('p2'),p2n=document.getElementById('p2n');
const p3=document.getElementById('p3'),p3n=document.getElementById('p3n');
const p4=document.getElementById('p4'),p4n=document.getElementById('p4n');
const p5=document.getElementById('p5'),p5n=document.getElementById('p5n');
function link(a,b){a.oninput=()=>{b.value=a.value;draw()};b.oninput=()=>{a.value=b.value;draw()}}
link(p1,p1n);link(p2,p2n);link(p3,p3n);link(p4,p4n);link(p5,p5n);
let t0=performance.now();
function draw(){
if(!inited){resize();inited=true;}
const W=canvas.clientWidth,H=canvas.clientHeight;
ctx.clearRect(0,0,W,H);
const f=+p1.value,fr=+p2.value,phi=+p3.value,noise=+p4.value,tw=+p5.value;
const now=(performance.now()-t0)/1000;
const margin=40,top=margin,bottom=H-margin*1.2,left=margin,right=W-margin;
ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
ctx.strokeStyle='#21262d';ctx.lineWidth=1;
for(let i=0;i<=10;i++){ctx.beginPath();ctx.moveTo(left,top+(bottom-top)/10*i);ctx.lineTo(right,top+(bottom-top)/10*i);ctx.stroke();}
// generate signal with noise
const points=[];const N=1000;
let filteredSum=0;
for(let i=0;i<N;i++){
const t=now-tw+i/N*tw;
const s=Math.sin(2*Math.PI*f*t)+noise*(Math.random()*2-1);
const ref=Math.sin(2*Math.PI*fr*t+phi);
const mix=s*ref;
filteredSum+=mix;
points.push({t,s,ref,mix});
}
const avg=filteredSum/N;
// plot s
ctx.beginPath();ctx.strokeStyle='#58a6ff';ctx.lineWidth=1.5;
for(let i=0;i<points.length;i++){
const x=left+(right-left)*i/points.length;
const y=top+(bottom-top)/2 - points[i].s*(bottom-top)/5;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.stroke();
// plot reference (dashed)
ctx.beginPath();ctx.setLineDash([4,4]);ctx.strokeStyle='#f78166';
for(let i=0;i<points.length;i++){
const x=left+(right-left)*i/points.length;
const y=top+(bottom-top)/2 - points[i].ref*(bottom-top)/5;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.stroke();ctx.setLineDash([]);
// plot filtered output as horizontal bar
ctx.fillStyle='#3fb950';ctx.fillRect(left,bottom+10,(right-left)*Math.min(1,Math.max(0,(avg+0.5))),20);
ctx.strokeStyle='#30363d';ctx.strokeRect(left,bottom+10,right-left,20);
// labels
ctx.fillStyle='#8b949e';ctx.font='12px system-ui';
ctx.fillText('原始信号 (蓝色)',left,top-10);
ctx.fillText('参考信号 (红色)',left+120,top-10);
ctx.fillText('锁相输出 (绿色条)',left,bottom+45);
}
function loop(){draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
