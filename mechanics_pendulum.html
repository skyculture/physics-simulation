<script>
/* ============================================================
   物理仿真核心 — 单摆与混沌双摆
   ============================================================

   【单摆运动方程】
   由牛顿第二定律或拉格朗日力学推导：
     θ'' = -(g/L)·sin(θ) - b·θ'
   其中 b 为阻尼系数。小角度近似 sin(θ)≈θ 时简化为谐振子方程：
     θ'' + ω₀²θ = 0,  ω₀ = √(g/L)
   周期 T₀ = 2π/ω₀ = 2π√(L/g)

   【双摆运动方程 — 拉格朗日力学推导】
   设两根杆长为 L₁, L₂，两质点质量均为 m。
   选取广义坐标 θ₁, θ₂（偏离竖直方向的角度）。

   动能 T:
     T = ½mL₁²ω₁² + ½m[L₁²ω₁² + L₂²ω₂² + 2L₁L₂ω₁ω₂cos(θ₁-θ₂)]

   势能 V (以悬挂点为势能零点):
     V = -2mgL₁cosθ₁ - mgL₂cosθ₂

   拉格朗日量 L = T - V

   由欧拉-拉格朗日方程 d/dt(∂L/∂ωᵢ) - ∂L/∂θᵢ = 0 得到耦合非线性常微分方程。
   引入无量纲参数 μ = (m₁+m₂)/m₂ = 2（当 m₁=m₂=m 时），并加上阻尼项：

     θ₁'' = [g(sinθ₂·cosδ - μ·sinθ₁) - (L₂ω₂² + L₁ω₁²·cosδ)·sinδ] / [L₁(μ - cos²δ)] - b·ω₁
     θ₂'' = [gμ(sinθ₁·cosδ - sinθ₂) + (μL₁ω₁² + L₂ω₂²·cosδ)·sinδ] / [L₂(μ - cos²δ)] - b·ω₂

   其中 δ = θ₁ - θ₂

   这是一个高度非线性的四维动力系统，对初始条件极端敏感 → 确定性混沌。

   【四阶龙格-库塔法 (RK4)】
   对于一阶常微分方程组 dy/dt = f(y)，RK4 单步推进公式为：
     k₁ = f(yₙ)
     k₂ = f(yₙ + ½Δt·k₁)
     k₃ = f(yₙ + ½Δt·k₂)
     k₄ = f(yₙ + Δt·k₃)
     yₙ₊₁ = yₙ + (Δt/6)·(k₁ + 2k₂ + 2k₃ + k₄)

   RK4 的局部截断误差为 O(Δt⁵)，全局误差为 O(Δt⁴)，适合长时间混沌动力学模拟。
   通过监测系统总能量可以验证数值精度——保守系统（b=0）的总能量应保持恒定。

   ============================================================ */

// ==================== 工具函数 ====================

/** 将角度归一化到 [-π, π] 区间 */
function wrapAngle(θ) {
  let r = θ % (2 * Math.PI);
  if (r > Math.PI) r -= 2 * Math.PI;
  if (r < -Math.PI) r += 2 * Math.PI;
  return r;
}

/** 角度转弧度 */
function degToRad(deg) { return deg * Math.PI / 180; }

/** 弧度转角度 */
function radToDeg(rad) { return rad * 180 / Math.PI; }

// ==================== 单摆物理 ====================

/**
 * 单摆导数函数
 * 状态向量 [θ, ω]
 * 返回 [dθ/dt, dω/dt] = [ω, -(g/L)sinθ - bω]
 */
function simplePendulumDerivs(state, L, g, damping) {
  const θ = state[0];
  const ω = state[1];
  return [
    ω,
    -(g / L) * Math.sin(θ) - damping * ω
  ];
}

/** 单摆机械能: E = ½mL²ω² - mgLcosθ（悬挂点为零势能） */
function simplePendulumEnergy(state, L, m, g) {
  const θ = state[0];
  const ω = state[1];
  return 0.5 * m * L * L * ω * ω - m * g * L * Math.cos(θ);
}

/** 单摆理论周期 (小角度近似) T₀ = 2π√(L/g) */
function simplePeriodTheory(L, g) {
  return 2 * Math.PI * Math.sqrt(L / g);
}

// ==================== 双摆物理 ====================

/**
 * 双摆导数函数 (m₁ = m₂ = m)
 * 状态向量 [θ₁, θ₂, ω₁, ω₂]
 * 返回 [ω₁, ω₂, α₁, α₂]
 *
 * 拉格朗日力学推导的运动方程，
 * μ = (m₁+m₂)/m₂ = 2（等质量情形）
 */
function doublePendulumDerivs(state, L1, L2, m, g, damping) {
  const θ1 = state[0];
  const θ2 = state[1];
  const ω1 = state[2];
  const ω2 = state[3];

  const δ = θ1 - θ2;
  const cosδ = Math.cos(δ);
  const sinδ = Math.sin(δ);

  // μ = (m₁+m₂)/m₂ = 2（等质量）
  const μ = 2;
  const denom = μ - cosδ * cosδ;  // 分母 μ - cos²δ

  /*
   * 角加速度 α₁ = θ₁''
   * 包含三项：
   *   1. 重力矩项：g(sinθ₂cosδ - μsinθ₁)
   *   2. 离心力/科里奥利力耦合项：-(L₂ω₂² + L₁ω₁²cosδ)sinδ
   *   3. 阻尼项：-bω₁
   */
  const α1 = (
    g * (Math.sin(θ2) * cosδ - μ * Math.sin(θ1))
    - (L2 * ω2 * ω2 + L1 * ω1 * ω1 * cosδ) * sinδ
  ) / (L1 * denom) - damping * ω1;

  /*
   * 角加速度 α₂ = θ₂''
   * 重力矩项放大 μ 倍（因 m₁ 也施加力矩于 θ₂ 坐标）
   */
  const α2 = (
    g * μ * (Math.sin(θ1) * cosδ - Math.sin(θ2))
    + (μ * L1 * ω1 * ω1 + L2 * ω2 * ω2 * cosδ) * sinδ
  ) / (L2 * denom) - damping * ω2;

  return [ω1, ω2, α1, α2];
}

/**
 * 双摆总机械能
 * T = ½mL₁²ω₁² + ½m[L₁²ω₁² + L₂²ω₂² + 2L₁L₂ω₁ω₂cosδ]
 * V = -2mgL₁cosθ₁ - mgL₂cosθ₂
 */
function doublePendulumEnergy(state, L1, L2, m, g) {
  const θ1 = state[0];
  const θ2 = state[1];
  const ω1 = state[2];
  const ω2 = state[3];
  const cosδ = Math.cos(θ1 - θ2);

  const T = 0.5 * m * L1 * L1 * ω1 * ω1
          + 0.5 * m * (
              L1 * L1 * ω1 * ω1
            + L2 * L2 * ω2 * ω2
            + 2 * L1 * L2 * ω1 * ω2 * cosδ
            );

  const V = -2 * m * g * L1 * Math.cos(θ1) - m * g * L2 * Math.cos(θ2);
  return T + V;
}

// ==================== RK4 积分器 ====================

/**
 * 通用四阶龙格-库塔单步积分
 * @param {number[]} state - 当前状态向量
 * @param {number} dt - 时间步长
 * @param {Function} derivsFunc - 导数函数 f(state, ...params) → 导数向量
 * @param {...any} params - 传递给导数函数的额外参数
 * @returns {number[]} 推进后的新状态向量
 */
function rk4Step(state, dt, derivsFunc, ...params) {
  const n = state.length;

  // k₁ = f(yₙ)
  const k1 = derivsFunc(state, ...params);

  // 构造 yₙ + ½Δt·k₁
  const s2 = new Array(n);
  for (let i = 0; i < n; i++) s2[i] = state[i] + 0.5 * dt * k1[i];
  const k2 = derivsFunc(s2, ...params);

  // 构造 yₙ + ½Δt·k₂
  const s3 = new Array(n);
  for (let i = 0; i < n; i++) s3[i] = state[i] + 0.5 * dt * k2[i];
  const k3 = derivsFunc(s3, ...params);

  // 构造 yₙ + Δt·k₃
  const s4 = new Array(n);
  for (let i = 0; i < n; i++) s4[i] = state[i] + dt * k3[i];
  const k4 = derivsFunc(s4, ...params);

  // yₙ₊₁ = yₙ + (Δt/6)(k₁ + 2k₂ + 2k₃ + k₄)
  const result = new Array(n);
  for (let i = 0; i < n; i++) {
    result[i] = state[i] + (dt / 6) * (k1[i] + 2 * k2[i] + 2 * k3[i] + k4[i]);
  }
  return result;
}

// ==================== 环形缓冲区 ====================

/** 固定容量的环形缓冲区 */
class RingBuffer {
  constructor(capacity) {
    this.capacity = capacity;
    this.buffer = new Array(capacity);
    this.head = 0;  // 写入位置
    this.count = 0; // 当前元素数
  }

  push(item) {
    this.buffer[this.head] = item;
    this.head = (this.head + 1) % this.capacity;
    if (this.count < this.capacity) this.count++;
  }

  /** 按时间顺序返回所有元素 (最旧的在前) */
  toArray() {
    const result = new Array(this.count);
    const start = this.count < this.capacity ? 0 : this.head;
    for (let i = 0; i < this.count; i++) {
      result[i] = this.buffer[(start + i) % this.capacity];
    }
    return result;
  }

  clear() {
    this.head = 0;
    this.count = 0;
  }

  get length() { return this.count; }
}

// ==================== 全局状态 ====================

// 仿真参数
let params = {
  L1: 1.50,   // 摆长1 (m)
  L2: 1.00,   // 摆长2 (m)，仅双摆使用
  m: 1.0,     // 质量 (kg)
  g: 9.81,    // 重力加速度 (m/s²)
  theta0: degToRad(30),   // 单摆初始角度 (rad)
  theta1: degToRad(120),  // 双摆θ₁初始角度 (rad)
  theta2: degToRad(120),  // 双摆θ₂初始角度 (rad)
  damping: 0.0,           // 阻尼系数
};

// 单摆状态 [θ, ω]
let simpleState = [params.theta0, 0];

// 双摆状态 [θ₁, θ₂, ω₁, ω₂]
let doubleState = [params.theta1, params.theta2, 0, 0];

// 初始能量（用于监测能量守恒）
let simpleE0 = 0;
let doubleE0 = 0;

// 仿真时间
let simTime = 0;
let running = false;

// 数据记录
// DT_SIM=0.003s, 下采样因子=5 → 记录频率~67Hz, 700点≈10.4s窗口
const MAX_ANGLE_HISTORY = 700;
const ANGLE_RECORD_EVERY = 5;     // 每N个仿真步记录一次角度
const MAX_TRAIL_POINTS = 600;     // 双摆末端轨迹点 (~1.8s @333步/s)
const MAX_PHASE_POINTS = 2000;    // 相图数据点 (~6s @333步/s)
const PHASE_RECORD_EVERY = 1;     // 每N步记录一次相图

let simpleAngleHistory = new RingBuffer(MAX_ANGLE_HISTORY);  // {time, theta}
let doubleTrail = new RingBuffer(MAX_TRAIL_POINTS);           // {x, y} canvas坐标
let doublePhaseHistory = new RingBuffer(MAX_PHASE_POINTS);    // {θ1, θ2}

// 步数计数器（用于数据下采样）
let stepCounter = 0;

// 单摆周期测量
let simpleLastCrossTime = 0;
let simpleLastCrossSign = 0;
let simpleMeasuredPeriod = 0;

// ==================== Canvas 元素 ====================

const canvasSimple = document.getElementById('canvasSimple');
const ctxSimple = canvasSimple.getContext('2d');
const canvasSimpleGraph = document.getElementById('canvasSimpleGraph');
const ctxSimpleGraph = canvasSimpleGraph.getContext('2d');
const canvasDouble = document.getElementById('canvasDouble');
const ctxDouble = canvasDouble.getContext('2d');
const canvasDoubleGraph = document.getElementById('canvasDoubleGraph');
const ctxDoubleGraph = canvasDoubleGraph.getContext('2d');

// ==================== 绘制函数 ====================

/** 绘制单摆 */
function drawSimplePendulum() {
  const ctx = ctxSimple;
  const w = canvasSimple.width;
  const h = canvasSimple.height;
  ctx.clearRect(0, 0, w, h);

  const pivotX = w / 2;
  const pivotY = 35;

  // 动态缩放：让摆长在画布上占据合适比例
  const maxLenCanvas = h - pivotY - 40;
  const scale = maxLenCanvas / params.L1;

  const θ = simpleState[0];
  const L = params.L1;

  // 摆球位置 (canvas坐标系：y轴向下)
  const bobX = pivotX + scale * L * Math.sin(θ);
  const bobY = pivotY + scale * L * Math.cos(θ);

  // 绘制平衡位置虚线
  ctx.strokeStyle = '#D4C9B8';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(pivotX, pivotY);
  ctx.lineTo(pivotX, pivotY + scale * L);
  ctx.stroke();
  ctx.setLineDash([]);

  // 绘制摆线
  ctx.strokeStyle = '#5A6370';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(pivotX, pivotY);
  ctx.lineTo(bobX, bobY);
  ctx.stroke();

  // 绘制悬挂点
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath();
  ctx.arc(pivotX, pivotY, 5, 0, 2 * Math.PI);
  ctx.fill();

  // 绘制摆球（带发光效果）
  const bobRadius = Math.max(10, Math.min(20, 8 + params.m * 5));
  const grad = ctx.createRadialGradient(bobX - 3, bobY - 3, bobRadius * 0.2, bobX, bobY, bobRadius);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.4, '#0E61AC');
  grad.addColorStop(1, '#1f4370');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(bobX, bobY, bobRadius, 0, 2 * Math.PI);
  ctx.fill();

  // 摆球光晕
  ctx.shadowColor = '#0E61AC';
  ctx.shadowBlur = 12;
  ctx.strokeStyle = 'rgba(14,97,172,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(bobX, bobY, bobRadius + 2, 0, 2 * Math.PI);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 显示当前角度和周期信息
  ctx.fillStyle = '#5A6370';
  ctx.font = '13px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'left';
  const T0 = simplePeriodTheory(params.L1, params.g);
  ctx.fillText(`θ = ${radToDeg(θ).toFixed(1)}°`, 10, h - 30);
  ctx.fillText(`理论周期 T₀ = ${T0.toFixed(2)} s`, 10, h - 12);
  if (simpleMeasuredPeriod > 0 && Math.abs(params.theta0) < degToRad(15)) {
    ctx.fillStyle = '#0E61AC';
    ctx.fillText(`实测周期 T = ${simpleMeasuredPeriod.toFixed(3)} s`, 190, h - 12);
  }
}

/** 绘制单摆角度-时间图 */
function drawSimpleGraph() {
  const ctx = ctxSimpleGraph;
  const w = canvasSimpleGraph.width;
  const h = canvasSimpleGraph.height;
  ctx.clearRect(0, 0, w, h);

  const margin = { top: 15, right: 15, bottom: 28, left: 45 };
  const plotW = w - margin.left - margin.right;
  const plotH = h - margin.top - margin.bottom;

  // 坐标轴
  ctx.strokeStyle = '#D4C9B8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  // Y轴
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, margin.top + plotH);
  // X轴(居中)
  const zeroY = margin.top + plotH / 2;
  ctx.moveTo(margin.left, zeroY);
  ctx.lineTo(margin.left + plotW, zeroY);
  ctx.stroke();

  // 边框
  ctx.strokeStyle = '#FFFFFF';
  ctx.strokeRect(margin.left, margin.top, plotW, plotH);

  // Y轴标签
  ctx.fillStyle = '#5A6370';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  const maxDeg = 180;
  ctx.fillText(`${maxDeg}°`, margin.left - 4, margin.top + 4);
  ctx.fillText('0°', margin.left - 4, zeroY + 4);
  ctx.fillText(`-${maxDeg}°`, margin.left - 4, margin.top + plotH + 4);

  // X轴标签
  ctx.textAlign = 'center';
  const timeWindow = 10; // 显示最近10秒
  for (let t = 0; t <= timeWindow; t += 2) {
    const x = margin.left + (t / timeWindow) * plotW;
    ctx.fillText(`${t}s`, x, margin.top + plotH + 14);
  }

  // 裁剪区域
  ctx.save();
  ctx.beginPath();
  ctx.rect(margin.left, margin.top, plotW, plotH);
  ctx.clip();

  // 绘制理论周期标线（小角度近似）
  if (Math.abs(params.theta0) < degToRad(30)) {
    const T0 = simplePeriodTheory(params.L1, params.g);
    ctx.strokeStyle = 'rgba(14,97,172,0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 4]);
    for (let i = 1; i * T0 <= timeWindow; i++) {
      const x = margin.left + (1 - (i * T0) / timeWindow) * plotW;
      ctx.beginPath();
      ctx.moveTo(x, margin.top);
      ctx.lineTo(x, margin.top + plotH);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // 绘制角度曲线
  const history = simpleAngleHistory.toArray();
  if (history.length > 1) {
    ctx.strokeStyle = '#0E61AC';
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    let firstPoint = true;
    for (const pt of history) {
      const elapsedFromNow = simTime - pt.time;
      if (elapsedFromNow > timeWindow) continue;
      const x = margin.left + (1 - elapsedFromNow / timeWindow) * plotW;
      const angleDeg = radToDeg(pt.theta);
      const y = zeroY - (angleDeg / maxDeg) * (plotH / 2);
      if (firstPoint) { ctx.moveTo(x, y); firstPoint = false; }
      else { ctx.lineTo(x, y); }
    }
    ctx.stroke();
  }

  ctx.restore();

  // 标题
  ctx.fillStyle = '#5A6370';
  ctx.font = '11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('角度-时间图 (最近10秒)', w / 2, margin.top - 4);
}

/** 绘制双摆 */
function drawDoublePendulum() {
  const ctx = ctxDouble;
  const w = canvasDouble.width;
  const h = canvasDouble.height;
  ctx.clearRect(0, 0, w, h);

  const pivotX = w / 2;
  const pivotY = 35;

  // 动态缩放
  const maxLenCanvas = h - pivotY - 40;
  const totalLen = params.L1 + params.L2;
  const scale = maxLenCanvas / totalLen;

  const θ1 = doubleState[0];
  const θ2 = doubleState[1];
  const L1 = params.L1;
  const L2 = params.L2;

  // 关节位置
  const bob1X = pivotX + scale * L1 * Math.sin(θ1);
  const bob1Y = pivotY + scale * L1 * Math.cos(θ1);
  const bob2X = bob1X + scale * L2 * Math.sin(θ2);
  const bob2Y = bob1Y + scale * L2 * Math.cos(θ2);

  // --- 绘制末端轨迹（渐隐拖尾） ---
  const trail = doubleTrail.toArray();
  for (let i = 0; i < trail.length; i++) {
    const alpha = (i + 1) / trail.length; // 0→1，最新的最亮
    // 使用两种颜色混合来突出混沌轨迹
    const r = Math.floor(63 + (245 - 63) * alpha);
    const g = Math.floor(81 + (130 - 81) * alpha);
    const b = Math.floor(181 + (66 - 181) * alpha);
    ctx.fillStyle = `rgba(${r},${g},${b},${0.3 + 0.5 * alpha})`;
    ctx.beginPath();
    ctx.arc(trail[i].x, trail[i].y, 1.5, 0, 2 * Math.PI);
    ctx.fill();
  }

  // --- 绘制第一根杆 ---
  ctx.strokeStyle = '#5A6370';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(pivotX, pivotY);
  ctx.lineTo(bob1X, bob1Y);
  ctx.stroke();

  // --- 绘制第二根杆 ---
  ctx.strokeStyle = '#5A6370';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(bob1X, bob1Y);
  ctx.lineTo(bob2X, bob2Y);
  ctx.stroke();

  // --- 悬挂点 ---
  ctx.fillStyle = '#1A1A1A';
  ctx.beginPath();
  ctx.arc(pivotX, pivotY, 5, 0, 2 * Math.PI);
  ctx.fill();

  // --- 第一个摆球 ---
  const r1 = Math.max(8, Math.min(16, 7 + params.m * 4));
  const grad1 = ctx.createRadialGradient(bob1X - 2, bob1Y - 2, r1 * 0.2, bob1X, bob1Y, r1);
  grad1.addColorStop(0, '#ffffff');
  grad1.addColorStop(0.4, '#2A7CC7');
  grad1.addColorStop(1, '#6b3020');
  ctx.fillStyle = grad1;
  ctx.beginPath();
  ctx.arc(bob1X, bob1Y, r1, 0, 2 * Math.PI);
  ctx.fill();

  // --- 第二个摆球（末端） ---
  const r2 = Math.max(8, Math.min(16, 7 + params.m * 4));
  const grad2 = ctx.createRadialGradient(bob2X - 2, bob2Y - 2, r2 * 0.2, bob2X, bob2Y, r2);
  grad2.addColorStop(0, '#ffffff');
  grad2.addColorStop(0.4, '#0E61AC');
  grad2.addColorStop(1, '#1a4020');
  ctx.fillStyle = grad2;
  ctx.beginPath();
  ctx.arc(bob2X, bob2Y, r2, 0, 2 * Math.PI);
  ctx.fill();

  // 末端光晕（混沌视觉强调）
  ctx.shadowColor = '#0E61AC';
  ctx.shadowBlur = 14;
  ctx.strokeStyle = 'rgba(14,97,172,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(bob2X, bob2Y, r2 + 2, 0, 2 * Math.PI);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // 信息文字
  ctx.fillStyle = '#5A6370';
  ctx.font = '13px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`θ₁ = ${radToDeg(doubleState[0]).toFixed(1)}°`, 10, h - 30);
  ctx.fillText(`θ₂ = ${radToDeg(doubleState[1]).toFixed(1)}°`, 10, h - 12);
  ctx.textAlign = 'right';
  ctx.fillText(`t = ${simTime.toFixed(1)} s`, w - 10, h - 12);
}

/** 绘制双摆相图 (θ₁ vs θ₂) */
function drawDoublePhase() {
  const ctx = ctxDoubleGraph;
  const w = canvasDoubleGraph.width;
  const h = canvasDoubleGraph.height;
  ctx.clearRect(0, 0, w, h);

  const margin = { top: 15, right: 15, bottom: 28, left: 40 };
  const plotW = w - margin.left - margin.right;
  const plotH = h - margin.top - margin.bottom;

  // 坐标轴
  ctx.strokeStyle = '#D4C9B8';
  ctx.lineWidth = 1;
  ctx.beginPath();
  // 垂直轴 (θ₂)
  ctx.moveTo(margin.left + plotW / 2, margin.top);
  ctx.lineTo(margin.left + plotW / 2, margin.top + plotH);
  // 水平轴 (θ₁)
  ctx.moveTo(margin.left, margin.top + plotH / 2);
  ctx.lineTo(margin.left + plotW, margin.top + plotH / 2);
  ctx.stroke();

  // 边框
  ctx.strokeStyle = '#FFFFFF';
  ctx.strokeRect(margin.left, margin.top, plotW, plotH);

  // 轴标签
  ctx.fillStyle = '#5A6370';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('π', margin.left + plotW, margin.top + plotH / 2 + 3);
  ctx.fillText('-π', margin.left, margin.top + plotH / 2 + 3);
  ctx.fillText('π', margin.left + plotW / 2, margin.top - 2);
  ctx.fillText('-π', margin.left + plotW / 2, margin.top + plotH + 12);
  ctx.fillText('0', margin.left + plotW / 2, margin.top + plotH / 2 + 12);
  ctx.fillText('0', margin.left - 2, margin.top + plotH / 2 + 3);

  // 裁剪区域
  ctx.save();
  ctx.beginPath();
  ctx.rect(margin.left, margin.top, plotW, plotH);
  ctx.clip();

  // 坐标映射：θ₁/θ₂ ∈ [-π, π] → 画布坐标
  function toX(th) { return margin.left + ((th + Math.PI) / (2 * Math.PI)) * plotW; }
  function toY(th) { return margin.top + ((Math.PI - th) / (2 * Math.PI)) * plotH; }

  // 绘制相图数据点（渐隐效果）
  const phaseData = doublePhaseHistory.toArray();
  for (let i = 0; i < phaseData.length; i++) {
    const alpha = 0.08 + 0.35 * (i / phaseData.length);
    const x = toX(phaseData[i].θ1);
    const y = toY(phaseData[i].θ2);
    ctx.fillStyle = `rgba(14,97,172,${alpha})`;
    ctx.fillRect(x - 0.8, y - 0.8, 1.6, 1.6);
  }

  // 绘制当前点（高亮）
  const curθ1 = wrapAngle(doubleState[0]);
  const curθ2 = wrapAngle(doubleState[1]);
  const cx = toX(curθ1);
  const cy = toY(curθ2);
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(cx, cy, 3.5, 0, 2 * Math.PI);
  ctx.fill();
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
  ctx.stroke();

  ctx.restore();

  // 轴标题
  ctx.fillStyle = '#5A6370';
  ctx.font = '11px "Segoe UI","PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('相图: θ₁ vs θ₂  (归一化 [-π, π])', w / 2, margin.top - 4);
  ctx.save();
  ctx.translate(margin.left - 24, margin.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('θ₂', 0, 0);
  ctx.restore();
  ctx.fillText('θ₁', margin.left + plotW / 2, margin.top + plotH + 22);
}

// ==================== 仿真步进 ====================

const DT_SIM = 0.003;  // 仿真时间步长 (秒)，约333步/秒，保证RK4精度

function simulationStep() {
  // 单摆步进
  simpleState = rk4Step(simpleState, DT_SIM, simplePendulumDerivs, params.L1, params.g, params.damping);

  // 双摆步进
  doubleState = rk4Step(doubleState, DT_SIM, doublePendulumDerivs, params.L1, params.L2, params.m, params.g, params.damping);

  simTime += DT_SIM;
  stepCounter++;

  // 记录单摆角度历史（下采样以减少数据量）
  if (stepCounter % ANGLE_RECORD_EVERY === 0) {
    simpleAngleHistory.push({ time: simTime, theta: simpleState[0] });
  }

  // 测量单摆周期（过零点检测）
  const θ = simpleState[0];
  const sign = Math.sign(θ);
  if (simpleLastCrossSign !== 0 && sign !== 0 && sign !== simpleLastCrossSign) {
    // 检测到过零点
    if (simpleLastCrossTime > 0) {
      const newPeriod = 2 * (simTime - simpleLastCrossTime);
      // 低通滤波平滑周期测量
      if (simpleMeasuredPeriod === 0) {
        simpleMeasuredPeriod = newPeriod;
      } else {
        simpleMeasuredPeriod = 0.85 * simpleMeasuredPeriod + 0.15 * newPeriod;
      }
    }
    simpleLastCrossTime = simTime;
  }
  simpleLastCrossSign = sign;

  // 记录双摆末端轨迹 (canvas坐标)
  const w = canvasDouble.width;
  const h = canvasDouble.height;
  const pivotX = w / 2;
  const pivotY = 35;
  const maxLenCanvas = h - pivotY - 40;
  const totalLen = params.L1 + params.L2;
  const scale = maxLenCanvas / totalLen;
  const θ1 = doubleState[0];
  const θ2 = doubleState[1];
  const bob1X = pivotX + scale * params.L1 * Math.sin(θ1);
  const bob1Y = pivotY + scale * params.L1 * Math.cos(θ1);
  const bob2X = bob1X + scale * params.L2 * Math.sin(θ2);
  const bob2Y = bob1Y + scale * params.L2 * Math.cos(θ2);
  doubleTrail.push({ x: bob2X, y: bob2Y });

  // 记录相图数据（下采样）
  if (stepCounter % PHASE_RECORD_EVERY === 0) {
    doublePhaseHistory.push({
      θ1: wrapAngle(doubleState[0]),
      θ2: wrapAngle(doubleState[1])
    });
  }
}

// ==================== 渲染循环 ====================

let lastFrameTime = 0;
let animId = null;

function renderFrame(timestamp) {
  if (!lastFrameTime) lastFrameTime = timestamp;
  let elapsed = (timestamp - lastFrameTime) / 1000;
  lastFrameTime = timestamp;

  // 防止卡顿后的大跳跃（螺旋死亡）
  if (elapsed > 0.1) elapsed = 0.1;

  if (running) {
    // 按固定步长推进仿真，追赶实际流逝时间
    let stepsRemaining = Math.floor(elapsed / DT_SIM);
    const maxStepsPerFrame = 15; // 每帧最多步数限制
    if (stepsRemaining > maxStepsPerFrame) stepsRemaining = maxStepsPerFrame;
    for (let i = 0; i < stepsRemaining; i++) {
      simulationStep();
    }
  }

  // 绘制所有画布
  drawSimplePendulum();
  drawSimpleGraph();
  drawDoublePendulum();
  drawDoublePhase();

  // 更新能量显示
  updateEnergyDisplay();

  animId = requestAnimationFrame(renderFrame);
}

// ==================== 能量显示更新 ====================

function updateEnergyDisplay() {
  const eSimple = simplePendulumEnergy(simpleState, params.L1, params.m, params.g);
  const eDouble = doublePendulumEnergy(doubleState, params.L1, params.L2, params.m, params.g);
  const simpleErr = simpleE0 !== 0 ? Math.abs((eSimple - simpleE0) / simpleE0) * 100 : 0;
  const doubleErr = doubleE0 !== 0 ? Math.abs((eDouble - doubleE0) / doubleE0) * 100 : 0;

  document.getElementById('eSimpleInit').textContent = simpleE0.toFixed(4);
  document.getElementById('eSimpleCurr').textContent = eSimple.toFixed(4);
  document.getElementById('eDoubleInit').textContent = doubleE0.toFixed(4);
  document.getElementById('eDoubleCurr').textContent = eDouble.toFixed(4);

  // 能量偏差着色
  const eSimpleCurrEl = document.getElementById('eSimpleCurr');
  const eDoubleCurrEl = document.getElementById('eDoubleCurr');
  eSimpleCurrEl.style.color = simpleErr < 0.1 ? '#0E61AC' : simpleErr < 1 ? '#d29922' : '#2A7CC7';
  eDoubleCurrEl.style.color = doubleErr < 0.1 ? '#0E61AC' : doubleErr < 1 ? '#d29922' : '#2A7CC7';
}

// ==================== 重置函数 ====================

function resetSimulation() {
  // 从控件读取参数
  readParams();

  // 重置状态
  simpleState = [params.theta0, 0];
  doubleState = [params.theta1, params.theta2, 0, 0];
  simTime = 0;

  // 计算初始能量
  simpleE0 = simplePendulumEnergy(simpleState, params.L1, params.m, params.g);
  doubleE0 = doublePendulumEnergy(doubleState, params.L1, params.L2, params.m, params.g);

  // 清空历史数据
  simpleAngleHistory.clear();
  doubleTrail.clear();
  doublePhaseHistory.clear();

  // 重置周期测量
  simpleLastCrossTime = 0;
  simpleLastCrossSign = 0;
  simpleMeasuredPeriod = 0;
  stepCounter = 0;

  // 添加初始数据点
  simpleAngleHistory.push({ time: 0, theta: params.theta0 });
  // 初始相图点
  doublePhaseHistory.push({
    θ1: wrapAngle(params.theta1),
    θ2: wrapAngle(params.theta2)
  });

  updateEnergyDisplay();
}

// ==================== 控件读取 ====================

function readParams() {
  params.L1 = parseFloat(document.getElementById('ctrlL1').value);
  params.L2 = parseFloat(document.getElementById('ctrlL2').value);
  params.m = parseFloat(document.getElementById('ctrlM').value);
  params.g = parseFloat(document.getElementById('ctrlG').value);
  params.theta0 = degToRad(parseFloat(document.getElementById('ctrlTheta0').value));
  params.theta1 = degToRad(parseFloat(document.getElementById('ctrlTheta1').value));
  params.theta2 = degToRad(parseFloat(document.getElementById('ctrlTheta2').value));
  params.damping = parseFloat(document.getElementById('ctrlDamping').value);
}

function updateValueDisplays() {
  document.getElementById('valL1').textContent = parseFloat(document.getElementById('ctrlL1').value).toFixed(2);
  document.getElementById('valL2').textContent = parseFloat(document.getElementById('ctrlL2').value).toFixed(2);
  document.getElementById('valM').textContent = parseFloat(document.getElementById('ctrlM').value).toFixed(1);
  document.getElementById('valG').textContent = parseFloat(document.getElementById('ctrlG').value).toFixed(2);
  document.getElementById('valTheta0').textContent = document.getElementById('ctrlTheta0').value + '°';
  document.getElementById('valTheta1').textContent = document.getElementById('ctrlTheta1').value + '°';
  document.getElementById('valTheta2').textContent = document.getElementById('ctrlTheta2').value + '°';
  document.getElementById('valDamping').textContent = parseFloat(document.getElementById('ctrlDamping').value).toFixed(2);
}

// ==================== 事件绑定 ====================

document.getElementById('btnStart').addEventListener('click', () => {
  if (!running) {
    // 如果是从暂停恢复，先读取参数（允许用户在暂停时微调）
    if (simTime === 0) {
      // 首次启动，重置
      resetSimulation();
    }
    running = true;
    lastFrameTime = 0; // 重置时间基准，避免追赶
  }
});

document.getElementById('btnPause').addEventListener('click', () => {
  running = false;
});

document.getElementById('btnReset').addEventListener('click', () => {
  running = false;
  resetSimulation();
  lastFrameTime = 0;
  // 立即渲染一帧
  drawSimplePendulum();
  drawSimpleGraph();
  drawDoublePendulum();
  drawDoublePhase();
  updateEnergyDisplay();
});

// 滑块实时更新数值显示；改变参数时自动重置
const sliders = ['ctrlL1', 'ctrlL2', 'ctrlM', 'ctrlG', 'ctrlTheta0', 'ctrlTheta1', 'ctrlTheta2', 'ctrlDamping'];
sliders.forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    updateValueDisplays();
    // 参数改变 → 自动重置仿真
    if (simTime > 0 || running || simpleAngleHistory.length > 1) {
      running = false;
      resetSimulation();
      lastFrameTime = 0;
      drawSimplePendulum();
      drawSimpleGraph();
      drawDoublePendulum();
      drawDoublePhase();
      updateEnergyDisplay();
    }
  });
});

// ==================== 启动 ====================

// 初始化
resetSimulation();
updateValueDisplays();
drawSimplePendulum();
drawSimpleGraph();
drawDoublePendulum();
drawDoublePhase();
updateEnergyDisplay();

// 启动渲染循环
animId = requestAnimationFrame(renderFrame);
</script>
