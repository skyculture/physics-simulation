<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圆孔衍射 - 物理数值仿真平台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF2E0;color:#1A1A1A;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;justify-content:center;padding:24px 16px 40px}
.container{width:100%;max-width:1100px}
.header{text-align:center;margin-bottom:24px;padding:28px 20px;background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px}
.header h1{font-size:2rem;font-weight:700;color:#0E61AC;letter-spacing:.05em;margin-bottom:8px}
.header .subtitle{font-size:.95rem;color:#5A6370;line-height:1.6}
.canvas-row{display:flex;gap:16px;margin-bottom:20px}
@media(max-width:860px){.canvas-row{flex-direction:column}}
.panel{flex:1;background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center}
.panel h2{font-size:.95rem;font-weight:600;color:#5A6370;margin-bottom:8px;text-align:center}
.panel canvas{width:100%;height:auto;border-radius:6px;background:#FAF2E0}
.controls{background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:16px}
@media(max-width:640px){.controls{grid-template-columns:1fr}}
.control-group{display:flex;flex-direction:column;gap:6px}
.control-group label{font-size:.85rem;font-weight:600;color:#1A1A1A;display:flex;justify-content:space-between;align-items:baseline}
.control-group label .val{font-size:.8rem;color:#0E61AC;font-weight:700;min-width:80px;text-align:right}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;background:#D4C9B8;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #FFF7EB;cursor:pointer;transition:transform .1s}
input[type="range"]::-webkit-slider-thumb:hover{transform:scale(1.15)}
input[type="range"]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#0E61AC;border:2px solid #FFF7EB;cursor:pointer}
.info-bar{background:#FFF7EB;border:1px solid #D4C9B8;border-radius:12px;padding:14px 24px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:24px;justify-content:center;font-size:.9rem}
.info-item{display:flex;align-items:baseline;gap:6px}
.info-item .info-label{color:#5A6370}
.info-item .info-value{color:#0E61AC;font-weight:700;font-size:1rem}
.btn-row{display:flex;gap:12px;justify-content:center}
.btn{padding:10px 28px;border:1px solid #D4C9B8;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;font-family:inherit}
.btn-start{background:#238636;color:#fff;border-color:#2ea043}
.btn-start:hover{background:#2ea043}
.btn-pause{background:#9e6a03;color:#fff;border-color:#bb8009}
.btn-pause:hover{background:#bb8009}
.btn-reset{background:#FFFFFF;color:#1A1A1A;border-color:#D4C9B8}
.btn-reset:hover{background:#D4C9B8}
.legend-note{text-align:center;font-size:.78rem;color:#5A6370;margin-top:12px;line-height:1.5}
</style>
</head>
<body>
<div class="back-bar" style="display:flex;align-items:center;padding:8px 16px;gap:8px;position:sticky;top:0;z-index:100;background:var(--panel,#FFF7EB);border-bottom:1px solid var(--border,#D4C9B8);">
  <a href="index.html" style="color:var(--accent,#0E61AC);text-decoration:none;font-size:0.85rem;font-weight:600;padding:4px 10px;border:1px solid var(--border,#D4C9B8);border-radius:5px;transition:background 0.15s;" onmouseover="this.style.background='#FFF7EB'" onmouseout="this.style.background='transparent'">← 返回实验列表</a>
</div>


<div class="container">
  <div class="header">
    <h1>圆孔衍射</h1>
    <p class="subtitle">光通过圆孔时发生衍射，在远场形成艾里斑图样。光强分布 I=I₀[2J₁(x)/x]²，其中 x=πa·sinθ/λ。艾里斑半径 r=1.22λL/a，中心亮斑集中约84%的光能。</p>
  </div>
  <div class="canvas-row">
    <div class="panel">
      <h2>🔬 艾里斑图样</h2>
      <canvas id="canvasAiry" width="680" height="420"></canvas>
    </div>
    <div class="panel">
      <h2>📊 径向光强分布</h2>
      <canvas id="canvasProfile" width="680" height="420"></canvas>
    </div>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>孔径 a <span class="val" id="valA">2.0 mm</span></label>
      <input type="range" id="sliderA" min="0.5" max="10" step="0.1" value="2">
    </div>
    <div class="control-group">
      <label>波长 λ <span class="val" id="valLambda">550 nm</span></label>
      <input type="range" id="sliderLambda" min="380" max="780" step="1" value="550">
    </div>
    <div class="control-group">
      <label>屏距 L <span class="val" id="valL">1.0 m</span></label>
      <input type="range" id="sliderL" min="0.1" max="5" step="0.1" value="1">
    </div>
  </div>
  <div class="info-bar">
    <div class="info-item"><span class="info-label">艾里斑半径=</span><span class="info-value" id="infoAiryR">0.336 mm</span></div>
    <div class="info-item"><span class="info-label">第一暗环角=</span><span class="info-value" id="infoAngle">0.336 mrad</span></div>
    <div class="info-item"><span class="info-label">衍射极限分辨率=</span><span class="info-value" id="infoRes">0.336 mrad</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart">▶ 动画</button>
    <button class="btn btn-pause" id="btnPause">⏸ 暂停</button>
    <button class="btn btn-reset" id="btnReset">↺ 重置</button>
  </div>
  <p class="legend-note">💡 提示：圆孔衍射产生艾里斑，减小孔径或增大波长会使艾里斑变大，分辨率降低。<br>瑞利判据：两个点光源的最小可分辨角距 θ_min=1.22λ/a，a为孔径直径。</p>
</div>
<script>
var canvasAiry=document.getElementById('canvasAiry');
var ctxA=canvasAiry.getContext('2d');
var canvasProfile=document.getElementById('canvasProfile');
var ctxP=canvasProfile.getContext('2d');
var sliderA=document.getElementById('sliderA');
var sliderLambda=document.getElementById('sliderLambda');
var sliderL=document.getElementById('sliderL');
var valA=document.getElementById('valA');
var valLambda=document.getElementById('valLambda');
var valL=document.getElementById('valL');
var infoAiryR=document.getElementById('infoAiryR');
var infoAngle=document.getElementById('infoAngle');
var infoRes=document.getElementById('infoRes');
var btnStart=document.getElementById('btnStart');
var btnPause=document.getElementById('btnPause');
var btnReset=document.getElementById('btnReset');

var a=2e-3,lambda=550e-9,L=1.0;
var running=false,animTime=0,lastFrameTime=null,animFrameId=null;
var maxRPhys=5e-3;

function wavelengthToRGB(w){
  var r,g,b;
  if(w>=380&&w<440){r=-(w-440)/(440-380);g=0;b=1}
  else if(w>=440&&w<490){r=0;g=(w-440)/(490-440);b=1}
  else if(w>=490&&w<510){r=0;g=1;b=-(w-510)/(510-490)}
  else if(w>=510&&w<580){r=(w-510)/(580-510);g=1;b=0}
  else if(w>=580&&w<645){r=1;g=-(w-645)/(645-580);b=0}
  else if(w>=645&&w<=780){r=1;g=0;b=0}
  else{r=0;g=0;b=0}
  var factor=1;
  if(w>=380&&w<420)factor=0.3+0.7*(w-380)/(420-380);
  else if(w>700&&w<=780)factor=0.3+0.7*(780-w)/(780-700);
  var gamma=0.8;
  r=Math.round(255*Math.pow(r*factor,gamma));
  g=Math.round(255*Math.pow(g*factor,gamma));
  b=Math.round(255*Math.pow(b*factor,gamma));
  return[r,g,b];
}

function J1(x){
  var ax=Math.abs(x);
  if(ax<1e-12)return 0;
  var s=x<0?-1:1;
  if(ax<12){
    var sum=0,t=ax/2;
    sum=t;
    for(var k=1;k<=30;k++){
      t*=-(ax*ax/4)/(k*(k+1));
      sum+=t;
      if(Math.abs(t)<1e-15*Math.abs(sum))break;
    }
    return s*sum;
  }else{
    return s*Math.sqrt(2/(Math.PI*ax))*Math.cos(ax-3*Math.PI/4);
  }
}

function airyIntensity(x){
  if(Math.abs(x)<1e-8)return 1;
  var j1x=J1(x);
  var v=2*j1x/x;
  return v*v;
}

function updateUI(){
  valA.textContent=(a*1e3).toFixed(1)+' mm';
  valLambda.textContent=(lambda*1e9).toFixed(0)+' nm';
  valL.textContent=L.toFixed(1)+' m';
  var rAiry=1.22*lambda*L/a;
  if(rAiry<1e-3)infoAiryR.textContent=(rAiry*1e6).toFixed(1)+' μm';
  else infoAiryR.textContent=(rAiry*1e3).toFixed(3)+' mm';
  var theta1=1.22*lambda/a;
  if(theta1<1e-3)infoAngle.textContent=(theta1*1e6).toFixed(2)+' μrad';
  else infoAngle.textContent=(theta1*1e3).toFixed(3)+' mrad';
  if(theta1<1e-3)infoRes.textContent=(theta1*1e6).toFixed(2)+' μrad';
  else infoRes.textContent=(theta1*1e3).toFixed(3)+' mrad';
}

sliderA.addEventListener('input',function(){a=+sliderA.value*1e-3;updateUI();if(!running)draw()});
sliderLambda.addEventListener('input',function(){lambda=+sliderLambda.value*1e-9;updateUI();if(!running)draw()});
sliderL.addEventListener('input',function(){L=+sliderL.value;updateUI();if(!running)draw()});

btnStart.addEventListener('click',function(){
  if(running){pause();return}
  running=true;btnStart.classList.add('active');btnPause.classList.remove('active');
  if(!animFrameId)animFrameId=requestAnimationFrame(animate);
});
btnPause.addEventListener('click',pause);
function pause(){running=false;btnStart.classList.remove('active');btnPause.classList.add('active')}
btnReset.addEventListener('click',function(){
  a=2e-3;lambda=550e-9;L=1.0;animTime=0;lastFrameTime=null;
  sliderA.value=2;sliderLambda.value=550;sliderL.value=1;
  updateUI();if(!running)draw();
});

function drawAiry(){
  var W=canvasAiry.width,H=canvasAiry.height;
  ctxA.clearRect(0,0,W,H);
  ctxA.fillStyle='#FAF2E0';ctxA.fillRect(0,0,W,H);
  var cx=W/2,cy=H/2;
  var halfSize=Math.min(W,H)/2;
  var colors=wavelengthToRGB(lambda*1e9);

  var maxPixR=Math.ceil(Math.sqrt(cx*cx+cy*cy));
  var lut=new Float64Array(maxPixR+1);
  for(var r=0;r<=maxPixR;r++){
    var rPhys=r*maxRPhys/halfSize;
    var x=Math.PI*a*rPhys/(lambda*L);
    var I=airyIntensity(x);
    lut[r]=Math.pow(I,0.35);
  }

  var imgData=ctxA.createImageData(W,H);
  var data=imgData.data;
  for(var y=0;y<H;y++){
    for(var xp=0;xp<W;xp++){
      var dx=xp-cx,dy=y-cy;
      var pr=Math.round(Math.sqrt(dx*dx+dy*dy));
      if(pr>maxPixR)pr=maxPixR;
      var I=lut[pr];
      var idx=(y*W+xp)*4;
      data[idx]=Math.round(colors[0]*I);
      data[idx+1]=Math.round(colors[1]*I);
      data[idx+2]=Math.round(colors[2]*I);
      data[idx+3]=255;
    }
  }
  ctxA.putImageData(imgData,0,0);

  ctxA.strokeStyle='#D4C9B8';ctxA.lineWidth=1;
  ctxA.beginPath();ctxA.arc(cx,cy,halfSize,0,Math.PI*2);ctxA.stroke();

  ctxA.fillStyle='#1A1A1A';ctxA.font='11px sans-serif';ctxA.textAlign='center';
  ctxA.fillText('艾里斑衍射图样',cx,H-10);
}

function drawProfile(){
  var W=canvasProfile.width,H=canvasProfile.height;
  ctxP.clearRect(0,0,W,H);
  ctxP.fillStyle='#FAF2E0';ctxP.fillRect(0,0,W,H);
  var ml=60,mt=30,mr=30,mb=50;
  var pw=W-ml-mr,ph=H-mt-mb;
  var colors=wavelengthToRGB(lambda*1e9);
  var colorStr='rgb('+colors[0]+','+colors[1]+','+colors[2]+')';

  ctxP.strokeStyle='#484f58';ctxP.lineWidth=1.5;
  ctxP.beginPath();ctxP.moveTo(ml,mt+ph);ctxP.lineTo(ml,mt);ctxP.stroke();
  ctxP.beginPath();ctxP.moveTo(ml,mt+ph);ctxP.lineTo(ml+pw,mt+ph);ctxP.stroke();

  ctxP.strokeStyle='#D4C9B8';ctxP.lineWidth=0.8;ctxP.setLineDash([4,4]);
  for(var i=0;i<=4;i++){var y=mt+ph-i*(ph/4);ctxP.beginPath();ctxP.moveTo(ml,y);ctxP.lineTo(ml+pw,y);ctxP.stroke()}
  ctxP.setLineDash([]);

  ctxP.fillStyle='#5A6370';ctxP.font='11px sans-serif';ctxP.textAlign='right';
  for(var i=0;i<=4;i++){var y=mt+ph-i*(ph/4);ctxP.fillText((i/4).toFixed(1),ml-6,y+4)}
  ctxP.textAlign='center';
  ctxP.fillText('r (mm)',ml+pw/2,mt+ph+38);
  for(var i=0;i<=5;i++){
    var x=ml+i*pw/5;
    var rVal=i*maxRPhys/5*1e3;
    ctxP.fillText(rVal.toFixed(1),x,mt+ph+18);
  }

  ctxP.strokeStyle=colorStr;ctxP.lineWidth=2.5;ctxP.shadowColor=colorStr;ctxP.shadowBlur=6;
  ctxP.beginPath();
  for(var i=0;i<=400;i++){
    var rPhys=i/400*maxRPhys;
    var x=Math.PI*a*rPhys/(lambda*L);
    var I=airyIntensity(x);
    var px=ml+i/400*pw;
    var py=mt+ph-I*ph;
    if(i===0)ctxP.moveTo(px,py);else ctxP.lineTo(px,py);
  }
  ctxP.stroke();ctxP.shadowBlur=0;

  var j1Zeros=[3.8317,7.0156,10.1735,13.3237,16.4706];
  ctxP.strokeStyle='rgba(255,166,87,0.6)';ctxP.lineWidth=1;ctxP.setLineDash([3,3]);
  var lastLabelX=-100;
  for(var k=0;k<j1Zeros.length;k++){
    var rRing=j1Zeros[k]*lambda*L/(Math.PI*a);
    if(rRing>maxRPhys)break;
    var px=ml+rRing/maxRPhys*pw;
    ctxP.beginPath();ctxP.moveTo(px,mt);ctxP.lineTo(px,mt+ph);ctxP.stroke();
    if(px-lastLabelX>40){
      ctxP.fillStyle='#2A7CC7';ctxP.font='10px sans-serif';ctxP.textAlign='center';
      ctxP.fillText('第'+(k+1)+'暗环',px,mt-5);
      lastLabelX=px;
    }
  }
  ctxP.setLineDash([]);

  ctxP.strokeStyle='#2A7CC7';ctxP.lineWidth=2;ctxP.strokeRect(ml,mt,pw,ph);
  ctxP.fillStyle='#5A6370';ctxP.font='10px sans-serif';ctxP.textAlign='left';
  ctxP.fillText('I/I\u2080',ml+5,mt+12);
}

function draw(){drawAiry();drawProfile()}

function animate(timestamp){
  if(!running){animFrameId=null;return}
  if(lastFrameTime===null)lastFrameTime=timestamp;
  var dt=Math.min((timestamp-lastFrameTime)/1000,0.1);
  lastFrameTime=timestamp;animTime+=dt;
  a=(3+2.5*Math.sin(animTime*0.35))*1e-3;
  if(a<0.5e-3)a=0.5e-3;
  if(a>10e-3)a=10e-3;
  sliderA.value=(a*1e3).toFixed(1);
  updateUI();draw();
  if(running)animFrameId=requestAnimationFrame(animate);
}

function resizeCanvases(){
  var rowW=document.querySelector('.canvas-row').clientWidth;var cw=Math.floor((rowW-16)/2)-26;if(cw>680)cw=680;if(cw<200)cw=200;
  var sh=Math.round(cw*420/680);
  canvasAiry.width=cw;canvasAiry.height=sh;
  canvasAiry.style.width=cw+'px';canvasAiry.style.height=sh+'px';
  canvasProfile.width=cw;canvasProfile.height=sh;
  canvasProfile.style.width=cw+'px';canvasProfile.style.height=sh+'px';
}
window.addEventListener('resize',resizeCanvases);resizeCanvases();
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();if(running)pause();else btnStart.click()}
  else if(e.code==='KeyR'){e.preventDefault();btnReset.click()}
});
updateUI();draw();
</script>
</body>
</html>
