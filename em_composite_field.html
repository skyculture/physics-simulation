<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>带电粒子在复合场中的运动 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; --ac2:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; }
  #content { flex:1; display:flex; flex-direction:column; padding:10px; gap:10px; overflow:hidden; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; min-height:0; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; align-items:center; }
  .ctrl-group { display:flex; align-items:center; gap:6px; font-size:0.76em; }
  .ctrl-group label { color:#5A6370; white-space:nowrap; }
  .ctrl-group input[type="range"] { width:110px; accent-color:var(--accent); }
  .ctrl-group input[type="number"] { width:55px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 5px; color:var(--text); font-size:0.9em; text-align:center; }
  button { background:var(--accent); color:#FAF2E0; border:none; border-radius:4px; padding:4px 14px; cursor:pointer; font-size:0.76em; font-weight:600; }
  button:hover { opacity:0.85; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.74em; color:#5A6370; line-height:1.6; }

@media (max-width:900px) {
  .main { flex-direction:column; }
  .controls { width:100%; }
  .canvas-wrap { min-height:300px; }
}
</style>
</head>
<body>

<div id="container">
  <div id="content">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="ctrl-group"><label>电场 E:</label><input type="range" id="eField" min="0" max="3" step="0.1" value="1"><input type="number" id="eFieldVal" value="1"></div>
      <div class="ctrl-group"><label>磁场 B:</label><input type="range" id="bField" min="0.1" max="3" step="0.1" value="1"><input type="number" id="bFieldVal" value="1"></div>
      <div class="ctrl-group"><label>初速度 v₀:</label><input type="range" id="velocity" min="0" max="5" step="0.1" value="0"><input type="number" id="velocityVal" value="0"></div>
      <div class="ctrl-group"><label>电荷 q:</label><input type="range" id="charge" min="-2" max="2" step="0.5" value="1"><input type="number" id="chargeVal" value="1"></div>
      <div class="ctrl-group"><label>质量 m:</label><input type="range" id="mass" min="0.5" max="3" step="0.1" value="1"><input type="number" id="massVal" value="1"></div>
      <button id="resetBtn">重置</button>
      <button id="pauseBtn">暂停</button>
    </div>
    <div id="info">带电粒子在电场 E 和磁场 B 共同作用下受完整洛伦兹力 F = q(E + v×B)。在正交电磁场中，粒子做漂移运动：E×B 漂移速度 v_d = E/B，轨迹为摆线（旋轮线）。v₀=0 时为尖摆线，v₀=v_d 时为圆，v₀>v_d 时为结摆线。使用 Boris 算法数值积分。</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId;
let paused = false;

const DT = 0.02;
const SUBSTEPS = 5;
const MAX_TRAIL = 5000;

let px, py, vx, vy;
let trail = [];
let cameraX = 0;
let cameraY = 0;

function getParams() {
  return {
    E: parseFloat(document.getElementById('eField').value),
    B: parseFloat(document.getElementById('bField').value),
    v0: parseFloat(document.getElementById('velocity').value),
    q: parseFloat(document.getElementById('charge').value),
    m: parseFloat(document.getElementById('mass').value)
  };
}

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w && h) { canvas.width = w; canvas.height = h; }
}

function init() {
  var p = getParams();
  px = 0;
  py = 0;
  vx = p.v0;
  vy = 0;
  trail = [];
  cameraX = 0;
  cameraY = 0;
}

function borisStep(dt, q, m, Bz, Ex, Ey) {
  var qdt2m = q * dt / (2 * m);
  var vmx = vx + Ex * qdt2m;
  var vmy = vy + Ey * qdt2m;
  var t = q * Bz * dt / (2 * m);
  var s = 2 * t / (1 + t * t);
  var vpx = vmx + vmy * t;
  var vpy = vmy - vmx * t;
  var vplusx = vmx + vpy * s;
  var vplusy = vmy - vpx * s;
  vx = vplusx + Ex * qdt2m;
  vy = vplusy + Ey * qdt2m;
  px += vx * dt;
  py += vy * dt;
}

function getScale() {
  var p = getParams();
  var absq = Math.abs(p.q);
  if (p.B < 0.01) return 50;
  var vDrift = p.E / p.B;
  var vPerp = Math.abs(p.v0 - vDrift);
  if (vPerp < 0.01) vPerp = vDrift;
  if (vPerp < 0.01) vPerp = 1;
  var r = (absq > 0.01) ? p.m * vPerp / (absq * p.B) : 5;
  var minDim = Math.min(canvas.width, canvas.height);
  var scale = minDim / (5 * Math.max(r, 0.3));
  return Math.max(15, Math.min(scale, 120));
}

function toScreen(x, y) {
  var SCALE = getScale();
  return [canvas.width / 2 + (x - cameraX) * SCALE, canvas.height / 2 - (y - cameraY) * SCALE];
}

function drawArrow(x1, y1, x2, y2, color, lw) {
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  var angle = Math.atan2(y2 - y1, x2 - x1);
  var hl = 8;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(angle - 0.4), y2 - hl * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - hl * Math.cos(angle + 0.4), y2 - hl * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}

function draw() {
  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  var p = getParams();
  var SCALE = getScale();

  if (!paused) {
    for (var i = 0; i < SUBSTEPS; i++) {
      borisStep(DT, p.q, p.m, p.B, 0, p.E);
      trail.push([px, py]);
      if (trail.length > MAX_TRAIL) trail.shift();
    }
  }

  cameraX += (px - cameraX) * 0.08;
  cameraY += (py - cameraY) * 0.08;

  var cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.strokeStyle = 'rgba(14,97,172,0.06)';
  ctx.lineWidth = 1;
  var gridOffX = (cameraX * SCALE) % SCALE;
  var gridOffY = (cameraY * SCALE) % SCALE;
  for (var gx = -1; gx <= Math.ceil(canvas.width / SCALE) + 1; gx++) {
    var sx = gx * SCALE - gridOffX + (cx % SCALE);
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height); ctx.stroke();
  }
  for (var gy = -1; gy <= Math.ceil(canvas.height / SCALE) + 1; gy++) {
    var sy = gy * SCALE + gridOffY + (cy % SCALE);
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy); ctx.stroke();
  }

  ctx.fillStyle = 'rgba(14,97,172,0.1)';
  var bStep = Math.max(2, Math.round(2 * SCALE / 50));
  for (var bx = -25; bx <= 25; bx += bStep) {
    for (var by = -18; by <= 18; by += bStep) {
      var physX = cameraX + (bx * SCALE - cx) / SCALE;
      var physY = cameraY + (cy - by * SCALE) / SCALE;
      var bsx = cx + (physX - cameraX) * SCALE;
      var bsy = cy - (physY - cameraY) * SCALE;
      if (bsx > 5 && bsx < canvas.width - 5 && bsy > 5 && bsy < canvas.height - 5) {
        ctx.beginPath();
        ctx.arc(bsx, bsy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  if (p.E > 0.01) {
    ctx.strokeStyle = 'rgba(42,124,199,0.15)';
    ctx.lineWidth = 1;
    var eStep = Math.max(3, Math.round(3 * SCALE / 50));
    var eArrowLen = Math.min(20, SCALE * 0.6);
    for (var ex = -25; ex <= 25; ex += eStep) {
      for (var ey = -18; ey <= 18; ey += eStep) {
        var epx = cameraX + (ex * SCALE - cx) / SCALE;
        var epy = cameraY + (cy - ey * SCALE) / SCALE;
        var esx = cx + (epx - cameraX) * SCALE;
        var esy = cy - (epy - cameraY) * SCALE;
        if (esx > 15 && esx < canvas.width - 15 && esy > 15 && esy < canvas.height - 15) {
          ctx.beginPath();
          ctx.moveTo(esx, esy + eArrowLen / 2);
          ctx.lineTo(esx, esy - eArrowLen / 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(esx, esy - eArrowLen / 2);
          ctx.lineTo(esx - 3, esy - eArrowLen / 2 + 5);
          ctx.moveTo(esx, esy - eArrowLen / 2);
          ctx.lineTo(esx + 3, esy - eArrowLen / 2 + 5);
          ctx.stroke();
        }
      }
    }
  }

  if (trail.length > 1) {
    var chunkSize = 30;
    for (var ci = 0; ci < trail.length - 1; ci += chunkSize) {
      var alpha = ((ci + chunkSize / 2) / trail.length) * 0.85;
      ctx.strokeStyle = 'rgba(42,124,199,' + alpha.toFixed(3) + ')';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      var pt0 = toScreen(trail[ci][0], trail[ci][1]);
      ctx.moveTo(pt0[0], pt0[1]);
      var end = Math.min(ci + chunkSize + 1, trail.length);
      for (var ti = ci + 1; ti < end; ti++) {
        var pt = toScreen(trail[ti][0], trail[ti][1]);
        ctx.lineTo(pt[0], pt[1]);
      }
      ctx.stroke();
    }
  }

  var sp = toScreen(px, py);
  ctx.fillStyle = '#2A7CC7';
  ctx.shadowColor = '#2A7CC7';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(sp[0], sp[1], 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  var speed = Math.sqrt(vx * vx + vy * vy);
  if (speed > 0.01) {
    var vArrowLen = Math.min(40, 10 + speed * 6);
    var vax = sp[0] + (vx / speed) * vArrowLen;
    var vay = sp[1] - (vy / speed) * vArrowLen;
    drawArrow(sp[0], sp[1], vax, vay, '#0E61AC', 2);
  }

  var absq = Math.abs(p.q);
  var Fx = p.q * (vy * p.B);
  var Fy = p.q * (p.E - vx * p.B);
  var Fmag = Math.sqrt(Fx * Fx + Fy * Fy);
  if (Fmag > 0.001) {
    var fArrowLen = Math.min(35, 8 + Fmag * 4);
    var fax = sp[0] + (Fx / Fmag) * fArrowLen;
    var fay = sp[1] - (Fy / Fmag) * fArrowLen;
    drawArrow(sp[0], sp[1], fax, fay, '#0E61AC', 2);
  }

  if (p.B > 0.01 && p.E > 0.01) {
    var vDrift = p.E / p.B;
    var dax = sp[0] + vDrift * SCALE * 0.3;
    var day = sp[1];
    if (Math.abs(vDrift) > 0.01) {
      drawArrow(sp[0], sp[1] + 20, dax, sp[1] + 20, '#e3b341', 2);
      ctx.fillStyle = '#e3b341';
      ctx.font = '10px "Segoe UI",sans-serif';
      ctx.fillText('v_d', dax + 5, sp[1] + 24);
    }
  }

  var currentSpeed = Math.sqrt(vx * vx + vy * vy);
  var omega = (absq > 0.01) ? absq * p.B / p.m : 0;
  var T = omega > 0 ? 2 * Math.PI / omega : Infinity;
  var vDriftVal = (p.B > 0.01) ? p.E / p.B : 0;
  var vPerp = Math.sqrt(Math.max(0, currentSpeed * currentSpeed - vDriftVal * vDriftVal));
  var rCyc = (absq > 0.01 && p.B > 0.01) ? p.m * vPerp / (absq * p.B) : 0;
  var KE = 0.5 * p.m * currentSpeed * currentSpeed;

  ctx.font = '12px "Segoe UI",sans-serif';
  var iy = canvas.height - 12;
  ctx.fillStyle = '#5A6370';
  ctx.fillText('速率 |v| = ' + currentSpeed.toFixed(3), 15, iy - 48);
  ctx.fillText('E×B漂移 v_d = ' + vDriftVal.toFixed(3), 15, iy - 32);
  ctx.fillText('回旋半径 r = ' + (rCyc > 0.001 ? rCyc.toFixed(3) : '0'), 15, iy - 16);
  ctx.fillText('动能 KE = ' + KE.toFixed(3), 15, iy);

  ctx.fillText('回旋频率 ω = ' + omega.toFixed(3) + ' rad/s', 280, iy - 48);
  ctx.fillText('周期 T = ' + (T === Infinity ? '∞' : T.toFixed(3)) + ' s', 280, iy - 32);
  ctx.fillText('电荷 q = ' + (p.q > 0 ? '+' : '') + p.q, 280, iy - 16);
  ctx.fillText('质量 m = ' + p.m.toFixed(1), 280, iy);

  ctx.fillText('电场 E = ' + p.E.toFixed(1) + ' (↑)', 500, iy - 48);
  ctx.fillText('磁场 B = ' + p.B.toFixed(1) + ' (⊙ 出屏)', 500, iy - 32);
  ctx.fillText('位置 x = ' + px.toFixed(2), 500, iy - 16);
  ctx.fillText('位置 y = ' + py.toFixed(2), 500, iy);

  var lx = canvas.width - 155, ly = 18;
  drawArrow(lx, ly, lx + 25, ly, '#0E61AC', 2);
  ctx.fillStyle = '#0E61AC';
  ctx.font = '11px "Segoe UI",sans-serif';
  ctx.fillText('速度 v', lx + 30, ly + 4);

  drawArrow(lx, ly + 18, lx + 25, ly + 18, '#0E61AC', 2);
  ctx.fillStyle = '#0E61AC';
  ctx.fillText('洛伦兹力 F', lx + 30, ly + 22);

  if (p.B > 0.01 && p.E > 0.01) {
    drawArrow(lx, ly + 36, lx + 25, ly + 36, '#e3b341', 2);
    ctx.fillStyle = '#e3b341';
    ctx.fillText('漂移速度 v_d', lx + 30, ly + 40);
  }

  ctx.strokeStyle = 'rgba(42,124,199,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(lx, ly + 54); ctx.lineTo(lx + 25, ly + 54); ctx.stroke();
  ctx.fillStyle = 'rgba(42,124,199,0.5)';
  ctx.fillText('电场 E 方向', lx + 30, ly + 58);

  animationId = requestAnimationFrame(draw);
}

function syncSlider(sliderId, valId) {
  var slider = document.getElementById(sliderId);
  var val = document.getElementById(valId);
  slider.addEventListener('input', function() { val.value = slider.value; });
  val.addEventListener('change', function() {
    var v = parseFloat(val.value);
    if (!isNaN(v)) {
      v = Math.max(parseFloat(slider.min), Math.min(parseFloat(slider.max), v));
      slider.value = v;
      val.value = v;
    }
  });
}

syncSlider('eField', 'eFieldVal');
syncSlider('bField', 'bFieldVal');
syncSlider('velocity', 'velocityVal');
syncSlider('charge', 'chargeVal');
syncSlider('mass', 'massVal');

document.getElementById('resetBtn').addEventListener('click', function() {
  cancelAnimationFrame(animationId);
  init();
  draw();
});
document.getElementById('pauseBtn').addEventListener('click', function() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
});

resize();
window.addEventListener('resize', resize);
init();
draw();
</script>
</body>
</html>
