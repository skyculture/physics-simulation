<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>毕奥-萨伐尔 - 物理数值仿真平台</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#FAF2E0;color:#1A1A1A;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif}
#app{height:100%;display:flex;flex-direction:column}
main{flex:1;display:flex;overflow:hidden}#canvasWrap{flex:1;position:relative}canvas{display:block;width:100%;height:100%}
#sidebar{width:300px;background:#FFF7EB;border-left:1px solid #D4C9B8;padding:14px;overflow:auto}
.sec{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #D4C9B8}.sec:last-child{border-bottom:none}
h3{margin:0 0 8px 0;font-size:14px;color:#0E61AC}
.row{display:flex;align-items:center;gap:10px;margin:8px 0}.row label{flex:0 0 100px;font-size:13px}
.row input[type=range]{flex:1}.row input[type=number]{width:70px;background:#FAF2E0;border:1px solid #D4C9B8;color:#1A1A1A;padding:6px 8px;border-radius:6px}

@media (max-width:900px) {
  .main { flex-direction:column; }
  .controls { width:100%; }
  .canvas-wrap { min-height:300px; }
}
</style></head>
<body>
<div id="app">

<main><div id="canvasWrap"><canvas id="c"></canvas></div>
<div id="sidebar">
<div class="sec"><h3>参数设置</h3>
<div class="row"><label>电流 I</label><input id="p1" type="range" min="0.1" max="3" step="0.1" value="1.5"><input id="p1n" type="number" value="1.5"></div>
<div class="row"><label>线圈匝数 N</label><input id="p2" type="range" min="1" max="10" value="1"><input id="p2n" type="number" value="1"></div>
<div class="row"><label>线圈半径 R</label><input id="p3" type="range" min="0.5" max="2" step="0.1" value="1"><input id="p3n" type="number" value="1"></div>
</div></div></main></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
function resize(){const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth||400,h=canvas.clientHeight||300;canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
window.addEventListener('resize',resize);let inited=false;
const p1=document.getElementById('p1'),p1n=document.getElementById('p1n'),p2=document.getElementById('p2'),p2n=document.getElementById('p2n'),p3=document.getElementById('p3'),p3n=document.getElementById('p3n');
function link(a,b){a.oninput=()=>{b.value=a.value};b.oninput=()=>{a.value=b.value}}
link(p1,p1n);link(p2,p2n);link(p3,p3n);
let t=0;
function draw(){
if(!inited){resize();inited=true;}
const W=canvas.clientWidth,H=canvas.clientHeight;if(!W||!H){requestAnimationFrame(draw);return}
const I=+p1.value,N=+p2.value,R=+p3.value;t+=0.01;
ctx.clearRect(0,0,W,H);ctx.fillStyle='#FAF2E0';ctx.fillRect(0,0,W,H);
const margin=60,cx=(margin+W-margin)/2,cy=(margin+H-margin)/2,scale=Math.min(W,H)/5;
// coil (ellipse viewed from side)
ctx.strokeStyle='#0E61AC';ctx.lineWidth=2;
ctx.beginPath();ctx.ellipse(cx,cy,scale*R,scale*R*0.3,0,0,Math.PI*2);ctx.stroke();
// B field lines (on axis)
const B0=I*N/(2*R*0.1);
ctx.fillStyle='#5A6370';ctx.font='14px system-ui';
ctx.fillText(`轴心磁场 B₀ ≈ ${B0.toFixed(2)} T (μ₀NI/2R)`,margin,H-margin-20);
// field lines
for(let s=-1;s<=1;s+=0.4){
ctx.strokeStyle='rgba(14,97,172,0.5)';ctx.lineWidth=2;
ctx.beginPath();
const startX=cx+Math.cos(s*2)*scale*R,startY=cy+Math.sin(s*2)*scale*R*0.3;
ctx.moveTo(startX,startY);
for(let i=1;i<=20;i++){
const frac=i/20;
const distX=(1-frac)*startX+frac*cx;
const fieldX=distX+(cx-distX)*0.2*Math.sin(frac*Math.PI);
const fieldY=cy+(startY-cy)*Math.exp(-frac*3);
ctx.lineTo(fieldX,fieldY);
}
ctx.stroke();
}
// current direction arrows on coil
ctx.strokeStyle='#2A7CC7';ctx.lineWidth=2;
for(let a=0;a<Math.PI*2;a+=Math.PI/4){
const xx=cx+Math.cos(a)*scale*R,yy=cy+Math.sin(a)*scale*R*0.3;
const nx=-Math.sin(a),ny=Math.cos(a)*0.3;
ctx.beginPath();ctx.moveTo(xx,yy);ctx.lineTo(xx+nx*8,yy+ny*8);ctx.stroke();
}
requestAnimationFrame(draw);
}requestAnimationFrame(draw);
</script></body></html>
