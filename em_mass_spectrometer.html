<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔬 质谱仪</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; }
  .header { text-align:center; margin-bottom:16px; }
  .header h1 { font-size:1.4em; color:#0E61AC; margin-bottom:4px; }
  .header p { font-size:0.8em; color:#5A6370; }
  .main { display:flex; gap:16px; max-width:1200px; margin:0 auto; }
  .canvas-wrap { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .controls { width:280px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .control-group { display:flex; flex-direction:column; gap:4px; }
  .control-group label { font-size:0.8em; color:#5A6370; }
  .control-group input[type="range"] { width:100%; }
  .control-group button { padding:8px; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer; font-size:0.85em; }
  .info-panel { background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.2); border-radius:6px; padding:10px; font-size:0.75em; }
  .info-panel .item { display:flex; justify-content:space-between; margin:4px 0; }
  canvas { width:100%; border-radius:4px; }
</style>
</head>
<body>

<div class="header">
  <h1>🔬 质谱仪工作原理</h1>
  <p>利用磁场分离不同质荷比的离子</p>
</div>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas" width="600" height="400"></canvas>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>加速电压 V (kV): <span id="voltVal">10</span></label>
      <input type="range" id="voltage" min="1" max="50" step="1" value="10">
    </div>
    <div class="control-group">
      <label>磁场强度 B (T): <span id="bVal">0.5</span></label>
      <input type="range" id="bField" min="0.1" max="2" step="0.1" value="0.5">
    </div>
    <div class="control-group">
      <label>离子质量数 A: <span id="massVal">28</span></label>
      <input type="range" id="mass" min="1" max="100" step="1" value="28">
    </div>
    <div class="control-group">
      <label>离子电荷数 Z: <span id="chargeVal">1</span></label>
      <input type="range" id="charge" min="1" max="4" step="1" value="1">
    </div>
    <div class="control-group">
      <button id="startBtn">▶️ 发射离子</button>
    </div>
    <div class="info-panel">
      <div class="item"><span class="label">离子速度:</span><span class="value" id="speed">0 km/s</span></div>
      <div class="item"><span class="label">轨道半径:</span><span class="value" id="radius">0 cm</span></div>
      <div class="item"><span class="label">落点位置:</span><span class="value" id="position">0 cm</span></div>
      <div class="item"><span class="label">质荷比:</span><span class="value" id="mz">0 u/e</span></div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId;

let V = 10000;
let B = 0.5;
let A = 28;
let Z = 1;
let particles = [];
let trails = [];

function createParticle() {
  const m = A * 1.67e-27;
  const q = Z * 1.6e-19;
  const v = Math.sqrt(2 * q * V / m);
  
  return {
    x: 50,
    y: canvas.height / 2,
    vx: v,
    vy: 0,
    mass: m,
    charge: q,
    color: '#a855f7',
    trail: []
  };
}

function draw() {
  ctx.fillStyle = '#FFF7EB';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 加速区域
  ctx.fillStyle = '#1e3a5f';
  ctx.fillRect(30, 100, 40, 200);
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.strokeRect(30, 100, 40, 200);
  
  // 加速电场方向
  ctx.strokeStyle = '#2A7CC7';
  ctx.lineWidth = 1;
  for (let y = 120; y < 280; y += 20) {
    ctx.beginPath();
    ctx.moveTo(35, y);
    ctx.lineTo(65, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(60, y - 3);
    ctx.lineTo(65, y);
    ctx.lineTo(60, y + 3);
    ctx.stroke();
  }
  
  // 磁场区域
  ctx.fillStyle = '#1f2d1f';
  ctx.fillRect(150, 50, 250, 300);
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2;
  ctx.setLineDash([5,5]);
  ctx.strokeRect(150, 50, 250, 300);
  ctx.setLineDash([]);
  
  // 磁场方向 (垂直纸面向外)
  ctx.fillStyle = '#fbbf24';
  ctx.font = '14px sans-serif';
  for (let x = 180; x < 380; x += 40) {
    for (let y = 80; y < 330; y += 40) {
      ctx.fillText('⊙', x, y);
    }
  }
  
  // 探测器
  const detY = canvas.height - 30;
  ctx.fillStyle = '#4a5568';
  ctx.fillRect(150, detY, 350, 20);
  
  // 探测器刻度
  ctx.strokeStyle = '#5A6370';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 7; i++) {
    const x = 150 + i * 50;
    ctx.beginPath();
    ctx.moveTo(x, detY - 10);
    ctx.lineTo(x, detY);
    ctx.stroke();
    ctx.fillText((i * 50).toString(), x - 8, detY + 25);
  }
  
  // 轨道轨迹
  trails.forEach(trail => {
    ctx.beginPath();
    ctx.moveTo(trail[0].x, trail[0].y);
    trail.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = '#a855f760';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
  
  // 粒子
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();
  });
  
  // 标注
  ctx.fillStyle = '#5A6370';
  ctx.font = '10px sans-serif';
  ctx.fillText('加速区', 35, 85);
  ctx.fillText('磁场分析区', 240, 35);
  ctx.fillText('探测器 (位置/cm)', 300, 395);
  
  // 粒子信息
  if (particles.length > 0) {
    ctx.fillStyle = '#a855f7';
    ctx.fillText(`离子: ${A}${Z > 1 ? '+' + Z : '+'}`, 450, 80);
  }
}

function update() {
  const dt = 0.001;
  
  particles.forEach(p => {
    const forceX = p.charge * p.vy * B;
    const forceY = -p.charge * p.vx * B;
    
    p.vx += (forceX / p.mass) * dt * 1e8;
    p.vy += (forceY / p.mass) * dt * 1e8;
    
    p.x += p.vx * dt * 10;
    p.y += p.vy * dt * 10;
    
    p.trail.push({ x: p.x, y: p.y });
    
    // 检测到达探测器
    if (p.y > canvas.height - 40 && p.y < canvas.height - 20) {
      trails.push(p.trail);
      particles = [];
    }
  });
}

function animate() {
  update();
  draw();
  animationId = requestAnimationFrame(animate);
}

function updateInfo() {
  const m = A * 1.67e-27;
  const q = Z * 1.6e-19;
  const v = Math.sqrt(2 * q * V / m);
  const r = (m * v) / (q * B);
  const mz = A / Z;
  
  document.getElementById('speed').textContent = (v / 1000).toFixed(1) + ' km/s';
  document.getElementById('radius').textContent = (r * 100).toFixed(2) + ' cm';
  document.getElementById('position').textContent = ((r * 200) + 150 - canvas.height/2).toFixed(1) + ' cm';
  document.getElementById('mz').textContent = mz.toFixed(1) + ' u/e';
}

document.getElementById('voltage').addEventListener('input', (e) => {
  V = parseInt(e.target.value) * 1000;
  document.getElementById('voltVal').textContent = e.target.value;
  updateInfo();
});

document.getElementById('bField').addEventListener('input', (e) => {
  B = parseFloat(e.target.value);
  document.getElementById('bVal').textContent = B;
  updateInfo();
});

document.getElementById('mass').addEventListener('input', (e) => {
  A = parseInt(e.target.value);
  document.getElementById('massVal').textContent = A;
  updateInfo();
});

document.getElementById('charge').addEventListener('input', (e) => {
  Z = parseInt(e.target.value);
  document.getElementById('chargeVal').textContent = Z;
  updateInfo();
});

document.getElementById('startBtn').addEventListener('click', () => {
  particles = [createParticle()];
  updateInfo();
});

updateInfo();
draw();
animate();
</script>
</body>
</html>
