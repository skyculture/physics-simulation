<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>电子运动 - 物理数值仿真平台</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#FAF2E0;color:#c9d1d9;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,sans-serif}
#app{height:100%;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#161b22;border-bottom:1px solid #D4C9B8}
#back{background:#FFFFFF;border:1px solid #D4C9B8;color:#c9d1d9;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px}
#back:hover{background:#D4C9B8}
header h1{margin:0;font-size:18px;font-weight:600}
#info{margin-left:auto;color:#5A6370;font-size:13px}
main{flex:1;display:flex;overflow:hidden}
#canvasWrap{flex:1;position:relative}
canvas{display:block;width:100%;height:100%}
#sidebar{width:280px;background:#161b22;border-left:1px solid #D4C9B8;padding:14px;overflow:auto}
.sec{margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #D4C9B8}
.sec:last-child{border-bottom:none}
h3{margin:0 0 8px 0;font-size:14px;color:#0E61AC}
.row{display:flex;align-items:center;gap:10px;margin:8px 0}
.row label{flex:0 0 120px;font-size:13px}
.row input[type=range]{flex:1}
.row input[type=number]{width:70px;background:#FAF2E0;border:1px solid #D4C9B8;color:#c9d1d9;padding:6px 8px;border-radius:6px}
</style>
</head>
<body>
<div id="app">

<main>
<div id="canvasWrap"><canvas id="c"></canvas></div>
<div id="sidebar">
<div class="sec">
<h3>参数设置</h3>
<div class="row"><label>电场 E</label><input id="p1" type="range" min="-1" max="1" step="0.1" value="0"><input id="p1n" type="number" value="0"></div>
<div class="row"><label>磁场 B</label><input id="p2" type="range" min="-2" max="2" step="0.1" value="1"><input id="p2n" type="number" value="1"></div>
<div class="row"><label>初速度 v0</label><input id="p3" type="range" min="0.1" max="2" step="0.1" value="0.8"><input id="p3n" type="number" value="0.8"></div>
</div>
<div class="sec">
<h3>显示</h3>
<div class="row"><label>轨迹长度</label><input id="p4" type="range" min="100" max="2000" value="800"><input id="p4n" type="number" value="800"></div>
</div>
</div>
</main>
</div>
<script>
const canvas=document.getElementById('c');const ctx=canvas.getContext('2d');
function resize(){const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth,h=canvas.clientHeight;if(w&&h){canvas.width=w*dpr;canvas.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}}
window.addEventListener('resize',resize);
let inited=false;
const p1=document.getElementById('p1'),p1n=document.getElementById('p1n');
const p2=document.getElementById('p2'),p2n=document.getElementById('p2n');
const p3=document.getElementById('p3'),p3n=document.getElementById('p3n');
const p4=document.getElementById('p4'),p4n=document.getElementById('p4n');
function link(a,b){a.oninput=()=>{b.value=a.value;reset()};b.oninput=()=>{a.value=b.value;reset()}}
link(p1,p1n);link(p2,p2n);link(p3,p3n);link(p4,p4n);
let trail=[];let p={x:0,y:0,vx:+p3.value,vy:0};
function reset(){trail=[];p={x:0,y:0,vx:+p3.value,vy:0}}
reset();
function draw(){
if(!inited){resize();inited=true;}
const W=canvas.clientWidth,H=canvas.clientHeight;
ctx.clearRect(0,0,W,H);
const E=+p1.value,B=+p2.value;
const margin=60,top=margin,bottom=H-margin,left=margin,right=W-margin;
const cx=(left+right)/2,cy=(top+bottom)/2;
ctx.fillStyle='#FAF2E0';ctx.fillRect(0,0,W,H);
// grid
ctx.strokeStyle='#FFFFFF';ctx.lineWidth=1;
for(let i=-5;i<=5;i++){ctx.beginPath();ctx.moveTo(cx+(right-left)/10*i,top);ctx.lineTo(cx+(right-left)/10*i,bottom);ctx.moveTo(left,cy+(bottom-top)/10*i);ctx.lineTo(right,cy+(bottom-top)/10*i);ctx.stroke();}
// solve motion
const dt=0.01;
for(let step=0;step<10;step++){
const ax=E + p.vy*B;
const ay=-p.vx*B;
p.vx+=ax*dt;
p.vy+=ay*dt;
p.x+=p.vx*dt;
p.y+=p.vy*dt;
}
trail.push({x:p.x,y:p.y});
if(trail.length>+p4.value)trail.shift();
// draw trail
ctx.beginPath();ctx.strokeStyle='#0E61AC';ctx.lineWidth=2;
for(let i=0;i<trail.length;i++){const x=cx+trail[i].x*(right-left)/12;const y=cy+trail[i].y*(bottom-top)/12;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
ctx.stroke();
// draw electron
ctx.fillStyle='#0E61AC';const x=cx+p.x*(right-left)/12,y=cy+p.y*(bottom-top)/12;ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();
// velocity arrow
ctx.strokeStyle='#2A7CC7';ctx.lineWidth=2;const vscale=30;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+p.vx*vscale,y+p.vy*vscale);ctx.stroke();
}
function loop(){draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
