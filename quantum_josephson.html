<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超导约瑟夫森结 - 量子与核物理</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; --accent2:#0E61AC; --accent3:#2A7CC7; --accent4:#0E61AC; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:16px; gap:12px; }
  .header { width:100%; max-width:1100px; display:flex; justify-content:space-between; align-items:center; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px 24px; }
  .header-left h1 { font-size:1.4rem; font-weight:700; color:var(--accent4); line-height:1.2; }
  .header-left .subtitle { font-size:0.82rem; color:#5A6370; margin-top:2px; }
  .back-link { color:var(--accent); text-decoration:none; font-size:0.95rem; padding:6px 14px; border:1px solid var(--border); border-radius:6px; transition:background 0.2s; }
  .back-link:hover { background:#FFF7EB; }
  .main-container { width:100%; max-width:1100px; display:flex; gap:12px; flex:1; }
  .canvas-panel { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px; display:flex; align-items:center; justify-content:center; flex:1; }
  canvas { display:block; border-radius:4px; background:#FAF2E0; }
  .side-panel { width:300px; min-width:300px; display:flex; flex-direction:column; gap:10px; }
  .panel-box { background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
  .panel-box h3 { font-size:0.9rem; color:var(--accent4); margin-bottom:10px; font-weight:600; }
  .control-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; gap:8px; }
  .control-row label { font-size:0.82rem; color:var(--text); white-space:nowrap; }
  .control-row input[type="range"] { flex:1; accent-color:var(--accent4); }
  .control-row .val { font-size:0.78rem; color:var(--accent4); min-width:36px; text-align:right; font-weight:600; }
  .btn-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .btn { padding:7px 12px; border:1px solid var(--border); border-radius:6px; background:#FFFFFF; color:var(--text); cursor:pointer; font-size:0.82rem; font-family:inherit; transition:background 0.15s; flex:1; text-align:center; }
  .btn:hover { background:#D4C9B8; }
  .btn.primary { border-color:var(--accent4); color:var(--accent4); }
  .stat-item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:0.82rem; }
  .stat-item:last-child { border-bottom:none; }
  .stat-label { color:#5A6370; }
  .stat-value { color:var(--accent4); font-weight:600; }
  @media (max-width:900px) { .main-container { flex-direction:column; } .side-panel { width:100%; min-width:unset; } }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>⚡ 超导约瑟夫森结</h1>
    <div class="subtitle">核物理 — 库珀对隧穿、交直流约瑟夫森效应与SQUID</div>
  </div>

</div>
<div class="main-container">
  <div class="canvas-panel">
    <canvas id="simCanvas"></canvas>
  </div>
  <div class="side-panel">
    <div class="panel-box">
      <h3>⚙️ 结参数</h3>
      <div class="control-row">
        <label>临界电流 I_c</label>
        <input type="range" id="icSlider" min="0.5" max="10" step="0.5" value="3">
        <span class="val" id="icVal">3.0</span>
      </div>
      <div class="control-row">
        <label>偏置电流 I_b</label>
        <input type="range" id="ibSlider" min="0" max="12" step="0.1" value="2">
        <span class="val" id="ibVal">2.0</span>
      </div>
      <div class="control-row">
        <label>电压偏置 V (mV)</label>
        <input type="range" id="vSlider" min="0" max="10" step="0.1" value="2">
        <span class="val" id="vVal">2.0</span>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="btnModeDC">⚡ DC模式</button>
        <button class="btn" id="btnModeAC">〰️ AC模式</button>
      </div>
      <div class="btn-row">
        <button class="btn" id="btnReset">↺ 重置</button>
      </div>
    </div>
    <div class="panel-box">
      <h3>📊 实时数据</h3>
      <div class="stat-item"><span class="stat-label">超流电流 I_s</span><span class="stat-value" id="statIs">0.00 μA</span></div>
      <div class="stat-item"><span class="stat-label">相位差 Δφ</span><span class="stat-value" id="statPhase">0.00 rad</span></div>
      <div class="stat-item"><span class="stat-label">结电压 V_j</span><span class="stat-value" id="statVj">0.00 mV</span></div>
      <div class="stat-item"><span class="stat-label">约瑟夫森频率</span><span class="stat-value" id="statFreq">0.00 GHz</span></div>
      <div class="stat-item"><span class="stat-label">工作模式</span><span class="stat-value" id="statMode">DC</span></div>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('simCanvas');
  const ctx=canvas.getContext('2d');
  let W=680,H=500;
  function resize(){const dpr=window.devicePixelRatio||1;canvas.style.width=W+'px';canvas.style.height=H+'px';canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}

  let Ic=3,Ib=2,Vbias=2;
  let phase=0,mode='dc';
  let ivCurve=[];
  let isRunning=true,animId=null;

  function draw(){
    ctx.fillStyle='#FAF2E0';ctx.fillRect(0,0,W,H);

    const cx=W/2,cy=H*0.25;
    ctx.fillStyle='#0E61AC';ctx.fillRect(cx-100,cy-12,90,24);
    ctx.fillRect(cx+10,cy-12,90,24);
    ctx.fillStyle='rgba(42,124,199,0.6)';ctx.fillRect(cx-10,cy-8,20,16);
    ctx.strokeStyle='#D4C9B8';ctx.lineWidth=2;
    ctx.strokeRect(cx-100,cy-12,90,24);ctx.strokeRect(cx+10,cy-12,90,24);
    ctx.strokeRect(cx-10,cy-8,20,16);

    ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText('超导体1',cx-55,cy+3);ctx.fillText('超导体2',cx+55,cy+3);
    ctx.fillText('绝缘层',cx,cy+3);

    ctx.strokeStyle='#0E61AC';ctx.lineWidth=1.5;ctx.setLineDash([2,2]);
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const y=cy-6+i*3;
      ctx.moveTo(cx-8,y);ctx.quadraticCurveTo(cx,y-3,cx+8,y);
    }
    ctx.stroke();ctx.setLineDash([]);

    const waveAmp=mode==='dc'?Math.sin(phase)*Ic*8:Math.sin(phase)*Ic*6;
    if(mode==='ac'){
      ctx.strokeStyle='#0E61AC';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx-60,cy+40);
      for(let i=0;i<=100;i++){
        const t=i/100*Math.PI*4;
        const y=cy+40+Math.sin(t-phase)*15;
        ctx.lineTo(cx-60+i*1.2,y);
      }
      ctx.stroke();
      ctx.fillStyle='#0E61AC';ctx.font='9px sans-serif';ctx.textAlign='center';
      ctx.fillText('AC 约瑟夫森振荡',cx,cy+68);
    }

    ctx.strokeStyle='#5A6370';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-105,cy-12);ctx.lineTo(cx-140,cy-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+105,cy-12);ctx.lineTo(cx+140,cy-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-105,cy+12);ctx.lineTo(cx-140,cy+12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+105,cy+12);ctx.lineTo(cx+140,cy+12);ctx.stroke();

    ctx.fillStyle='#5A6370';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText('I = I_c sin(Δφ)',cx,cy-24);
    ctx.fillText('S-I-S 结',cx,cy+22);

    const ivX=W*0.15,ivY=H*0.55,ivW=W*0.7,ivH=H*0.35;
    ctx.strokeStyle='#D4C9B8';ctx.lineWidth=1;
    ctx.strokeRect(ivX,ivY,ivW,ivH);
    ctx.beginPath();ctx.moveTo(ivX,ivY+ivH/2);ctx.lineTo(ivX+ivW,ivY+ivH/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ivX+ivW*0.4,ivY);ctx.lineTo(ivX+ivW*0.4,ivY+ivH);ctx.stroke();
    ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(ivX+ivW*0.4,ivY+ivH/2-Ic*ivH*0.08);ctx.lineTo(ivX+ivW*0.4,ivY+ivH/2+Ic*ivH*0.08);ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle='#5A6370';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText('V',ivX+ivW/2,ivY+ivH+14);
    ctx.fillText('I',ivX-10,ivY+ivH/2+4);
    ctx.fillText('I_c',ivX+ivW*0.4-10,ivY+ivH/2+14);
    ctx.fillText('I-V 特性曲线',ivX+ivW/2,ivY-6);

    if(ivCurve.length>1){
      ctx.strokeStyle='#0E61AC';ctx.lineWidth=2;ctx.beginPath();
      ctx.moveTo(ivX,ivY+ivH/2);
      for(let i=1;i<ivCurve.length;i++){
        const px=ivX+ivW*0.4*(1+ivCurve[i].v/5);
        const py=ivY+ivH/2-ivCurve[i].i*ivH*0.15;
        ctx.lineTo(px,py);
      }
      ctx.stroke();
    }

    const bp=Ib/Ic*Ic*8;
    const is=Math.abs(Math.sin(phase))*Ic;
    document.getElementById('statIs').textContent=is.toFixed(2)+' μA';
    document.getElementById('statPhase').textContent=phase.toFixed(3)+' rad';
    document.getElementById('statVj').textContent=(mode==='ac'?Vbias.toFixed(1):'0.00')+' mV';
    document.getElementById('statFreq').textContent=(Vbias*483.6).toFixed(1)+' GHz';
    document.getElementById('statMode').textContent=mode==='dc'?'DC 约瑟夫森':'AC 约瑟夫森';
  }

  function update(){
    if(!isRunning)return;
    const dt=0.02;
    if(mode==='dc'){
      phase+=Ib/Ic*0.05;
      ivCurve.push({v:0,i:Ib});
    }else{
      phase+=Vbias*0.8;
      ivCurve.push({v:Vbias,i:Ic});
    }
    if(phase>Math.PI*100)phase-=Math.PI*100;
    if(ivCurve.length>200)ivCurve.shift();
  }

  function animate(){if(!isRunning)return;update();draw();animId=requestAnimationFrame(animate);}

  document.getElementById('icSlider').addEventListener('input',e=>{Ic=parseFloat(e.target.value);document.getElementById('icVal').textContent=Ic.toFixed(1);});
  document.getElementById('ibSlider').addEventListener('input',e=>{Ib=parseFloat(e.target.value);document.getElementById('ibVal').textContent=Ib.toFixed(1);});
  document.getElementById('vSlider').addEventListener('input',e=>{Vbias=parseFloat(e.target.value);document.getElementById('vVal').textContent=Vbias.toFixed(1);});

  document.getElementById('btnModeDC').addEventListener('click',()=>{mode='dc';ivCurve=[];document.getElementById('btnModeDC').classList.add('primary');document.getElementById('btnModeAC').classList.remove('primary');});
  document.getElementById('btnModeAC').addEventListener('click',()=>{mode='ac';ivCurve=[];document.getElementById('btnModeAC').classList.add('primary');document.getElementById('btnModeDC').classList.remove('primary');});

  document.getElementById('btnReset').addEventListener('click',()=>{phase=0;ivCurve=[];});

  function init(){resize();draw();}
  window.addEventListener('resize',()=>{resize();draw();});
  init();
  animate();
})();
</script>
</body>
</html>
