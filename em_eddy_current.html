<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 涡流阻尼管</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; }
  .header { width:100%; max-width:1200px; margin:0 auto 16px; background:#FFF7EB; border:1px solid #D4C9B8; border-radius:8px; padding:14px 24px 12px; text-align:center; }
  .header h1 { font-size:1.4em; color:#0E61AC; margin-bottom:4px; }
  .header p { font-size:0.8em; color:#5A6370; }
  .main { display:flex; gap:16px; max-width:1200px; margin:0 auto; }
  .canvas-wrap { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .controls { width:280px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .control-group { display:flex; flex-direction:column; gap:4px; }
  .control-group label { font-size:0.8em; color:#5A6370; }
  .control-group input[type="range"] { width:100%; }
  .control-group button { padding:7px 12px; border:1px solid #D4C9B8; border-radius:6px; background:#FFFFFF; color:#1A1A1A; cursor:pointer; font-size:0.82rem; font-family:inherit; transition:background 0.15s,border-color 0.15s; } .control-group button:hover { background:#FFF7EB; border-color:#0E61AC; } .control-group button.primary { background:#0E61AC; color:#fff; border-color:#0E61AC; }
  .info-panel { background:#FFF7EB; border:1px solid #D4C9B8; border-radius:8px; padding:14px 16px; }
  .info-panel .item { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #D4C9B8; font-size:0.82rem; } .info-panel .item:last-child { border-bottom:none; } .info-panel .label { color:#5A6370; } .info-panel .value { color:#0E61AC; font-weight:600; font-variant-numeric:tabular-nums; }
  canvas { width:100%; border-radius:4px; }

@media (max-width:900px) {
  .main { flex-direction:column; }
  .controls { width:100%; }
  .canvas-wrap { min-height:300px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🌀 涡流阻尼管</h1>
  <p>金属圆盘在磁场中下落时产生涡流，受到阻尼力</p>
</div>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas" ></canvas>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>磁场强度 B (T): <span id="bVal">1</span></label>
      <input type="range" id="bField" min="0.1" max="3" step="0.1" value="1">
    </div>
    <div class="control-group">
      <label>圆盘电阻率 ρ (μΩ·m): <span id="rhoVal">1.7</span></label>
      <input type="range" id="resistivity" min="0.5" max="10" step="0.1" value="1.7">
    </div>
    <div class="control-group">
      <label>圆盘厚度 d (mm): <span id="thicknessVal">2</span></label>
      <input type="range" id="thickness" min="0.5" max="5" step="0.5" value="2">
    </div>
    <div class="control-group">
      <button id="dropBtn">⬇️ 释放圆盘</button>
      <button id="resetBtn">🔄 重置</button>
    </div>
    <div class="info-panel">
      <div class="item"><span class="label">下落速度:</span><span class="value" id="speed">0 m/s</span></div>
      <div class="item"><span class="label">加速度:</span><span class="value" id="accel">0 m/s²</span></div>
      <div class="item"><span class="label">阻尼力:</span><span class="value" id="force">0 N</span></div>
      <div class="item"><span class="label">稳态速度:</span><span class="value" id="terminal">0 m/s</span></div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let running = true, animId = null;

const dpr = window.devicePixelRatio || 1;
function resizeCanvas() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w && h) { canvas.width = w * dpr; canvas.height = h * dpr; ctx.setTransform(dpr, 0, 0, dpr, 0, 0); }
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let animationId;

let B = 1;
let rho = 1.7e-8;
let d = 0.002;
let discY = 50;
let discVy = 0;
let isDropped = false;
let eddyCurrents = [];

const discRadius = 30;
const tubeWidth = 80;
const tubeHeight = 350;
const tubeX = canvas.width / 2 - tubeWidth / 2;
const magnetStart = 120;
const magnetHeight = 100;

function draw() {
  ctx.fillStyle = '#FFF7EB';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 玻璃管
  ctx.strokeStyle = '#6e7681';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(tubeX, 20);
  ctx.lineTo(tubeX, 20 + tubeHeight);
  ctx.moveTo(tubeX + tubeWidth, 20);
  ctx.lineTo(tubeX + tubeWidth, 20 + tubeHeight);
  ctx.stroke();
  
  // 磁铁区域
  ctx.fillStyle = '#2d1b4e';
  ctx.fillRect(tubeX + 5, magnetStart, tubeWidth - 10, magnetHeight);
  
  // 磁场方向
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 1;
  for (let x = tubeX + 15; x < tubeX + tubeWidth - 15; x += 15) {
    for (let y = magnetStart + 15; y < magnetStart + magnetHeight - 15; y += 15) {
      ctx.beginPath();
      ctx.moveTo(x - 5, y);
      ctx.lineTo(x + 5, y);
      ctx.moveTo(x, y - 5);
      ctx.lineTo(x, y + 5);
      ctx.stroke();
    }
  }
  
  // 涡流示意
  eddyCurrents.forEach((ec, i) => {
    const alpha = Math.max(0.1, 1 - i / eddyCurrents.length);
    ctx.strokeStyle = `rgba(42,124,199,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ec.x, ec.y, ec.r, 0, Math.PI * 2);
    ctx.stroke();
    
    // 电流方向
    ctx.fillStyle = `rgba(42,124,199,${alpha})`;
    ctx.font = '8px sans-serif';
    ctx.fillText(discVy > 0 ? '↻' : '↺', ec.x, ec.y + 3);
  });
  
  // 金属圆盘
  const discX = canvas.width / 2;
  const gradient = ctx.createRadialGradient(discX, discY, 0, discX, discY, discRadius);
  gradient.addColorStop(0, '#718096');
  gradient.addColorStop(1, '#4a5568');
  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(discX, discY, discRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#a0aec0';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // 速度箭头
  if (discVy !== 0) {
    const arrowLen = Math.min(Math.abs(discVy) * 10, 30);
    ctx.strokeStyle = discVy > 0 ? '#0E61AC' : '#2A7CC7';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(discX, discY + discRadius);
    ctx.lineTo(discX, discY + discRadius + arrowLen);
    ctx.stroke();
    
    const dir = discVy > 0 ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(discX - 5, discY + discRadius + arrowLen);
    ctx.lineTo(discX, discY + discRadius + arrowLen + dir * 8);
    ctx.lineTo(discX + 5, discY + discRadius + arrowLen);
    ctx.stroke();
  }
  
  // 标注
  ctx.fillStyle = '#5A6370';
  ctx.font = '10px sans-serif';
  ctx.fillText('玻璃管', tubeX - 50, 100);
  ctx.fillText('NdFeB 磁铁', tubeX - 60, 170);
  ctx.fillText('金属圆盘', tubeX + tubeWidth + 10, discY);
}

function update() {
  if (!isDropped) return;
  
  const g = 9.8;
  const m = 0.1;
  const r = discRadius / 100;
  
  const dampingCoeff = (Math.PI * B * B * r * r * r * r) / (2 * rho * d);
  const dampingForce = dampingCoeff * discVy;
  
  const netForce = m * g - dampingForce;
  const a = netForce / m;
  
  discVy += a * 0.05;
  discVy = Math.max(0, discVy);
  discY += discVy * 5;
  
  eddyCurrents.push({ x: canvas.width / 2, y: discY, r: discRadius - 5 });
  if (eddyCurrents.length > 5) eddyCurrents.shift();
  
  if (discY > canvas.height - 80) {
    discY = canvas.height - 80;
    discVy = 0;
    isDropped = false;
  }
  
  document.getElementById('speed').textContent = discVy.toFixed(2) + ' m/s';
  document.getElementById('accel').textContent = a.toFixed(2) + ' m/s²';
  document.getElementById('force').textContent = dampingForce.toFixed(4) + ' N';
  document.getElementById('terminal').textContent = ((m * g) / dampingCoeff).toFixed(2) + ' m/s';
}

function animate() {
  update();
  draw();
  animationId = requestAnimationFrame(animate);
}

document.getElementById('bField').addEventListener('input', (e) => {
  B = parseFloat(e.target.value);
  document.getElementById('bVal').textContent = B;
});

document.getElementById('resistivity').addEventListener('input', (e) => {
  rho = parseFloat(e.target.value) * 1e-8;
  document.getElementById('rhoVal').textContent = e.target.value;
});

document.getElementById('thickness').addEventListener('input', (e) => {
  d = parseFloat(e.target.value) / 1000;
  document.getElementById('thicknessVal').textContent = e.target.value;
});

document.getElementById('dropBtn').addEventListener('click', () => {
  if (!isDropped) {
    isDropped = true;
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  discY = 50;
  discVy = 0;
  isDropped = false;
  eddyCurrents = [];
  document.getElementById('speed').textContent = '0 m/s';
  document.getElementById('accel').textContent = '0 m/s²';
  document.getElementById('force').textContent = '0 N';
});

draw();
animate();

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); running = !running; if (running) animate(); }
  if (e.code === 'KeyR') { e.preventDefault(); /* reset logic in reset() if available */ if (typeof reset === 'function') reset(); }
});

</script>
</body>
</html>
