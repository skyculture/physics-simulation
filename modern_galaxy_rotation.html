<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星系旋转曲线 - 物理数值仿真平台</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#c9d1d9; --accent:#d2a8ff; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; padding:10px; gap:10px; }
  #canvas { flex:1; background:#0d1117; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.8em; }
  .ctrl-group label { color:#8b949e; }
  .ctrl-group input[type="range"] { width:140px; accent-color:var(--accent); }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.78em; color:#8b949e; line-height:1.5; }
</style>
</head>
<body>
<div id="container">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <div class="ctrl-group"><label>可见物质质量:</label><input type="range" id="visibleMass" min="1" max="10" step="1" value="2"><span id="visibleMassVal">2</span> ×10¹¹ M☉</div>
    <div class="ctrl-group"><label>暗物质比例:</label><input type="range" id="darkMatterRatio" min="0" max="90" step="5" value="85"><span id="darkMatterRatioVal">85</span>%</div>
    <div class="ctrl-group"><button id="resetBtn">重置</button></div>
  </div>
  <div id="info">星系旋转曲线：观测发现星系外围恒星的旋转速度远高于仅由可见物质预测的速度，这是暗物质存在的重要证据。旋转曲线的平坦性表明存在大量不可见的暗物质晕。</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId = null;
let t = 0;
let bgStars = [];
let galaxyStars = [];
let orbitingStars = [];

function initStars() {
  bgStars = [];
  for (let i = 0; i < 100; i++) {
    bgStars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 0.002 + 0.001, a: Math.random() * 0.4 + 0.1 });
  }
  galaxyStars = [];
  for (let i = 0; i < 120; i++) {
    const r = 0.05 + Math.random() * 0.18;
    const th = Math.random() * Math.PI * 2;
    galaxyStars.push({ r, th, brightness: Math.random() * 0.6 + 0.3 });
  }
  orbitingStars = [];
  for (let i = 0; i < 10; i++) {
    const r = 0.12 + Math.random() * 0.28;
    const th = Math.random() * Math.PI * 2;
    orbitingStars.push({ r, th0: th });
  }
}

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w && h) { canvas.width = w; canvas.height = h; }
}

function draw() {
  const w = canvas.width, h = canvas.height;
  if (!w || !h) return;
  const S = Math.min(w, h);
  const cx = w / 2, cy = h / 2;
  const visMass = parseFloat(document.getElementById('visibleMass').value);
  const darkRatio = parseFloat(document.getElementById('darkMatterRatio').value) / 100;
  const darkMass = visMass * darkRatio / (1 - darkRatio);

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, w, h);

  for (const star of bgStars) {
    ctx.fillStyle = `rgba(210,168,255,${star.a})`;
    ctx.beginPath();
    ctx.arc(star.x * w, star.y * h, star.r * S, 0, Math.PI * 2);
    ctx.fill();
  }

  const galaxyR = S * 0.2;
  ctx.fillStyle = '#f78166';
  ctx.beginPath();
  ctx.arc(cx, cy, S * 0.03, 0, Math.PI * 2);
  ctx.fill();

  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, galaxyR * 0.5);
  glow.addColorStop(0, 'rgba(255,166,87,0.3)');
  glow.addColorStop(1, 'rgba(255,166,87,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(cx, cy, galaxyR * 0.5, 0, Math.PI * 2);
  ctx.fill();

  for (const gs of galaxyStars) {
    const x = cx + gs.r * galaxyR * Math.cos(gs.th + t * 0.1 / gs.r);
    const y = cy + gs.r * galaxyR * Math.sin(gs.th + t * 0.1 / gs.r);
    ctx.fillStyle = `rgba(255,200,100,${gs.brightness})`;
    ctx.beginPath();
    ctx.arc(x, y, S * 0.003, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const os of orbitingStars) {
    const vel = Math.sqrt((visMass + darkMass) / (os.r * 10 + 0.5));
    const th = os.th0 + t * vel * 0.05;
    const x = cx + os.r * galaxyR * 1.5 * Math.cos(th);
    const y = cy + os.r * galaxyR * 1.5 * Math.sin(th);

    ctx.fillStyle = '#58a6ff';
    ctx.beginPath();
    ctx.arc(x, y, S * 0.008, 0, Math.PI * 2);
    ctx.fill();

    const perpTh = th + Math.PI / 2;
    ctx.strokeStyle = 'rgba(88,166,255,0.5)';
    ctx.lineWidth = S * 0.003;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + vel * Math.cos(perpTh) * S * 0.02, y + vel * Math.sin(perpTh) * S * 0.02);
    ctx.stroke();
  }

  const graphSize = S * 0.35;
  const graphX = w - graphSize - S * 0.03;
  const graphY = S * 0.05;

  ctx.fillStyle = 'rgba(22,27,34,0.85)';
  ctx.fillRect(graphX, graphY, graphSize, graphSize * 0.7);
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  ctx.strokeRect(graphX, graphY, graphSize, graphSize * 0.7);

  const gW = graphSize * 0.85;
  const gH = graphSize * 0.55;
  const gX = graphX + graphSize * 0.1;
  const gY = graphY + graphSize * 0.1;

  ctx.strokeStyle = 'rgba(139,148,158,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  for (let i = 1; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(gX, gY + i * gH / 4);
    ctx.lineTo(gX + gW, gY + i * gH / 4);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  const maxVel = 10;
  ctx.strokeStyle = '#f78166';
  ctx.lineWidth = S * 0.004;
  ctx.beginPath();
  for (let i = 0; i <= 40; i++) {
    const r = i / 40;
    const vel = Math.sqrt(visMass / (r * 5 + 0.5));
    const x = gX + r * gW;
    const y = gY + gH * (1 - vel / maxVel);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.strokeStyle = '#3fb950';
  ctx.lineWidth = S * 0.004;
  ctx.beginPath();
  for (let i = 0; i <= 40; i++) {
    const r = i / 40;
    const vel = Math.sqrt((visMass + darkMass) / (r * 5 + 0.5));
    const x = gX + r * gW;
    const y = gY + gH * (1 - vel / maxVel);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  const labelFs = S * 0.02;
  ctx.font = `${labelFs}px sans-serif`;
  ctx.fillStyle = '#f78166';
  ctx.textAlign = 'left';
  ctx.fillText('仅可见物质', gX, gY + gH + labelFs * 1.5);
  ctx.fillStyle = '#3fb950';
  ctx.fillText('含暗物质(观测)', gX, gY + gH + labelFs * 2.8);
  ctx.fillStyle = '#8b949e';
  ctx.fillText('v (km/s)', gX - S * 0.01, gY - labelFs * 0.5);
  ctx.fillText('r (kpc)', gX + gW - S * 0.03, gY + gH + labelFs * 4.2);

  const fs = S * 0.028;
  ctx.font = `${fs}px sans-serif`;
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'left';
  const infoX = S * 0.03, infoY = h - S * 0.12;
  ctx.fillText(`可见物质: ${visMass} ×10¹¹ M☉`, infoX, infoY);
  ctx.fillText(`暗物质: ${darkMass.toFixed(1)} ×10¹¹ M☉`, infoX, infoY + fs * 1.3);
  ctx.fillStyle = '#d2a8ff';
  ctx.fillText(`暗物质占比: ${(darkRatio * 100).toFixed(0)}%`, infoX, infoY + fs * 2.6);

  t += 0.02;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('visibleMass').addEventListener('input', e => {
  document.getElementById('visibleMassVal').textContent = e.target.value;
});
document.getElementById('darkMatterRatio').addEventListener('input', e => {
  document.getElementById('darkMatterRatioVal').textContent = e.target.value;
});
document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('visibleMass').value = 2;
  document.getElementById('visibleMassVal').textContent = '2';
  document.getElementById('darkMatterRatio').value = 85;
  document.getElementById('darkMatterRatioVal').textContent = '85';
});

resize();
window.addEventListener('resize', resize);
initStars();
draw();
</script>
</body>
</html>
