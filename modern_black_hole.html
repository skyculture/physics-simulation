<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑洞 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#161b22; --border:#D4C9B8; --text:#c9d1d9; --accent:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.8em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:140px; accent-color:var(--accent); }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.78em; color:#5A6370; line-height:1.5; }
</style>
</head>
<body>
<div id="container">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <div class="ctrl-group"><label>黑洞质量:</label><input type="range" id="mass" min="1" max="10" step="1" value="5"><span id="massVal">5</span> M☉</div>
    <div class="ctrl-group"><label>吸积率:</label><input type="range" id="accretion" min="10" max="100" step="10" value="50"><span id="accretionVal">50</span>%</div>
    <div class="ctrl-group"><button id="resetBtn">重置</button></div>
  </div>
  <div id="info">黑洞：时空曲率无限大的天体，事件视界内的任何物质包括光都无法逃逸。黑洞的质量、电荷和角动量决定其性质。吸积盘是围绕黑洞旋转的物质盘，因摩擦而发光。</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId = null;
let t = 0;
let particles = [];

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w && h) { canvas.width = w; canvas.height = h; }
}

function draw() {
  const w = canvas.width, h = canvas.height;
  if (!w || !h) return;
  const S = Math.min(w, h);
  const cx = w / 2, cy = h / 2;
  const mass = parseFloat(document.getElementById('mass').value);
  const accretion = parseFloat(document.getElementById('accretion').value) / 100;

  const eventHorizon = Math.min(S * 0.02 * mass, S * 0.15);
  const diskInner = eventHorizon * 2;
  const diskOuter = Math.min(diskInner + S * 0.05 * mass, S * 0.45);

  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = '#2A7CC7';
  for (let i = 0; i < 50; i++) {
    ctx.beginPath();
    ctx.arc(Math.random() * w, Math.random() * h, S * 0.002, 0, Math.PI * 2);
    ctx.fill();
  }

  for (let r = diskInner; r < diskOuter; r += S * 0.012) {
    const alpha = 1 - (r - diskInner) / Math.max(1, diskOuter - diskInner);
    const colorIntensity = 0.3 + alpha * 0.7;
    ctx.strokeStyle = `rgba(255,${Math.round(166 * colorIntensity)},${Math.round(81 * colorIntensity)},${alpha * 0.35})`;
    ctx.lineWidth = S * 0.003;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.2, 0, Math.PI, Math.PI * 2);
    ctx.stroke();
  }

  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(cx, cy, eventHorizon, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = S * 0.003;
  ctx.beginPath();
  ctx.arc(cx, cy, eventHorizon, 0, Math.PI * 2);
  ctx.stroke();

  const ergosphere = eventHorizon * 1.5;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = S * 0.002;
  ctx.setLineDash([S * 0.008, S * 0.008]);
  ctx.beginPath();
  ctx.arc(cx, cy, ergosphere, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  for (let r = diskInner; r < diskOuter; r += S * 0.012) {
    const alpha = 1 - (r - diskInner) / Math.max(1, diskOuter - diskInner);
    const colorIntensity = 0.3 + alpha * 0.7;
    ctx.strokeStyle = `rgba(255,${Math.round(166 * colorIntensity)},${Math.round(81 * colorIntensity)},${alpha * 0.55})`;
    ctx.lineWidth = S * 0.003;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.2, 0, 0, Math.PI);
    ctx.stroke();
  }

  for (let i = 0; i < 10; i++) {
    const rRange = Math.max(1, diskOuter - diskInner);
    const r = diskInner + Math.random() * rRange;
    const th = t * 2 + i * Math.PI * 0.2;
    const x = cx + r * Math.cos(th);
    const y = cy + r * Math.sin(th) * 0.2;

    ctx.fillStyle = `rgba(255,${Math.round(100 + Math.random() * 100)},50,0.8)`;
    ctx.beginPath();
    ctx.arc(x, y, S * 0.004, 0, Math.PI * 2);
    ctx.fill();
  }

  const accretionRate = accretion * 0.03;
  if (Math.random() < accretionRate) {
    const r = diskOuter * (0.8 + Math.random() * 0.4);
    const th = Math.random() * Math.PI * 2;
    particles.push({
      x: cx + r * Math.cos(th),
      y: cy + r * Math.sin(th) * 0.2,
      vx: -r * Math.cos(th) * 0.01,
      vy: -r * Math.sin(th) * 0.01 * 0.2,
      life: 1
    });
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const dist = Math.sqrt((p.x - cx) * (p.x - cx) + (p.y - cy) * (p.y - cy));

    if (dist < eventHorizon) {
      particles.splice(i, 1);
      continue;
    }

    const force = mass / (dist * dist);
    p.vx += (cx - p.x) * force * 0.01;
    p.vy += (cy - p.y) * force * 0.01 * 0.2;
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.005;

    ctx.fillStyle = `rgba(255,${Math.round(150 * p.life)},${Math.round(50 * p.life)},${p.life})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, S * 0.004, 0, Math.PI * 2);
    ctx.fill();

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }

  const fs = S * 0.028;
  ctx.font = `${fs}px sans-serif`;
  ctx.fillStyle = '#5A6370';
  ctx.textAlign = 'left';
  ctx.fillText(`黑洞质量: ${mass} M\u2609`, w * 0.02, fs + S * 0.01);
  ctx.fillText(`事件视界半径: ${(eventHorizon * 3).toFixed(1)} km`, w * 0.02, fs * 2 + S * 0.01);
  ctx.fillText(`吸积率: ${(accretion * 100).toFixed(0)}%`, w * 0.02, fs * 3 + S * 0.01);

  ctx.fillStyle = '#2A7CC7';
  ctx.fillText(`史瓦西半径公式: Rs = 2GM/c\u00B2`, w * 0.02, fs * 4 + S * 0.01);

  const escapeVel = Math.sqrt(2 * mass / (eventHorizon / S));
  ctx.fillStyle = '#0E61AC';
  ctx.fillText(`逃逸速度: ${escapeVel.toFixed(1)} c`, w * 0.02, fs * 5 + S * 0.01);

  t += 0.02;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('mass').addEventListener('input', e => {
  document.getElementById('massVal').textContent = e.target.value;
});
document.getElementById('accretion').addEventListener('input', e => {
  document.getElementById('accretionVal').textContent = e.target.value;
});
document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('mass').value = 5;
  document.getElementById('massVal').textContent = '5';
  document.getElementById('accretion').value = 50;
  document.getElementById('accretionVal').textContent = '50';
});

resize();
window.addEventListener('resize', resize);
draw();
</script>
</body>
</html>
