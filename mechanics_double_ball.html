<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刚性轻杆双球滑杆系统 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; --ac2:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; }
  #content { flex:1; display:flex; flex-direction:column; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.76em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:120px; accent-color:var(--accent); }
  .ctrl-group input[type="number"] { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 6px; color:var(--text); font-size:0.9em; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.74em; color:#5A6370; line-height:1.5; }
</style>
</head>
<body>
<div class="back-bar" style="display:flex;align-items:center;padding:8px 16px;gap:8px;position:sticky;top:0;z-index:100;background:var(--panel,#FFF7EB);border-bottom:1px solid var(--border,#D4C9B8);">
  <a href="index.html" style="color:var(--accent,#0E61AC);text-decoration:none;font-size:0.85rem;font-weight:600;padding:4px 10px;border:1px solid var(--border,#D4C9B8);border-radius:5px;transition:background 0.15s;" onmouseover="this.style.background='#FFF7EB'" onmouseout="this.style.background='transparent'">← 返回实验列表</a>
</div>


<div id="container">
  <div id="content">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="ctrl-group"><label>质量m₁:</label><input type="range" id="m1" min="1" max="10" step="1" value="2"><input type="number" id="m1Val" value="2"></div>
      <div class="ctrl-group"><label>质量m₂:</label><input type="range" id="m2" min="1" max="10" step="1" value="3"><input type="number" id="m2Val" value="3"></div>
      <div class="ctrl-group"><label>初始速度v₁:</label><input type="range" id="v1" min="0" max="10" step="0.5" value="5"><input type="number" id="v1Val" value="5"></div>
      <div class="ctrl-group"><button id="startBtn">▶ 开始</button><button id="resetBtn">↺ 重置</button></div>
    </div>
    <div id="info">刚性轻杆双球滑杆系统：两个小球通过轻杆连接在光滑水平滑杆上运动。系统质心匀速运动，两球相对质心做简谐振动。动量守恒，机械能守恒。</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId;
let x1 = 0, x2 = 100, v1 = 0, v2 = 0;
let isRunning = false;

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(w && h) { canvas.width = w; canvas.height = h; }
}

function reset() {
  x1 = -50;
  x2 = 50;
  const m1 = parseFloat(document.getElementById('m1').value);
  const m2 = parseFloat(document.getElementById('m2').value);
  const v_initial = parseFloat(document.getElementById('v1').value);
  v1 = (m1 + m2) * v_initial / m1;
  v2 = 0;
  isRunning = false;
  if(animationId) cancelAnimationFrame(animationId);
  draw();
}

function draw() {
  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const m1 = parseFloat(document.getElementById('m1').value);
  const m2 = parseFloat(document.getElementById('m2').value);

  if(isRunning) {
    const a = -(m1 + m2) / (m1 * m2) * (v1 - v2) * 2;
    v1 += a * (m2 / (m1 + m2)) * 0.05;
    v2 += a * (m1 / (m1 + m2)) * 0.05;
    x1 += v1 * 0.05;
    x2 += v2 * 0.05;
  }

  const W = canvas.width, H = canvas.height;
  const S = Math.min(W, H);
  const cx = W / 2, cy = H / 2;
  const scale = S * 0.003;

  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = Math.max(2, S * 0.005);
  ctx.beginPath();
  ctx.moveTo(W * 0.1, cy);
  ctx.lineTo(W * 0.9, cy);
  ctx.stroke();

  const px1 = cx + x1 * scale;
  const px2 = cx + x2 * scale;
  const r1 = S * 0.02 + m1 * S * 0.005;
  const r2 = S * 0.02 + m2 * S * 0.005;

  ctx.fillStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.arc(px1, cy, r1, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.arc(px2, cy, r2, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = Math.max(2, S * 0.006);
  ctx.beginPath();
  ctx.moveTo(px1, cy);
  ctx.lineTo(px2, cy);
  ctx.stroke();

  const x_cm = (m1 * x1 + m2 * x2) / (m1 + m2);
  const px_cm = cx + x_cm * scale;
  ctx.fillStyle = '#0E61AC';
  ctx.beginPath();
  ctx.arc(px_cm, cy + S * 0.05, S * 0.012, 0, Math.PI * 2);
  ctx.fill();

  const p1 = m1 * v1;
  const p2 = m2 * v2;
  const p_total = p1 + p2;
  const KE = 0.5 * m1 * v1 * v1 + 0.5 * m2 * v2 * v2;

  ctx.fillStyle = '#5A6370';
  ctx.font = `${S * 0.03}px sans-serif`;
  const fs = S * 0.03;
  ctx.fillText(`质量 m₁ = ${m1} kg`, 10, fs + 5);
  ctx.fillText(`质量 m₂ = ${m2} kg`, 10, fs * 2 + 5);
  ctx.fillText(`位置 x₁ = ${x1.toFixed(1)}`, 10, fs * 3 + 5);
  ctx.fillText(`位置 x₂ = ${x2.toFixed(1)}`, 10, fs * 4 + 5);
  ctx.fillText(`速度 v₁ = ${v1.toFixed(2)}`, 10, fs * 5 + 5);
  ctx.fillText(`速度 v₂ = ${v2.toFixed(2)}`, 10, fs * 6 + 5);

  ctx.fillStyle = '#0E61AC';
  ctx.font = `bold ${S * 0.035}px sans-serif`;
  ctx.fillText(`总动量 p = ${p_total.toFixed(2)} (守恒)`, cx - S * 0.2, H - S * 0.07);
  ctx.fillText(`动能 KE = ${KE.toFixed(2)} (守恒)`, cx - S * 0.18, H - S * 0.02);

  if(isRunning) animationId = requestAnimationFrame(draw);
}

function start() {
  isRunning = true;
  draw();
}

document.getElementById('m1').addEventListener('input', e => { document.getElementById('m1Val').value = e.target.value; });
document.getElementById('m2').addEventListener('input', e => { document.getElementById('m2Val').value = e.target.value; });
document.getElementById('v1').addEventListener('input', e => { document.getElementById('v1Val').value = e.target.value; });
document.getElementById('startBtn').addEventListener('click', start);
document.getElementById('resetBtn').addEventListener('click', reset);

resize();
window.addEventListener('resize', resize);
reset();
</script>
</body>
</html>
