<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相控阵雷达 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; --ac2:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; }
  #content { flex:1; display:flex; flex-direction:column; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.76em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:120px; accent-color:var(--accent); }
  .ctrl-group input[type="number"] { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 6px; color:var(--text); font-size:0.9em; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.74em; color:#5A6370; line-height:1.5; }

@media (max-width:900px) {
  .main { flex-direction:column; }
  .controls { width:100%; }
  .canvas-wrap { min-height:300px; }
}
</style>
</head>
<body>

<div id="container">
  <div id="content">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="ctrl-group"><label>扫描角度:</label><input type="range" id="angle" min="-45" max="45" step="1" value="0"><input type="number" id="angleVal" value="0"></div>
      <div class="ctrl-group"><label>天线数量:</label><input type="range" id="antennas" min="3" max="11" step="2" value="7"><input type="number" id="antennasVal" value="7"></div>
      <div class="ctrl-group"><label>波束宽度:</label><input type="range" id="width" min="5" max="30" step="1" value="10"><input type="number" id="widthVal" value="10"></div>
    </div>
    <div id="info">相控阵雷达通过控制各天线单元的相位差，实现波束的电子扫描。无需机械转动，可快速改变波束方向，广泛应用于雷达、通信等领域。</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId;
let time = 0;

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(w && h) { canvas.width = w; canvas.height = h; }
}

function draw() {
  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  const angle = parseFloat(document.getElementById('angle').value) * Math.PI / 180;
  const nAntennas = parseFloat(document.getElementById('antennas').value);
  const beamWidth = parseFloat(document.getElementById('width').value) * Math.PI / 180;
  
  const cx = canvas.width/2, cy = canvas.height/2;
  
  const spacing = canvas.width * 0.08;
  const startX = cx - (nAntennas-1)*spacing/2;
  
  for(let i=0;i<nAntennas;i++) {
    const x = startX + i*spacing;
    ctx.fillStyle = '#0E61AC';
    ctx.beginPath();
    ctx.arc(x, cy, 6, 0, Math.PI*2);
    ctx.fill();
    
    ctx.fillStyle = '#5A6370';
    ctx.font = '8px sans-serif';
    ctx.fillText(i+1, x-3, cy+2);
  }
  
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(angle) * canvas.width*0.35, cy + Math.sin(angle) * canvas.width*0.35);
  ctx.stroke();
  
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 1;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(angle + beamWidth/2) * canvas.width*0.35, cy + Math.sin(angle + beamWidth/2) * canvas.width*0.35);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(angle - beamWidth/2) * canvas.width*0.35, cy + Math.sin(angle - beamWidth/2) * canvas.width*0.35);
  ctx.stroke();
  ctx.setLineDash([]);
  
  ctx.fillStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.arc(cx + Math.cos(angle) * canvas.width*0.35, cy + Math.sin(angle) * canvas.width*0.35, 8, 0, Math.PI*2);
  ctx.fill();
  
  ctx.fillStyle = '#5A6370';
  ctx.font = '11px sans-serif';
  ctx.fillText(`扫描角: ${(angle*180/Math.PI).toFixed(0)}°`, canvas.width*0.05, canvas.height*0.9);
  ctx.fillText(`波束宽度: ${beamWidth*180/Math.PI}°`, canvas.width*0.35, canvas.height*0.9);
  ctx.fillText(`天线数: ${nAntennas}`, canvas.width*0.6, canvas.height*0.9);
  
  for(let i=0;i<nAntennas;i++) {
    const x = startX + i*spacing;
    const phase = i * Math.sin(angle) * 0.5;
    const brightness = 0.5 + 0.5 * Math.sin(time*0.1 + phase);
    ctx.fillStyle = `rgba(14,97,172,${brightness})`;
    ctx.beginPath();
    ctx.arc(x, cy, 4, 0, Math.PI*2);
    ctx.fill();
  }
  
  time++;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('angle').addEventListener('input', e => { document.getElementById('angleVal').value = e.target.value; });
document.getElementById('antennas').addEventListener('input', e => { document.getElementById('antennasVal').value = e.target.value; });
document.getElementById('width').addEventListener('input', e => { document.getElementById('widthVal').value = e.target.value; });

resize();
window.addEventListener('resize', resize);
draw();
</script>
</body>
</html>
