<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>克拉尼板 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.8em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:140px; accent-color:var(--accent); }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.78em; color:#5A6370; line-height:1.5; }
@media (max-width:900px) {
  #container,#content{flex-direction:column;}
  #controls{flex-wrap:wrap;}
  canvas{min-height:300px;}
}
</style>
</head>
<body>

<div id="container">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <div class="ctrl-group"><label>振动模式 m:</label><input type="range" id="modeM" min="1" max="6" step="1" value="2"><span id="modeMVal">2</span></div>
    <div class="ctrl-group"><label>振动模式 n:</label><input type="range" id="modeN" min="1" max="6" step="1" value="3"><span id="modeNVal">3</span></div>
    <div class="ctrl-group"><label>振幅:</label><input type="range" id="amplitude" min="0.5" max="2" step="0.1" value="1"><span id="amplitudeVal">1</span></div>
    <div class="ctrl-group"><label>动画速度:</label><input type="range" id="speed" min="0.2" max="2" step="0.1" value="1"><span id="speedVal">1</span></div>
    <div class="ctrl-group"><button id="resetBtn">重置</button></div>
  </div>
  <div id="info">克拉尼板：金属板在特定频率下振动时，撒在板上的沙子会聚集在节点线上，形成对称的图案。不同的振动模式产生不同的克拉尼图案。</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dpr=window.devicePixelRatio||1;
let _cw=600,_ch=400;
function getW(){return canvas.clientWidth||_cw;}
function getH(){return canvas.clientHeight||_ch;}
function resizeCanvas(){
  const cw=canvas.clientWidth||_cw,ch=canvas.clientHeight||_ch;
  _cw=cw;_ch=ch;
  canvas.width=cw*dpr;canvas.height=ch*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
let animationId = null;
let t = 0;

function draw() {
  const w = getW(), h = getH();
  const S = Math.min(w, h);
  const cx = w / 2, cy = h / 2;
  const m = parseInt(document.getElementById('modeM').value);
  const n = parseInt(document.getElementById('modeN').value);
  const amplitude = parseFloat(document.getElementById('amplitude').value);
  const speed = parseFloat(document.getElementById('speed').value);
  const size = S * 0.8;

  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = 'rgba(14,97,172,0.15)';
  ctx.fillRect(cx - size / 2, cy - size / 2, size, size);
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx - size / 2, cy - size / 2, size, size);

  const resolution = 300;
  const step = size / resolution;

  ctx.lineWidth = 1.2;
  ctx.strokeStyle = 'rgba(42,124,199,0.8)';
  ctx.beginPath();

  for (let i = 0; i <= resolution; i++) {
    for (let j = 0; j <= resolution; j++) {
      const x = -0.5 + i / resolution;
      const y = -0.5 + j / resolution;
      const z = amplitude * Math.sin(m * Math.PI * (x + 0.5)) * Math.sin(n * Math.PI * (y + 0.5)) * Math.cos(t * speed);
      
      if (Math.abs(z) < 0.05) {
        const px = cx + x * size;
        const py = cy + y * size;
        if (Math.random() > 0.9) {
          ctx.moveTo(px, py);
          ctx.arc(px, py, 1.5, 0, Math.PI * 2);
        }
      }
    }
  }
  ctx.stroke();

  ctx.fillStyle = '#5A6370';
  ctx.font = `${S * 0.035}px sans-serif`;
  ctx.fillText(`模式: (${m},${n})`, w * 0.05, h * 0.08);
  
  t += 0.03;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('modeM').addEventListener('input', e => {
  document.getElementById('modeMVal').textContent = e.target.value;
});
document.getElementById('modeN').addEventListener('input', e => {
  document.getElementById('modeNVal').textContent = e.target.value;
});
document.getElementById('amplitude').addEventListener('input', e => {
  document.getElementById('amplitudeVal').textContent = e.target.value;
});
document.getElementById('speed').addEventListener('input', e => {
  document.getElementById('speedVal').textContent = e.target.value;
});
document.getElementById('resetBtn').addEventListener('click', () => {
  t = 0;
});

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
draw();

let _paused=false;
document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){e.preventDefault();
    _paused=!_paused;
    if(typeof isRunning!=='undefined'){isRunning=!_paused;if(isRunning&&typeof animate==='function')animate();else if(typeof cancelAnimationFrame==='function'&&typeof animationId!=='undefined')cancelAnimationFrame(animationId);}
    else if(typeof running!=='undefined'){running=!_paused;if(running&&typeof animate==='function')animate();}
    else if(typeof paused!=='undefined'){paused=_paused;if(!paused&&typeof animate==='function')animate();}
  }
  if(e.code==='KeyR'){e.preventDefault();if(typeof reset==='function')reset();}
});
</script>
</body>
</html>
