<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>物理数值仿真平台</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #c9d1d9; --accent: #58a6ff; --ac2: #3fb950;
    --ac3: #f78166; --ac4: #d2a8ff; --ac5: #ffa657;
    --card-bg: #1c2333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
  }
  #topbar {
    height: 44px; min-height: 44px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px;
    gap: 10px; z-index: 10;
  }
  #topbar .logo { font-size: 1em; font-weight: 700; color: #f0f6fc; white-space: nowrap; }
  #topbar .domain-badge {
    font-size: 0.68em; padding: 2px 8px; border-radius: 8px;
    background: rgba(88,166,255,0.12); color: var(--accent);
    border: 1px solid rgba(88,166,255,0.2);
  }
  #topbar .info { margin-left: auto; font-size: 0.72em; color: #8b949e; display: flex; gap: 14px; }
  #categoryBar {
    height: 40px; min-height: 40px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: stretch; overflow-x: auto;
  }
  #categoryBar .cat-tab {
    display: flex; align-items: center; gap: 6px;
    padding: 0 20px; cursor: pointer; white-space: nowrap;
    font-size: 0.82em; color: #8b949e;
    border-bottom: 2px solid transparent;
    transition: 0.15s; user-select: none;
  }
  #categoryBar .cat-tab:hover { color: var(--text); }
  #categoryBar .cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  #categoryBar .cat-icon { font-size: 1.1em; }
  #main { flex: 1; display: flex; overflow: hidden; position: relative; }
  #listWrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #expList {
    flex: 1; overflow-y: auto; padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
  }
  #expList::-webkit-scrollbar { width: 4px; }
  #expList::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
  #pager {
    height: 38px; min-height: 38px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 5px;
    padding: 0 12px;
  }
  #pager .pg-btn {
    min-width: 28px; height: 26px; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text); border-radius: 5px;
    cursor: pointer; font-size: 0.78em; display: flex; align-items: center;
    justify-content: center; padding: 0 6px; transition: 0.15s;
  }
  #pager .pg-btn:hover { border-color: var(--accent); color: var(--accent); }
  #pager .pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #pager .pg-btn:disabled { opacity: 0.3; cursor: default; }
  #pager .pg-info { font-size: 0.72em; color: #8b949e; margin: 0 10px; }
  .exp-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer; transition: 0.2s;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
  }
  .exp-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.35);
  }
  .exp-card canvas {
    width: 100%; flex: 1 1 0; min-height: 0; display: block;
    border-radius: 10px 10px 0 0;
  }
  .exp-card .card-info {
    flex: 0 0 auto; min-height: 42px;
    padding: 5px 8px 6px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center;
    background: var(--card-bg);
  }
  .exp-card .card-title {
    font-size: 0.85em; font-weight: 700; color: #f0f6fc;
    line-height: 1.35; margin-bottom: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .exp-card .card-desc {
    font-size: 0.65em; color: #6e7681; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #simView {
    position: absolute; inset: 0; display: none; flex-direction: column;
    background: var(--bg); z-index: 5;
  }
  #simView.active { display: flex; }
  #simView .sim-topbar {
    height: 38px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 14px; gap: 10px;
  }
  #simView .sim-topbar .back-btn {
    padding: 4px 10px; background: var(--accent); color: #fff; border: none;
    border-radius: 4px; cursor: pointer; font-size: 0.76em;
  }
  #simView .sim-topbar .back-btn:hover { opacity: 0.85; }
  #simView .sim-topbar .sim-title { font-size: 0.82em; color: #f0f6fc; }
  #simView iframe { flex: 1; width: 100%; border: none; }
  @media (max-width: 900px) {
    #expList { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(6, 1fr); }
  }
  @media (max-width: 600px) {
    #topbar .info { display: none; }
    #categoryBar .cat-tab { padding: 0 12px; font-size: 0.74em; }
    #expList { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(8, 1fr); padding: 6px; gap: 6px; }
  }
</style>
</head>
<body>
<div id="topbar">
  <span class="logo">🔬 物理数值仿真平台</span>
  <span class="domain-badge" id="topBadge">力学</span>
  <span class="info">
    <span>📊 <span id="totalCount">0</span>个实验</span>
    <span>⚡ 本地计算</span>
    <span>🌐 HTML5</span>
  </span>
</div>
<div id="categoryBar">
  <div class="cat-tab active" data-cat="mechanics"><span class="cat-icon">⚙️</span>力学</div>
  <div class="cat-tab" data-cat="waves"><span class="cat-icon">〰️</span>振动与波</div>
  <div class="cat-tab" data-cat="electromagnetism"><span class="cat-icon">🧲</span>电磁学</div>
  <div class="cat-tab" data-cat="thermo"><span class="cat-icon">🌡️</span>热学</div>
  <div class="cat-tab" data-cat="optics"><span class="cat-icon">💡</span>光学</div>
  <div class="cat-tab" data-cat="modern"><span class="cat-icon">🌌</span>近现代与天体物理</div>
  <div class="cat-tab" data-cat="quantum"><span class="cat-icon">⚛️</span>量子与核物理</div>
</div>
<div id="main">
  <div id="listWrap">
    <div id="expList"></div>
    <div id="pager"></div>
  </div>
  <div id="simView">
    <div class="sim-topbar">
      <button class="back-btn" id="backBtn">← 返回实验列表</button>
      <span class="sim-title" id="simTitle"></span>
    </div>
    <iframe id="simFrame" title="simulation"></iframe>
  </div>
</div>
<script>
const PV = {
  projectile(c,w,h){c.strokeStyle='#58a6ff';c.lineWidth=2;c.beginPath();for(let i=0;i<=1;i+=0.02){const x=w*0.1+i*w*0.8,y=h*0.85-i*4*h*0.18*(1-i);i===0?c.moveTo(x,y):c.lineTo(x,y)}c.stroke();c.fillStyle='#f78166';c.beginPath();c.arc(w*0.7,h*0.3,4,0,Math.PI*2);c.fill();c.strokeStyle='#8b949e';c.lineWidth=1;c.beginPath();c.moveTo(w*0.1,h*0.85);c.lineTo(w*0.9,h*0.85);c.stroke()},
  pendulum(c,w,h){const cx=w/2,cy=h*0.1,r=h*0.55,a=0.6;c.strokeStyle='#8b949e';c.lineWidth=1;c.beginPath();c.moveTo(cx,cy);c.lineTo(cx+r*Math.sin(a),cy+r*Math.cos(a));c.stroke();c.fillStyle='#58a6ff';c.beginPath();c.arc(cx+r*Math.sin(a),cy+r*Math.cos(a),6,0,Math.PI*2);c.fill();c.strokeStyle='rgba(88,166,255,0.3)';c.beginPath();c.arc(cx,cy,r,0.3,Math.PI-0.3);c.stroke()},
  collision(c,w,h){c.fillStyle='#f78166';c.beginPath();c.arc(w*0.3,h*0.5,8,0,Math.PI*2);c.fill();c.fillStyle='#58a6ff';c.beginPath();c.arc(w*0.7,h*0.5,8,0,Math.PI*2);c.fill();c.strokeStyle='rgba(247,129,102,0.5)';c.lineWidth=2;c.beginPath();c.moveTo(w*0.3+8,h*0.5);c.lineTo(w*0.3+25,h*0.5);c.stroke();c.strokeStyle='rgba(88,166,255,0.5)';c.beginPath();c.moveTo(w*0.7-8,h*0.5);c.lineTo(w*0.7-25,h*0.5);c.stroke();c.strokeStyle='#8b949e';c.lineWidth=1;c.setLineDash([3,3]);c.beginPath();c.moveTo(w*0.5,h*0.15);c.lineTo(w*0.5,h*0.85);c.stroke();c.setLineDash([])},
  orbit(c,w,h){const cx=w/2,cy=h/2;c.fillStyle='#ffa657';c.beginPath();c.arc(cx,cy,8,0,Math.PI*2);c.fill();c.strokeStyle='rgba(88,166,255,0.4)';c.lineWidth=1;c.beginPath();c.ellipse(cx,cy,w*0.35,h*0.25,0,0,Math.PI*2);c.stroke();c.beginPath();c.ellipse(cx,cy,w*0.22,h*0.35,0.5,0,Math.PI*2);c.stroke();c.fillStyle='#58a6ff';c.beginPath();c.arc(cx+w*0.35,cy,4,0,Math.PI*2);c.fill()},
  oscillator(c,w,h){c.strokeStyle='#d2a8ff';c.lineWidth=2;c.beginPath();for(let i=0;i<w;i+=2){const y=h/2+Math.sin(i*0.06)*h*0.3*Math.exp(-i*0.003);i===0?c.moveTo(i,y):c.lineTo(i,y)}c.stroke();c.strokeStyle='rgba(210,168,255,0.2)';c.lineWidth=1;c.beginPath();c.moveTo(0,h/2);c.lineTo(w,h/2);c.stroke()},
  standingWave(c,w,h){c.strokeStyle='#d2a8ff';c.lineWidth=2;c.beginPath();for(let i=0;i<w;i+=2){const y=h/2+Math.sin(i*Math.PI*3/w)*h*0.3;i===0?c.moveTo(i,y):c.lineTo(i,y)}c.stroke();c.strokeStyle='rgba(210,168,255,0.4)';c.beginPath();for(let i=0;i<w;i+=2){const y=h/2-Math.sin(i*Math.PI*3/w)*h*0.3;i===0?c.moveTo(i,y):c.lineTo(i,y)}c.stroke();c.fillStyle='#8b949e';c.fillRect(0,h*0.15,3,h*0.7);c.fillRect(w-3,h*0.15,3,h*0.7)},
  efield(c,w,h){const cx=w/2,cy=h/2;c.fillStyle='#f78166';c.beginPath();c.arc(cx-20,cy,6,0,Math.PI*2);c.fill();c.fillStyle='#58a6ff';c.beginPath();c.arc(cx+20,cy,6,0,Math.PI*2);c.fill();c.strokeStyle='rgba(88,166,255,0.4)';c.lineWidth=1;for(let a=0;a<Math.PI*2;a+=0.5){c.beginPath();c.moveTo(cx+20+Math.cos(a)*8,cy+Math.sin(a)*8);c.lineTo(cx+20+Math.cos(a)*25,cy+Math.sin(a)*25);c.stroke()}c.strokeStyle='rgba(247,129,102,0.4)';for(let a=0;a<Math.PI*2;a+=0.5){c.beginPath();c.moveTo(cx-20+Math.cos(a)*8,cy+Math.sin(a)*8);c.lineTo(cx-20+Math.cos(a)*25,cy+Math.sin(a)*25);c.stroke()}},
  lorentz(c,w,h){c.strokeStyle='#58a6ff';c.lineWidth=1.5;c.beginPath();const cx=w/2,cy=h/2,r=h*0.3;for(let a=0;a<Math.PI*3;a+=0.05){const x=cx+r*Math.cos(a)+a*3,y=cy+r*Math.sin(a);a===0?c.moveTo(x,y):c.lineTo(x,y)}c.stroke();c.fillStyle='#f78166';c.beginPath();c.arc(cx+r*Math.cos(0)+3,cy+r*Math.sin(0),3,0,Math.PI*2);c.fill()},
  rlc(c,w,h){const y=h/2;c.strokeStyle='#58a6ff';c.lineWidth=2;c.beginPath();for(let i=0;i<w;i+=2){const v=Math.sin(i*0.08)*h*0.3*Math.exp(-i*0.004);i===0?c.moveTo(i,y-v):c.lineTo(i,y-v)}c.stroke();c.strokeStyle='#f78166';c.lineWidth=1;c.beginPath();for(let i=0;i<w;i+=2){const v=Math.cos(i*0.08)*h*0.3*Math.exp(-i*0.004);i===0?c.moveTo(i,y-v):c.lineTo(i,y-v)}c.stroke()},
  battery(c,w,h){const cx=w/2,cy=h/2;c.strokeStyle='#8b949e';c.lineWidth=2;c.strokeRect(cx-15,cy-25,30,50);c.fillStyle='#3fb950';c.fillRect(cx-12,cy-5,24,27);c.fillStyle='#f78166';c.fillRect(cx-12,cy-22,24,17);c.fillStyle='#58a6ff';c.font='10px sans-serif';c.fillText('+',cx-3,cy-12);c.fillText('−',cx-3,cy+18);c.strokeStyle='rgba(63,185,80,0.4)';c.lineWidth=1;for(let i=0;i<5;i++){const x=cx-10+i*5;c.beginPath();c.moveTo(x,cy+5);c.lineTo(x,cy+20);c.stroke()}},
  accelerator(c,w,h){const cx=w/2,cy=h/2;c.strokeStyle='#58a6ff';c.lineWidth=2;c.beginPath();c.arc(cx,cy,h*0.35,0,Math.PI*2);c.stroke();c.strokeStyle='rgba(88,166,255,0.3)';c.beginPath();c.arc(cx,cy,h*0.25,0,Math.PI*2);c.stroke();c.fillStyle='#f78166';c.beginPath();c.arc(cx+h*0.35,cy,4,0,Math.PI*2);c.fill();c.strokeStyle='#8b949e';c.lineWidth=1;c.beginPath();c.moveTo(cx,cy-h*0.35);c.lineTo(cx,cy-h*0.25);c.stroke();c.beginPath();c.moveTo(cx,cy+h*0.25);c.lineTo(cx,cy+h*0.35);c.stroke()},
  multicharge(c,w,h){const pts=[[w*0.3,h*0.3],[w*0.7,h*0.3],[w*0.5,h*0.7]];c.fillStyle='#f78166';pts.forEach(p=>{c.beginPath();c.arc(p[0],p[1],4,0,Math.PI*2);c.fill()});c.strokeStyle='rgba(88,166,255,0.3)';c.lineWidth=1;pts.forEach(p=>{for(let a=0;a<Math.PI*2;a+=0.6){c.beginPath();c.moveTo(p[0]+Math.cos(a)*6,p[1]+Math.sin(a)*6);c.lineTo(p[0]+Math.cos(a)*18,p[1]+Math.sin(a)*18);c.stroke()}})},
  particle(c,w,h){c.strokeStyle='#58a6ff';c.lineWidth=1.5;c.beginPath();const cx=w/2,cy=h/2,r=h*0.25;for(let a=0;a<Math.PI*4;a+=0.05){const x=cx+r*Math.cos(a)+a*2,y=cy+r*Math.sin(a)*0.6;a===0?c.moveTo(x,y):c.lineTo(x,y)}c.stroke();c.fillStyle='#f78166';const la=Math.PI*4;c.beginPath();c.arc(cx+r*Math.cos(la)+la*2,cy+r*Math.sin(la)*0.6,3,0,Math.PI*2);c.fill()},
  fourpoint(c,w,h){const y=h*0.6;c.strokeStyle='#8b949e';c.lineWidth=2;c.beginPath();c.moveTo(w*0.1,y);c.lineTo(w*0.9,y);c.stroke();c.fillStyle='#f78166';[w*0.25,w*0.75].forEach(x=>{c.beginPath();c.arc(x,y,4,0,Math.PI*2);c.fill()});c.fillStyle='#58a6ff';[w*0.35,w*0.65].forEach(x=>{c.beginPath();c.arc(x,y,3,0,Math.PI*2);c.fill()});c.strokeStyle='rgba(88,166,255,0.3)';c.lineWidth=1;c.setLineDash([2,2]);c.beginPath();c.moveTo(w*0.35,y-15);c.lineTo(w*0.65,y-15);c.stroke();c.setLineDash([])},
  helmholtz(c,w,h){const cx=w/2,cy=h/2;c.strokeStyle='#f78166';c.lineWidth=2;c.beginPath();c.ellipse(cx-w*0.15,cy,h*0.12,h*0.35,0,0,Math.PI*2);c.stroke();c.beginPath();c.ellipse(cx+w*0.15,cy,h*0.12,h*0.35,0,0,Math.PI*2);c.stroke();c.strokeStyle='rgba(88,166,255,0.3)';c.lineWidth=1;for(let i=-3;i<=3;i++){c.beginPath();c.moveTo(cx-w*0.15,cy+i*h*0.08);c.lineTo(cx+w*0.15,cy+i*h*0.08);c.stroke()}},
  spectrometer(c,w,h){c.fillStyle='#8b949e';c.fillRect(w*0.1,h*0.3,8,h*0.4);c.strokeStyle='#58a6ff';c.lineWidth=1.5;const cx=w*0.5,cy=h*0.5;c.beginPath();c.arc(cx,cy,h*0.35,-0.3,Math.PI+0.3);c.stroke();c.fillStyle='#f78166';c.beginPath();c.arc(cx+h*0.35*Math.cos(-0.1),cy+h*0.35*Math.sin(-0.1),3,0,Math.PI*2);c.fill();c.fillStyle='#3fb950';c.beginPath();c.arc(cx+h*0.35*Math.cos(1),cy+h*0.35*Math.sin(1),3,0,Math.PI*2);c.fill();c.fillStyle='#d2a8ff';c.beginPath();c.arc(cx+h*0.35*Math.cos(2),cy+h*0.35*Math.sin(2),3,0,Math.PI*2);c.fill()},
  eddy(c,w,h){const cx=w/2,cy=h/2;c.strokeStyle='#58a6ff';c.lineWidth=2;c.beginPath();c.arc(cx,cy,h*0.3,0,Math.PI*2);c.stroke();c.strokeStyle='rgba(88,166,255,0.3)';c.lineWidth=1;for(let r=h*0.15;r<h*0.3;r+=8){c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.stroke()}c.fillStyle='#f78166';c.beginPath();c.arc(cx,cy-h*0.3-5,5,0,Math.PI*2);c.fill();c.strokeStyle='rgba(247,129,102,0.4)';c.beginPath();c.moveTo(cx,cy-h*0.3-5);c.lineTo(cx,cy-h*0.3+10);c.stroke()},
  superconductor(c,w,h){const cx=w/2,cy=h/2;c.strokeStyle='#58a6ff';c.lineWidth=2;c.beginPath();c.moveTo(w*0.15,cy);c.lineTo(w*0.85,cy);c.stroke();c.fillStyle='rgba(88,166,255,0.15)';c.fillRect(w*0.15,cy-h*0.15,w*0.7,h*0.3);c.strokeStyle='rgba(88,166,255,0.4)';c.lineWidth=1;for(let i=0;i<6;i++){const x=w*0.2+i*w*0.1;c.beginPath();c.arc(x,cy,4,0,Math.PI*2);c.stroke()}c.fillStyle='#f78166';c.beginPath();c.arc(w*0.85,cy,4,0,Math.PI*2);c.fill()},
  waveguide(c,w,h){c.strokeStyle='#8b949e';c.lineWidth=2;c.strokeRect(w*0.15,h*0.2,w*0.7,h*0.6);c.strokeStyle='#58a6ff';c.lineWidth=1.5;c.beginPath();for(let i=0;i<w*0.7;i+=3){const x=w*0.15+i,y=h*0.5+Math.sin(i*0.08)*h*0.2;i===0?c.moveTo(x,y):c.lineTo(x,y)}c.stroke();c.strokeStyle='rgba(88,166,255,0.3)';c.beginPath();for(let i=0;i<w*0.7;i+=3){const x=w*0.15+i,y=h*0.5-Math.sin(i*0.08)*h*0.2;i===0?c.moveTo(x,y):c.lineTo(x,y)}c.stroke()},
  skin(c,w,h){const cx=w/2;c.strokeStyle='#f78166';c.lineWidth=2;c.beginPath();for(let i=0;i<h;i+=2){const x=cx+Math.exp(-Math.abs(i-h/2)*0.03)*w*0.3;i===0?c.moveTo(x,i):c.lineTo(x,i)}c.stroke();c.strokeStyle='rgba(247,129,102,0.3)';c.lineWidth=1;c.beginPath();for(let i=0;i<h;i+=2){const x=cx+Math.exp(-Math.abs(i-h/2)*0.06)*w*0.2;i===0?c.moveTo(x,i):c.lineTo(x,i)}c.stroke();c.strokeStyle='#8b949e';c.setLineDash([3,3]);c.beginPath();c.moveTo(cx,0);c.lineTo(cx,h);c.stroke();c.setLineDash([])},

const catBar = document.getElementById('categoryBar');
const expList = document.getElementById('expList');
const simView = document.getElementById('simView');
const simFrame = document.getElementById('simFrame');
const simTitle = document.getElementById('simTitle');
const backBtn = document.getElementById('backBtn');
const topBadge = document.getElementById('topBadge');
const totalCountEl = document.getElementById('totalCount');

let totalExperiments = 0;
for (const key in experiments) { totalExperiments += experiments[key].items.length; }
totalCountEl.textContent = totalExperiments;

let currentCat = 'mechanics';
let currentPage = 1;
const PAGE_SIZE = 16;
const pagerEl = document.getElementById('pager');

function switchCategory(catKey) {
  currentCat = catKey;
  currentPage = 1;
  const cat = experiments[catKey];
  if (!cat) return;
  catBar.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === catKey);
  });
  topBadge.textContent = cat.name;
  pagerEl.setAttribute('data-cat', catKey);
  renderCards();
}

function renderCards() {
  const catKey = pagerEl.getAttribute('data-cat') || currentCat;
  const cat = experiments[catKey];
  if (!cat) return;
  currentCat = catKey;

  const items = cat.items;
  const total = items.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage < 1) currentPage = 1;
  if (currentPage > totalPages) currentPage = totalPages;
  const page = currentPage;

  catBar.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === catKey);
  });
  topBadge.textContent = cat.name;

  const start = (page - 1) * PAGE_SIZE;
  const pageItems = items.slice(start, start + PAGE_SIZE);

  expList.innerHTML = '';
  pageItems.forEach(item => {
    const card = document.createElement('div');
    card.className = 'exp-card';
    const cvs = document.createElement('canvas');
    cvs.width = 320; cvs.height = 200;
    card.appendChild(cvs);
    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `<div class="card-title">${item.title}</div><div class="card-desc">${item.desc}</div>`;
    card.appendChild(info);
    card.addEventListener('mouseenter', () => { card.style.borderColor = cat.color + '88'; });
    card.addEventListener('mouseleave', () => { card.style.borderColor = ''; });
    card.addEventListener('click', () => openSim(item));
    expList.appendChild(card);
    try {
      const ctx = cvs.getContext('2d');
      ctx.fillStyle = '#0d1117';
      ctx.fillRect(0, 0, 320, 200);
      if (PV[item.pv]) PV[item.pv](ctx, 320, 200);
    } catch(e) { console.warn('PV render error:', item.pv, e); }
  });

  renderPager(page, totalPages, total);
}

function renderPager(page, totalPages, total) {
  const catKey = pagerEl.getAttribute('data-cat') || currentCat;
  pagerEl.innerHTML = '';
  if (totalPages <= 1) {
    pagerEl.innerHTML = `<span class="pg-info">共 ${total} 个实验</span>`;
    return;
  }

  function goPage(p) {
    currentPage = p;
    renderCards();
  }

  const prevBtn = document.createElement('button');
  prevBtn.className = 'pg-btn'; prevBtn.textContent = '‹';
  prevBtn.disabled = page <= 1;
  prevBtn.addEventListener('click', (e) => { e.stopPropagation(); goPage(page - 1); });
  pagerEl.appendChild(prevBtn);

  for (let p = 1; p <= totalPages; p++) {
    const btn = document.createElement('button');
    btn.className = 'pg-btn' + (p === page ? ' active' : '');
    btn.textContent = p;
    btn.addEventListener('click', (e) => { e.stopPropagation(); goPage(p); });
    pagerEl.appendChild(btn);
  }

  const nextBtn = document.createElement('button');
  nextBtn.className = 'pg-btn'; nextBtn.textContent = '›';
  nextBtn.disabled = page >= totalPages;
  nextBtn.addEventListener('click', (e) => { e.stopPropagation(); goPage(page + 1); });
  pagerEl.appendChild(nextBtn);

  const info = document.createElement('span');
  info.className = 'pg-info';
  info.textContent = `${total} 个实验 · 第 ${page}/${totalPages} 页`;
  pagerEl.appendChild(info);
}

function openSim(item) {
  simTitle.textContent = item.title;
  simFrame.src = item.file;
  simView.classList.add('active');
}

function backToList() {
  simView.classList.remove('active');
  simFrame.src = '';
}

backBtn.addEventListener('click', backToList);
document.addEventListener('keydown', (e) => {
  if (simView.classList.contains('active') && e.key === 'Escape') backToList();
});

catBar.addEventListener('click', (e) => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  switchCategory(tab.dataset.cat);
});

pagerEl.setAttribute('data-cat', 'mechanics');
switchCategory('mechanics');
</script>
