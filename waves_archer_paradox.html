<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>弓手悖论仿真 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.8em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:140px; accent-color:var(--accent); }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.78em; color:#5A6370; line-height:1.5; }
</style>
</head>
<body>
<div class="back-bar" style="display:flex;align-items:center;padding:8px 16px;gap:8px;position:sticky;top:0;z-index:100;background:var(--panel,#FFF7EB);border-bottom:1px solid var(--border,#D4C9B8);">
  <a href="index.html" style="color:var(--accent,#0E61AC);text-decoration:none;font-size:0.85rem;font-weight:600;padding:4px 10px;border:1px solid var(--border,#D4C9B8);border-radius:5px;transition:background 0.15s;" onmouseover="this.style.background='#FFF7EB'" onmouseout="this.style.background='transparent'">← 返回实验列表</a>
</div>


<div id="container">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <div class="ctrl-group"><label>弓弦拉力:</label><input type="range" id="tension" min="100" max="500" step="10" value="300"><span id="tensionVal">300</span> N</div>
    <div class="ctrl-group"><label>箭杆弹性系数:</label><input type="range" id="k" min="1000" max="5000" step="100" value="2500"><span id="kVal">2500</span> N/m</div>
    <div class="ctrl-group"><label>发射角度:</label><input type="range" id="angle" min="10" max="60" step="5" value="30"><span id="angleVal">30</span>°</div>
    <div class="ctrl-group"><button id="shootBtn">发射</button><button id="resetBtn">重置</button></div>
  </div>
  <div id="info">弓手悖论：箭矢发射时会发生弯曲，看似会偏离目标，但实际上弯曲的箭矢会沿着正确的抛物线轨迹飞行并命中目标。这是因为箭矢在弓弦推动下获得旋转，弯曲与旋转共同作用使箭正确飞向目标。</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId = null;
let isFlying = false;
let arrow = { x: 0, y: 0, vx: 0, vy: 0, bend: 0, omega: 0 };
let trail = [];
let t = 0;

const SCALE = 3;
const GRAVITY = 9.8;

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w && h) { canvas.width = w; canvas.height = h; }
}

function reset() {
  isFlying = false;
  t = 0;
  trail = [];
  arrow = { x: 0, y: 0, vx: 0, vy: 0, bend: 0, omega: 0 };
}

function shoot() {
  if (isFlying) return;
  isFlying = true;
  const k = parseFloat(document.getElementById('k').value);
  const angle = parseFloat(document.getElementById('angle').value) * Math.PI / 180;
  const arrowMass = 0.02;
  const drawLength = 0.5;
  const force = k * drawLength;
  const v0 = Math.sqrt(2 * force * drawLength / arrowMass);
  arrow.vx = v0 * Math.cos(angle);
  arrow.vy = -v0 * Math.sin(angle);
  arrow.x = 0;
  arrow.y = 0;
  arrow.bend = 0.15;
  arrow.omega = 12;
}

function draw() {
  const w = canvas.width, h = canvas.height;
  if (!w || !h) return;
  const S = Math.min(w, h);
  const cx = w / 2, cy = h / 2;

  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0, 0, w, h);

  const originX = w * 0.12;
  const originY = h * 0.8;
  const pxPerM = S * 0.008;

  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(w * 0.95, originY);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(139,148,158,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(originX, h * 0.05);
  ctx.stroke();

  const targetX = w * 0.85;
  const targetY = originY - S * 0.3;
  ctx.fillStyle = '#5A6370';
  ctx.fillRect(targetX - S * 0.02, targetY - S * 0.06, S * 0.04, S * 0.12);
  ctx.fillStyle = '#0E61AC';
  ctx.beginPath();
  ctx.arc(targetX, targetY, S * 0.025, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.arc(targetX, targetY, S * 0.012, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(originX, originY);
  ctx.lineTo(targetX, targetY);
  ctx.stroke();
  ctx.setLineDash([]);

  if (!isFlying) {
    const launchAngle = parseFloat(document.getElementById('angle').value) * Math.PI / 180;
    ctx.fillStyle = '#2A7CC7';
    ctx.beginPath();
    ctx.arc(originX, originY, S * 0.015, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#2A7CC7';
    ctx.lineWidth = S * 0.006;
    ctx.beginPath();
    ctx.moveTo(originX, originY);
    const bowLen = S * 0.1;
    ctx.quadraticCurveTo(
      originX - bowLen * 0.3, originY - bowLen * Math.sin(launchAngle) * 0.5,
      originX + bowLen * Math.cos(launchAngle), originY - bowLen * Math.sin(launchAngle)
    );
    ctx.stroke();
  } else {
    const dt = 0.016;
    arrow.vy += GRAVITY * dt;
    arrow.x += arrow.vx * dt;
    arrow.y += arrow.vy * dt;
    arrow.bend *= 0.995;
    arrow.omega *= 0.998;

    const screenX = originX + arrow.x * pxPerM;
    const screenY = originY + arrow.y * pxPerM;

    trail.push({ x: screenX, y: screenY });
    if (trail.length > 150) trail.shift();

    if (trail.length > 1) {
      ctx.strokeStyle = 'rgba(14,97,172,0.3)';
      ctx.lineWidth = S * 0.004;
      ctx.beginPath();
      ctx.moveTo(trail[0].x, trail[0].y);
      for (let i = 1; i < trail.length; i++) {
        ctx.lineTo(trail[i].x, trail[i].y);
      }
      ctx.stroke();
    }

    ctx.save();
    ctx.translate(screenX, screenY);
    const angle = Math.atan2(arrow.vy, arrow.vx);
    ctx.rotate(angle);

    const arrowLen = S * 0.08;
    const bendOffset = arrow.bend * arrowLen * Math.sin(arrow.omega * t);

    ctx.strokeStyle = '#2A7CC7';
    ctx.lineWidth = S * 0.006;
    ctx.beginPath();
    ctx.moveTo(-arrowLen, 0);
    ctx.quadraticCurveTo(-arrowLen * 0.3, bendOffset, arrowLen * 0.3, 0);
    ctx.stroke();

    ctx.fillStyle = '#2A7CC7';
    ctx.beginPath();
    ctx.moveTo(arrowLen * 0.3, 0);
    ctx.lineTo(arrowLen * 0.5, -S * 0.01);
    ctx.lineTo(arrowLen * 0.5, S * 0.01);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#0E61AC';
    ctx.beginPath();
    ctx.moveTo(-arrowLen, 0);
    ctx.lineTo(-arrowLen - S * 0.008, -S * 0.006);
    ctx.lineTo(-arrowLen - S * 0.008, S * 0.006);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    if (screenY > h + S * 0.1 || screenX > w + S * 0.1 || screenY < -S * 0.1) {
      isFlying = false;
    }
  }

  const fs = S * 0.032;
  ctx.font = `${fs}px sans-serif`;
  ctx.fillStyle = '#5A6370';
  const infoX = w * 0.02, infoY = fs + 5;
  ctx.fillText(`位移 x = ${arrow.x.toFixed(2)} m`, infoX, infoY);
  ctx.fillText(`位移 y = ${arrow.y.toFixed(2)} m`, infoX, infoY + fs * 1.3);
  ctx.fillText(`速度 = ${Math.sqrt(arrow.vx * arrow.vx + arrow.vy * arrow.vy).toFixed(2)} m/s`, infoX, infoY + fs * 2.6);
  ctx.fillText(`弯曲 = ${(arrow.bend * 100).toFixed(1)}%`, infoX, infoY + fs * 3.9);

  t += 0.016;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('tension').addEventListener('input', e => {
  document.getElementById('tensionVal').textContent = e.target.value;
});
document.getElementById('k').addEventListener('input', e => {
  document.getElementById('kVal').textContent = e.target.value;
});
document.getElementById('angle').addEventListener('input', e => {
  document.getElementById('angleVal').textContent = e.target.value;
});
document.getElementById('shootBtn').addEventListener('click', shoot);
document.getElementById('resetBtn').addEventListener('click', reset);

resize();
window.addEventListener('resize', resize);
draw();
</script>
</body>
</html>
