<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗物质宇宙设计 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.8em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:140px; accent-color:var(--accent); }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.78em; color:#5A6370; line-height:1.5; }
@media (max-width:900px) {
  #container,#content{flex-direction:column;}
  #controls{flex-wrap:wrap;}
  canvas{min-height:300px;}
}
</style>
</head>
<body>

<div id="container">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <div class="ctrl-group"><label>暗物质比例:</label><input type="range" id="darkMatterRatio" min="0" max="90" step="5" value="85"><span id="darkMatterRatioVal">85</span>%</div>
    <div class="ctrl-group"><label>可见物质质量:</label><input type="range" id="visibleMass" min="1" max="10" step="1" value="2"><span id="visibleMassVal">2</span> ×10¹¹ M☉</div>
    <div class="ctrl-group"><button id="resetBtn">重置</button></div>
  </div>
  <div id="info">暗物质：通过观测星系旋转曲线，发现可见物质不足以解释观测到的引力。暗物质不与电磁波相互作用，但通过引力影响可见物质。目前认为暗物质占宇宙总质量的85%左右。</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dpr=window.devicePixelRatio||1;
let _cw=600,_ch=400;
function getW(){return canvas.clientWidth||_cw;}
function getH(){return canvas.clientHeight||_ch;}
function resizeCanvas(){
  const cw=canvas.clientWidth||_cw,ch=canvas.clientHeight||_ch;
  _cw=cw;_ch=ch;
  canvas.width=cw*dpr;canvas.height=ch*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
let animationId = null;
let t = 0;
let bgStars = [];
let galaxyStars = [];
let orbitingStars = [];

function initStars() {
  bgStars = [];
  for (let i = 0; i < 120; i++) {
    bgStars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 0.002 + 0.001,
      a: Math.random() * 0.5 + 0.1
    });
  }
  galaxyStars = [];
  for (let i = 0; i < 100; i++) {
    const r = 0.05 + Math.random() * 0.2;
    const th = Math.random() * Math.PI * 2;
    galaxyStars.push({ r, th, brightness: Math.random() * 0.6 + 0.3 });
  }
  orbitingStars = [];
  for (let i = 0; i < 8; i++) {
    const r = 0.15 + Math.random() * 0.3;
    const th = Math.random() * Math.PI * 2;
    orbitingStars.push({ r, th0: th });
  }
}

function draw() {
  const w = getW(), h = getH();
  if (!w || !h) return;
  const S = Math.min(w, h);
  const cx = w / 2, cy = h / 2;
  const darkRatio = parseFloat(document.getElementById('darkMatterRatio').value) / 100;
  const visMass = parseFloat(document.getElementById('visibleMass').value);
  const darkMass = visMass * darkRatio / (1 - darkRatio);

  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, w, h);

  for (const star of bgStars) {
    ctx.fillStyle = `rgba(14,97,172,${star.a})`;
    ctx.beginPath();
    ctx.arc(star.x * w, star.y * h, star.r * S, 0, Math.PI * 2);
    ctx.fill();
  }

  const galaxyR = S * 0.22;

  const darkGlow = ctx.createRadialGradient(cx, cy, galaxyR * 0.3, cx, cy, galaxyR * 1.5);
  darkGlow.addColorStop(0, `rgba(139,92,246,${darkRatio * 0.15})`);
  darkGlow.addColorStop(1, 'rgba(139,92,246,0)');
  ctx.fillStyle = darkGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, galaxyR * 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.arc(cx, cy, S * 0.025, 0, Math.PI * 2);
  ctx.fill();

  const coreGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, galaxyR * 0.4);
  coreGlow.addColorStop(0, 'rgba(255,166,87,0.3)');
  coreGlow.addColorStop(1, 'rgba(255,166,87,0)');
  ctx.fillStyle = coreGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, galaxyR * 0.4, 0, Math.PI * 2);
  ctx.fill();

  for (const gs of galaxyStars) {
    const x = cx + gs.r * galaxyR * Math.cos(gs.th + t * 0.08 / gs.r);
    const y = cy + gs.r * galaxyR * Math.sin(gs.th + t * 0.08 / gs.r);
    ctx.fillStyle = `rgba(255,200,100,${gs.brightness})`;
    ctx.beginPath();
    ctx.arc(x, y, S * 0.003, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.strokeStyle = 'rgba(14,97,172,0.3)';
  ctx.lineWidth = S * 0.002;
  for (let r = galaxyR * 0.5; r < galaxyR * 1.5; r += galaxyR * 0.25) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  for (const os of orbitingStars) {
    const vel = Math.sqrt((visMass + darkMass) / (os.r * 10 + 0.5));
    const th = os.th0 + t * vel * 0.04;
    const x = cx + os.r * galaxyR * 1.3 * Math.cos(th);
    const y = cy + os.r * galaxyR * 1.3 * Math.sin(th);

    ctx.fillStyle = '#0E61AC';
    ctx.beginPath();
    ctx.arc(x, y, S * 0.008, 0, Math.PI * 2);
    ctx.fill();

    const perpTh = th + Math.PI / 2;
    ctx.strokeStyle = 'rgba(14,97,172,0.5)';
    ctx.lineWidth = S * 0.003;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + vel * Math.cos(perpTh) * S * 0.015, y + vel * Math.sin(perpTh) * S * 0.015);
    ctx.stroke();
  }

  const fs = S * 0.028;
  ctx.font = `${fs}px sans-serif`;
  ctx.fillStyle = '#0E61AC';
  ctx.textAlign = 'left';
  const infoX = S * 0.03, infoY = fs + 5;
  ctx.fillText(`暗物质质量: ${darkMass.toFixed(1)} ×10¹¹ M☉`, infoX, infoY);
  ctx.fillText(`可见物质质量: ${visMass} ×10¹¹ M☉`, infoX, infoY + fs * 1.3);
  ctx.fillText(`暗物质占比: ${(darkRatio * 100).toFixed(0)}%`, infoX, infoY + fs * 2.6);

  const orbitalVel = Math.sqrt((visMass + darkMass) * 100 / (S * 0.3));
  ctx.fillStyle = '#2A7CC7';
  ctx.fillText(`旋转速度: ${orbitalVel.toFixed(1)} km/s`, infoX, infoY + fs * 3.9);

  ctx.fillStyle = 'rgba(139,92,246,0.6)';
  ctx.font = `${fs * 0.8}px sans-serif`;
  ctx.fillText('紫色光晕 = 暗物质分布', infoX, infoY + fs * 5.5);

  t += 0.02;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('darkMatterRatio').addEventListener('input', e => {
  document.getElementById('darkMatterRatioVal').textContent = e.target.value;
});
document.getElementById('visibleMass').addEventListener('input', e => {
  document.getElementById('visibleMassVal').textContent = e.target.value;
});
document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('darkMatterRatio').value = 85;
  document.getElementById('darkMatterRatioVal').textContent = '85';
  document.getElementById('visibleMass').value = 2;
  document.getElementById('visibleMassVal').textContent = '2';
});

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
initStars();
draw();

let _paused=false;
document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){e.preventDefault();
    _paused=!_paused;
    if(typeof isRunning!=='undefined'){isRunning=!_paused;if(isRunning&&typeof animate==='function')animate();else if(typeof cancelAnimationFrame==='function'&&typeof animationId!=='undefined')cancelAnimationFrame(animationId);}
    else if(typeof running!=='undefined'){running=!_paused;if(running&&typeof animate==='function')animate();}
    else if(typeof paused!=='undefined'){paused=_paused;if(!paused&&typeof animate==='function')animate();}
  }
  if(e.code==='KeyR'){e.preventDefault();if(typeof reset==='function')reset();}
});
</script>
</body>
</html>
