<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 核磁共振K空间成像</title>
<style>
  :root { --bg:#FAF2E0; --panel:#161b22; --border:#D4C9B8; --text:#c9d1d9; --accent:#0E61AC; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; }
  .header { text-align:center; margin-bottom:16px; }
  .header h1 { font-size:1.4em; color:#0E61AC; margin-bottom:4px; }
  .header p { font-size:0.8em; color:#5A6370; }
  .main { display:flex; gap:16px; max-width:1200px; margin:0 auto; }
  .canvas-wrap { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .controls { width:280px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .control-group { display:flex; flex-direction:column; gap:4px; }
  .control-group label { font-size:0.8em; color:#5A6370; }
  .control-group input[type="range"] { width:100%; }
  .control-group button { padding:8px; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer; font-size:0.85em; }
  .info-panel { background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.2); border-radius:6px; padding:10px; font-size:0.75em; }
  .info-panel .item { display:flex; justify-content:space-between; margin:4px 0; }
  canvas { width:100%; border-radius:4px; }
</style>
</head>
<body>
<div class="header">
  <h1>🧠 核磁共振K空间成像</h1>
  <p>傅里叶变换从K空间重建图像</p>
</div>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas" width="600" height="400"></canvas>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>扫描速度:</label>
      <input type="range" id="speed" min="1" max="10" step="1" value="3">
    </div>
    <div class="control-group">
      <button id="startBtn">▶️ 开始扫描</button>
      <button id="resetBtn">🔄 重置</button>
    </div>
    <div class="info-panel">
      <div class="item"><span class="label">已扫描行数:</span><span class="value" id="lines">0 / 64</span></div>
      <div class="item"><span class="label">当前相位:</span><span class="value" id="phase">0</span></div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const N = 64;
let kSpace = new Array(N).fill(0).map(() => new Array(N).fill(0));
let image = new Array(N).fill(0).map(() => new Array(N).fill(0));
let scanLine = 0;
let scanning = false;

let phantom = [];

function initPhantom() {
  phantom = new Array(N).fill(0).map(() => new Array(N).fill(0));
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      const dx = x - N / 2;
      const dy = y - N / 2;
      const r1 = Math.hypot(dx, dy) / (N / 2);
      const r2 = Math.hypot(dx - 10, dy - 15) / (N / 2);
      const r3 = Math.hypot(dx + 12, dy + 8) / (N / 2);
      
      let val = 0;
      if (r1 < 0.7) val = 0.8;
      if (r2 < 0.15) val = 0.3;
      if (r3 < 0.18) val = 0.95;
      
      phantom[y][x] = val;
    }
  }
}

function fft2(data) {
  const n = data.length;
  let output = new Array(n).fill(0).map(() => new Array(n).fill(0));
  
  for (let y = 0; y < n; y++) {
    for (let kx = 0; kx < n; kx++) {
      let real = 0, imag = 0;
      for (let x = 0; x < n; x++) {
        const phi = -2 * Math.PI * kx * x / n;
        real += data[y][x] * Math.cos(phi);
        imag += data[y][x] * Math.sin(phi);
      }
      output[y][kx] = { r: real, i: imag };
    }
  }
  
  let output2 = new Array(n).fill(0).map(() => new Array(n).fill(0));
  for (let x = 0; x < n; x++) {
    for (let ky = 0; ky < n; ky++) {
      let real = 0, imag = 0;
      for (let y = 0; y < n; y++) {
        const phi = -2 * Math.PI * ky * y / n;
        real += output[y][x].r * Math.cos(phi) - output[y][x].i * Math.sin(phi);
        imag += output[y][x].r * Math.sin(phi) + output[y][x].i * Math.cos(phi);
      }
      output2[ky][x] = { r: real, i: imag };
    }
  }
  
  return output2;
}

function ifft2(kData) {
  const n = kData.length;
  let output = new Array(n).fill(0).map(() => new Array(n).fill(0));
  
  for (let y = 0; y < n; y++) {
    for (let x = 0; x < n; x++) {
      let real = 0, imag = 0;
      for (let kx = 0; kx < n; kx++) {
        const phi = 2 * Math.PI * kx * x / n;
        real += kData[y][kx].r * Math.cos(phi) - kData[y][kx].i * Math.sin(phi);
        imag += kData[y][kx].r * Math.sin(phi) + kData[y][kx].i * Math.cos(phi);
      }
      output[y][x] = { r: real / n, i: imag / n };
    }
  }
  
  let output2 = new Array(n).fill(0).map(() => new Array(n).fill(0));
  for (let x = 0; x < n; x++) {
    for (let y = 0; y < n; y++) {
      let real = 0, imag = 0;
      for (let ky = 0; ky < n; ky++) {
        const phi = 2 * Math.PI * ky * y / n;
        real += output[ky][x].r * Math.cos(phi) - output[ky][x].i * Math.sin(phi);
        imag += output[ky][x].r * Math.sin(phi) + output[ky][x].i * Math.cos(phi);
      }
      const mag = Math.hypot(real, imag) / n;
      output2[y][x] = mag;
    }
  }
  
  return output2;
}

function draw() {
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const kX = 60, kY = 50;
  const kSize = 150;
  
  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(kX, kY, kSize, kSize);
  ctx.strokeStyle = '#D4C9B8';
  ctx.lineWidth = 1;
  ctx.strokeRect(kX, kY, kSize, kSize);

  for (let ky = 0; ky < N; ky++) {
    for (let kx = 0; kx < N; kx++) {
      const px = kX + (kx / N) * kSize;
      const py = kY + (ky / N) * kSize;
      
      if (ky < scanLine && kSpace[ky]) {
        const mag = Math.min(1, Math.abs(kSpace[ky][kx].r) / 100 + Math.abs(kSpace[ky][kx].i) / 100);
        ctx.fillStyle = `rgba(42,124,199,${mag})`;
        ctx.fillRect(px, py, 1 + kSize / N, 1 + kSize / N);
      }
    }
  }

  if (scanLine > 0 && scanLine < N) {
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    const y = kY + (scanLine / N) * kSize;
    ctx.beginPath();
    ctx.moveTo(kX, y);
    ctx.lineTo(kX + kSize, y);
    ctx.stroke();
  }

  const imgX = kX + kSize + 80, imgY = 50;
  const imgSize = 180;

  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(imgX, imgY, imgSize, imgSize);
  ctx.strokeStyle = '#D4C9B8';
  ctx.lineWidth = 1;
  ctx.strokeRect(imgX, imgY, imgSize, imgSize);

  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      const px = imgX + (x / N) * imgSize;
      const py = imgY + (y / N) * imgSize;
      const val = Math.min(1, Math.max(0, image[y][x]));
      const gray = Math.floor(255 * val);
      ctx.fillStyle = `rgb(${gray},${gray},${gray})`;
      ctx.fillRect(px, py, 1 + imgSize / N, 1 + imgSize / N);
    }
  }

  ctx.fillStyle = '#fbbf24';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('K 空间 (频率域)', kX + kSize / 2, kY + kSize + 25);
  ctx.fillStyle = '#0E61AC';
  ctx.fillText('图像空间 (重建)', imgX + imgSize / 2, imgY + imgSize + 25);

  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(kX + kSize + 10, kY + kSize / 2);
  ctx.lineTo(imgX - 10, imgY + imgSize / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#0E61AC';
  ctx.font = '10px sans-serif';
  ctx.fillText('IFFT', kX + kSize + 40, kY + kSize / 2 - 8);

  document.getElementById('lines').textContent = scanLine + ' / ' + N;
  document.getElementById('phase').textContent = scanLine - N / 2;
}

function update() {
  if (!scanning || scanLine >= N) return;

  const speed = parseInt(document.getElementById('speed').value);

  for (let s = 0; s < speed; s++) {
    if (scanLine >= N) break;

    const ky = scanLine;
    kSpace[ky] = [];
    
    for (let kx = 0; kx < N; kx++) {
      let real = 0, imag = 0;
      for (let y = 0; y < N; y++) {
        for (let x = 0; x < N; x++) {
          const phi = -2 * Math.PI * (kx * x + ky * y) / N;
          real += phantom[y][x] * Math.cos(phi);
          imag += phantom[y][x] * Math.sin(phi);
        }
      }
      kSpace[ky][kx] = { r: real, i: imag };
    }

    scanLine++;
  }

  const partialKSpace = kSpace.map((line, y) => {
    if (!line) {
      return new Array(N).fill(0).map(() => ({ r: 0, i: 0 }));
    }
    return line;
  });

  image = ifft2(partialKSpace);
}

function animate() {
  update();
  draw();
  requestAnimationFrame(animate);
}

document.getElementById('startBtn').addEventListener('click', () => {
  scanning = !scanning;
  document.getElementById('startBtn').textContent = scanning ? '⏸️ 暂停' : '▶️ 开始扫描';
});

document.getElementById('resetBtn').addEventListener('click', () => {
  scanLine = 0;
  scanning = false;
  kSpace = new Array(N).fill(0).map(() => new Array(N).fill(0));
  image = new Array(N).fill(0).map(() => new Array(N).fill(0));
  document.getElementById('startBtn').textContent = '▶️ 开始扫描';
});

initPhantom();
animate();
</script>
</body>
</html>
