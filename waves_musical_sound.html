<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乐音 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#161b22; --border:#D4C9B8; --text:#c9d1d9; --accent:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.8em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:140px; accent-color:var(--accent); }
  .ctrl-group button { padding:4px 10px; background:var(--accent); color:#FAF2E0; border:none; border-radius:4px; cursor:pointer; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.78em; color:#5A6370; line-height:1.5; }
</style>
</head>
<body>
<div id="container">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <div class="ctrl-group"><label>基频 f₁:</label><input type="range" id="freq1" min="100" max="880" step="10" value="220"><span id="freq1Val">220</span> Hz</div>
    <div class="ctrl-group"><label>二次谐波:</label><input type="range" id="amp2" min="0" max="1" step="0.05" value="0.5"><span id="amp2Val">0.5</span></div>
    <div class="ctrl-group"><label>三次谐波:</label><input type="range" id="amp3" min="0" max="1" step="0.05" value="0.3"><span id="amp3Val">0.3</span></div>
    <div class="ctrl-group"><label>四次谐波:</label><input type="range" id="amp4" min="0" max="1" step="0.05" value="0.1"><span id="amp4Val">0.1</span></div>
    <div class="ctrl-group"><button id="playBtn">播放</button><button id="stopBtn">停止</button></div>
  </div>
  <div id="info">乐音：声波由基频和多个谐波组成，不同的谐波振幅决定了音色（波形）。音高由基频决定。</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId = null;
let t = 0;
let audioContext = null;
let oscillator1 = null, oscillator2 = null, oscillator3 = null, oscillator4 = null;
let gain1 = null, gain2 = null, gain3 = null, gain4 = null;

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w && h) { canvas.width = w; canvas.height = h; }
}

function draw() {
  const w = canvas.width, h = canvas.height;
  const S = Math.min(w, h);
  const cx = w / 2, cy = h / 2;
  const f1 = parseFloat(document.getElementById('freq1').value);
  const a2 = parseFloat(document.getElementById('amp2').value);
  const a3 = parseFloat(document.getElementById('amp3').value);
  const a4 = parseFloat(document.getElementById('amp4').value);

  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = 'rgba(139,148,158,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(0, cy);
  ctx.lineTo(w, cy);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = '#2A7CC7';
  ctx.lineWidth = 1;
  for (let i = 1; i <= 4; i++) {
    const colors = ['#2A7CC7', '#2A7CC7', '#0E61AC', '#0E61AC'];
    ctx.strokeStyle = colors[i - 1];
    ctx.beginPath();
    const amp = i === 1 ? 1 : (i === 2 ? a2 : (i === 3 ? a3 : a4));
    if (amp > 0) {
      for (let x = 0; x < w; x += 2) {
        const y = cy - Math.sin((x / w) * Math.PI * 4 * i + t * 3) * h * 0.15 * amp;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let x = 0; x < w; x += 2) {
    const wave = Math.sin((x / w) * Math.PI * 4 + t * 3)
      + a2 * Math.sin(2 * (x / w) * Math.PI * 4 + t * 6)
      + a3 * Math.sin(3 * (x / w) * Math.PI * 4 + t * 9)
      + a4 * Math.sin(4 * (x / w) * Math.PI * 4 + t * 12);
    const y = cy - wave * h * 0.15;
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.fillStyle = '#5A6370';
  const fs = S * 0.035;
  ctx.font = `${fs}px sans-serif`;
  ctx.fillText(`基频 f₁ = ${f1} Hz`, w * 0.05, fs + 5);
  ctx.fillText(`基音: ${getNoteName(f1)}`, w * 0.05, fs * 2 + 5);
  
  t += 0.02;
  animationId = requestAnimationFrame(draw);
}

function getNoteName(freq) {
  const A4 = 440;
  const notes = ['A', 'A#', 'B', 'C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#'];
  const semitones = Math.round(12 * Math.log2(freq / A4));
  const noteIndex = (semitones % 12 + 12) % 12;
  const octave = 4 + Math.floor((semitones + 9) / 12);
  return notes[noteIndex] + octave;
}

function playSound() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  
  const f1 = parseFloat(document.getElementById('freq1').value);
  const a2 = parseFloat(document.getElementById('amp2').value);
  const a3 = parseFloat(document.getElementById('amp3').value);
  const a4 = parseFloat(document.getElementById('amp4').value);

  oscillator1 = audioContext.createOscillator();
  oscillator2 = audioContext.createOscillator();
  oscillator3 = audioContext.createOscillator();
  oscillator4 = audioContext.createOscillator();

  gain1 = audioContext.createGain();
  gain2 = audioContext.createGain();
  gain3 = audioContext.createGain();
  gain4 = audioContext.createGain();

  const masterGain = audioContext.createGain();
  masterGain.gain.value = 0.2;

  oscillator1.type = 'sine'; oscillator1.frequency.value = f1;
  oscillator2.type = 'sine'; oscillator2.frequency.value = f1 * 2;
  oscillator3.type = 'sine'; oscillator3.frequency.value = f1 * 3;
  oscillator4.type = 'sine'; oscillator4.frequency.value = f1 * 4;

  gain1.gain.value = 1;
  gain2.gain.value = a2;
  gain3.gain.value = a3;
  gain4.gain.value = a4;

  oscillator1.connect(gain1).connect(masterGain);
  oscillator2.connect(gain2).connect(masterGain);
  oscillator3.connect(gain3).connect(masterGain);
  oscillator4.connect(gain4).connect(masterGain);
  masterGain.connect(audioContext.destination);

  oscillator1.start(); oscillator2.start(); oscillator3.start(); oscillator4.start();
}

function stopSound() {
  if (oscillator1) { oscillator1.stop(); oscillator1.disconnect(); oscillator1 = null; }
  if (oscillator2) { oscillator2.stop(); oscillator2.disconnect(); oscillator2 = null; }
  if (oscillator3) { oscillator3.stop(); oscillator3.disconnect(); oscillator3 = null; }
  if (oscillator4) { oscillator4.stop(); oscillator4.disconnect(); oscillator4 = null; }
}

document.getElementById('freq1').addEventListener('input', e => {
  document.getElementById('freq1Val').textContent = e.target.value;
  if (oscillator1) oscillator1.frequency.value = parseFloat(e.target.value);
  if (oscillator2) oscillator2.frequency.value = parseFloat(e.target.value) * 2;
  if (oscillator3) oscillator3.frequency.value = parseFloat(e.target.value) * 3;
  if (oscillator4) oscillator4.frequency.value = parseFloat(e.target.value) * 4;
});
document.getElementById('amp2').addEventListener('input', e => {
  document.getElementById('amp2Val').textContent = e.target.value;
  if (gain2) gain2.gain.value = parseFloat(e.target.value);
});
document.getElementById('amp3').addEventListener('input', e => {
  document.getElementById('amp3Val').textContent = e.target.value;
  if (gain3) gain3.gain.value = parseFloat(e.target.value);
});
document.getElementById('amp4').addEventListener('input', e => {
  document.getElementById('amp4Val').textContent = e.target.value;
  if (gain4) gain4.gain.value = parseFloat(e.target.value);
});
document.getElementById('playBtn').addEventListener('click', playSound);
document.getElementById('stopBtn').addEventListener('click', stopSound);

resize();
window.addEventListener('resize', resize);
draw();
</script>
</body>
</html>
