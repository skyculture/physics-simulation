<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟦 第二类超导体</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:16px; }
  .header { text-align:center; margin-bottom:16px; }
  .header h1 { font-size:1.4em; color:#0E61AC; margin-bottom:4px; }
  .header p { font-size:0.8em; color:#5A6370; }
  .main { display:flex; gap:16px; max-width:1200px; margin:0 auto; }
  .canvas-wrap { flex:1; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:12px; }
  .controls { width:280px; background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .control-group { display:flex; flex-direction:column; gap:4px; }
  .control-group label { font-size:0.8em; color:#5A6370; }
  .control-group input[type="range"] { width:100%; }
  .control-group button { padding:8px; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer; font-size:0.85em; }
  .info-panel { background:rgba(168,85,247,0.1); border:1px solid rgba(168,85,247,0.2); border-radius:6px; padding:10px; font-size:0.75em; }
  .info-panel .item { display:flex; justify-content:space-between; margin:4px 0; }
  canvas { width:100%; border-radius:4px; }
</style>
</head>
<body>
<div class="back-bar" style="display:flex;align-items:center;padding:8px 16px;gap:8px;position:sticky;top:0;z-index:100;background:var(--panel,#FFF7EB);border-bottom:1px solid var(--border,#D4C9B8);">
  <a href="index.html" style="color:var(--accent,#0E61AC);text-decoration:none;font-size:0.85rem;font-weight:600;padding:4px 10px;border:1px solid var(--border,#D4C9B8);border-radius:5px;transition:background 0.15s;" onmouseover="this.style.background='#FFF7EB'" onmouseout="this.style.background='transparent'">← 返回实验列表</a>
</div>


<div class="header">
  <h1>🟦 第二类超导体</h1>
  <p>混合态下的磁通涡旋晶格（Abrikosov lattice）</p>
</div>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="canvas" width="600" height="400"></canvas>
  </div>
  <div class="controls">
    <div class="control-group">
      <label>温度 T (K): <span id="tVal">10</span></label>
      <input type="range" id="temperature" min="1" max="90" step="1" value="10">
    </div>
    <div class="control-group">
      <label>外磁场 B (mT): <span id="bVal">50</span></label>
      <input type="range" id="bField" min="0" max="500" step="5" value="50">
    </div>
    <div class="control-group">
      <label>临界磁场 Bc1 (mT): <span id="bc1Val">10</span></label>
      <input type="range" id="bc1" min="5" max="100" step="5" value="10">
    </div>
    <div class="control-group">
      <label>临界温度 Tc (K): <span id="tcVal">90</span></label>
      <input type="range" id="tc" min="77" max="130" step="1" value="90">
    </div>
    <div class="control-group">
      <button id="pauseBtn">⏸️ 暂停</button>
    </div>
    <div class="info-panel">
      <div class="item"><span class="label">状态:</span><span class="value" id="state">混合态</span></div>
      <div class="item"><span class="label">磁通涡旋数:</span><span class="value" id="vortices">0</span></div>
      <div class="item"><span class="label">晶格常数:</span><span class="value" id="lattice">0 μm</span></div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let T = 10;
let B_ext = 0.05;
let Bc1 = 0.01;
let Tc = 90;
let paused = false;

let vortices = [];

function initVortices() {
  vortices = [];
  if (B_ext < Bc1) return;

  const B_ratio = (B_ext - Bc1) / Bc1;
  const N = Math.floor(30 * Math.min(10, B_ratio));

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const a0 = Math.sqrt(2 * Math.PI * 1e-12 / B_ext) * 1e6;

  const rows = Math.ceil(Math.sqrt(N * 1.154));
  for (let i = -rows; i <= rows; i++) {
    for (let j = -rows; j <= rows; j++) {
      const x = cx + i * 20 * 0.5;
      const y = cy + (j + (i % 2) * 0.5) * 20 * 0.866;
      const dist = Math.hypot(x - cx, y - cy);
      if (dist < 140 && vortices.length < N) {
        vortices.push({
          x, y,
          phi: Math.random() * Math.PI * 2,
          omega: 0.1 + Math.random() * 0.2,
          r: 3 + Math.random() * 2
        });
      }
    }
  }

  document.getElementById('vortices').textContent = vortices.length;
  document.getElementById('lattice').textContent = (a0 > 0 && a0 < 100 ? a0.toFixed(1) : '∞') + ' μm';
}

function draw() {
  ctx.fillStyle = '#FFF7EB';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = 160;

  const superconductorGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
  if (T > Tc) {
    superconductorGradient.addColorStop(0, '#4a5568');
    superconductorGradient.addColorStop(1, '#F5F0E8');
    document.getElementById('state').textContent = '正常态';
  } else if (B_ext < Bc1) {
    superconductorGradient.addColorStop(0, '#0E61AC44');
    superconductorGradient.addColorStop(1, '#1a4a2a44');
    document.getElementById('state').textContent = '迈斯纳态';
  } else {
    superconductorGradient.addColorStop(0, '#0E61AC22');
    superconductorGradient.addColorStop(1, '#1a3a5a22');
    document.getElementById('state').textContent = '混合态';
  }

  ctx.fillStyle = superconductorGradient;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 3;
  ctx.stroke();

  vortices.forEach((v, idx) => {
    const time = paused ? 0 : Date.now() * 0.001;
    const phi = v.phi + v.omega * time;

    ctx.save();
    ctx.translate(v.x, v.y);
    ctx.rotate(phi);

    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, v.r * 4);
    gradient.addColorStop(0, '#2A7CC7');
    gradient.addColorStop(0.5, '#2A7CC744');
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(0, 0, v.r * 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#2A7CC7';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, v.r * 1.5, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -v.r);
    ctx.lineTo(0, v.r);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-v.r, 0);
    ctx.lineTo(v.r, 0);
    ctx.stroke();

    ctx.restore();
  });

  ctx.fillStyle = '#5A6370';
  ctx.font = '11px sans-serif';
  ctx.fillText('YBCO (T=' + T + 'K)', cx - 40, cy + radius + 20);

  ctx.fillStyle = '#2A7CC7';
  ctx.beginPath();
  ctx.arc(cx + radius + 40, cy - 20, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1A1A1A';
  ctx.font = '10px sans-serif';
  ctx.fillText('磁通涡旋', cx + radius + 50, cy - 17);
}

function animate() {
  draw();
  requestAnimationFrame(animate);
}

document.getElementById('temperature').addEventListener('input', (e) => {
  T = parseFloat(e.target.value);
  document.getElementById('tVal').textContent = T;
  initVortices();
});

document.getElementById('bField').addEventListener('input', (e) => {
  B_ext = parseFloat(e.target.value) / 1000;
  document.getElementById('bVal').textContent = e.target.value;
  initVortices();
});

document.getElementById('bc1').addEventListener('input', (e) => {
  Bc1 = parseFloat(e.target.value) / 1000;
  document.getElementById('bc1Val').textContent = e.target.value;
  initVortices();
});

document.getElementById('tc').addEventListener('input', (e) => {
  Tc = parseFloat(e.target.value);
  document.getElementById('tcVal').textContent = Tc;
  initVortices();
});

document.getElementById('pauseBtn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶️ 继续' : '⏸️ 暂停';
});

initVortices();
animate();
</script>
</body>
</html>
