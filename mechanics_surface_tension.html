<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表面张力 - 物理数值仿真平台</title>
<style>
  :root { --bg:#FAF2E0; --panel:#FFF7EB; --border:#D4C9B8; --text:#1A1A1A; --accent:#0E61AC; --ac2:#0E61AC; }
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; }
  #container { display:flex; flex-direction:column; height:100%; }
  #content { flex:1; display:flex; flex-direction:column; padding:10px; gap:10px; }
  #canvas { flex:1; background:#FAF2E0; border:1px solid var(--border); border-radius:8px; }
  #controls { display:flex; flex-wrap:wrap; gap:12px; padding:8px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; }
  .ctrl-group { display:flex; align-items:center; gap:8px; font-size:0.76em; }
  .ctrl-group label { color:#5A6370; }
  .ctrl-group input[type="range"] { width:120px; accent-color:var(--accent); }
  .ctrl-group input[type="number"] { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:3px 6px; color:var(--text); font-size:0.9em; }
  #info { padding:10px 12px; background:var(--panel); border:1px solid var(--border); border-radius:8px; font-size:0.74em; color:#5A6370; line-height:1.5; }
</style>
</head>
<body>
<div class="back-bar" style="display:flex;align-items:center;padding:8px 16px;gap:8px;position:sticky;top:0;z-index:100;background:var(--panel,#FFF7EB);border-bottom:1px solid var(--border,#D4C9B8);">
  <a href="index.html" style="color:var(--accent,#0E61AC);text-decoration:none;font-size:0.85rem;font-weight:600;padding:4px 10px;border:1px solid var(--border,#D4C9B8);border-radius:5px;transition:background 0.15s;" onmouseover="this.style.background='#FFF7EB'" onmouseout="this.style.background='transparent'">← 返回实验列表</a>
</div>


<div id="container">
  <div id="content">
    <canvas id="canvas"></canvas>
    <div id="controls">
      <div class="ctrl-group"><label>表面张力系数γ:</label><input type="range" id="gamma" min="0.02" max="0.1" step="0.01" value="0.0728"><input type="number" id="gammaVal" value="0.0728"></div>
      <div class="ctrl-group"><label>管半径r(mm):</label><input type="range" id="radius" min="0.1" max="2" step="0.1" value="0.5"><input type="number" id="radiusVal" value="0.5"></div>
      <div class="ctrl-group"><label>液体密度ρ(kg/m³):</label><input type="range" id="rho" min="800" max="1500" step="50" value="1000"><input type="number" id="rhoVal" value="1000"></div>
      <div class="ctrl-group"><button id="resetBtn">↺ 重置</button></div>
    </div>
    <div id="info">表面张力：液体表面分子间的吸引力使液面收缩。毛细上升高度 h = 2γcosθ/(ρgr)。水的表面张力系数约为 0.0728 N/m。</div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let animationId;
let time = 0;

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if(w && h) { canvas.width = w; canvas.height = h; }
}

function draw() {
  ctx.fillStyle = '#FAF2E0';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const gamma = parseFloat(document.getElementById('gamma').value);
  const r = parseFloat(document.getElementById('radius').value) * 0.001;
  const rho = parseFloat(document.getElementById('rho').value);
  const theta = 0;
  const g = 9.8;

  const h = (2 * gamma * Math.cos(theta)) / (rho * g * r);

  const cx = canvas.width / 2, cy = canvas.height / 2;

  ctx.fillStyle = 'rgba(14,97,172,0.3)';
  ctx.fillRect(canvas.width * 0.1, canvas.height * 0.6, canvas.width * 0.8, canvas.height * 0.3);

  ctx.fillStyle = 'rgba(14,97,172,0.5)';
  ctx.beginPath();
  ctx.moveTo(cx - 30, canvas.height * 0.6);
  ctx.lineTo(cx - 15, canvas.height * 0.6 - h * 50);
  ctx.lineTo(cx + 15, canvas.height * 0.6 - h * 50);
  ctx.lineTo(cx + 30, canvas.height * 0.6);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#0E61AC';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 30, canvas.height * 0.6);
  ctx.lineTo(cx - 30, canvas.height * 0.9);
  ctx.lineTo(cx + 30, canvas.height * 0.9);
  ctx.lineTo(cx + 30, canvas.height * 0.6);
  ctx.stroke();

  ctx.strokeStyle = '#2A7CC7';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 40, canvas.height * 0.6);
  ctx.lineTo(cx + 40, canvas.height * 0.6);
  ctx.stroke();
  ctx.fillStyle = '#2A7CC7';
  ctx.font = '10px sans-serif';
  ctx.fillText('h', cx + 35, canvas.height * 0.75);

  ctx.fillStyle = '#2A7CC7';
  for(let i = 0; i < 6; i++) {
    const px = cx + (i - 2.5) * 30;
    const py = canvas.height * 0.7;
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#5A6370';
  ctx.font = '12px sans-serif';
  ctx.fillText(`表面张力系数 γ = ${gamma.toFixed(4)} N/m`, 10, 20);
  ctx.fillText(`毛细管半径 r = ${(r * 1000).toFixed(1)} mm`, 10, 40);
  ctx.fillText(`液体密度 ρ = ${rho} kg/m³`, 10, 60);
  ctx.fillText(`接触角 θ = 0° (完全润湿)`, 10, 80);

  ctx.fillStyle = '#0E61AC';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText(`毛细上升高度 h = ${h.toFixed(3)} m = ${(h * 100).toFixed(1)} cm`, cx - 100, canvas.height - 20);

  ctx.fillStyle = '#0E61AC';
  ctx.font = '12px sans-serif';
  ctx.fillText(`公式: h = 2γcosθ/(ρgr)`, 10, canvas.height - 10);

  time++;
  animationId = requestAnimationFrame(draw);
}

document.getElementById('gamma').addEventListener('input', e => { document.getElementById('gammaVal').value = e.target.value; });
document.getElementById('radius').addEventListener('input', e => { document.getElementById('radiusVal').value = e.target.value; });
document.getElementById('rho').addEventListener('input', e => { document.getElementById('rhoVal').value = e.target.value; });
document.getElementById('resetBtn').addEventListener('click', () => { draw(); });

resize();
window.addEventListener('resize', resize);
draw();
</script>
</body>
</html>
